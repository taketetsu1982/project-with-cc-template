<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe Preview</title>
<style>
  :root {
    /* Text */
    --text-primary: #333;
    --text-secondary: #555;
    --text-tertiary: #888;
    --text-muted: #B0B0B0;

    /* Background */
    --bg-page: #F8F8F8;
    --bg-surface: #FFF;
    --bg-panel: #FAFAFA;
    --bg-subtle: #F0F0F0;
    --bg-placeholder: #E8E8E8;
    --bg-placeholder-dark: #DDD;
    --bg-dark: #333;

    /* Border */
    --border-default: #E0E0E0;
    --border-light: #F0F0F0;

    /* Accent */
    --accent: #4A90D9;
    --accent-bg: #E8F0FE;
    --drop-indicator: #29b3f1;
    --success-bg: #E8F5E9;
    --success-border: #A5D6A7;
    --success-text: #2E7D32;

    /* Status */
    --status-connected: #4CAF50;
    --status-saving: #FF9800;
    --status-error: #F44336;
    --accent-overlay: rgba(74, 144, 217, 0.08);
    --shadow-dropdown: rgba(0, 0, 0, 0.1);
    --drop-indicator-bg: rgba(41, 179, 241, 0.06);
    --accent-bg-subtle: rgba(74, 144, 217, 0.06);
    --hover-bg: rgba(0, 0, 0, 0.015);
    --bg-views: #f0f4f8;

    /* Radius */
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-full: 999px;

    /* Font size — 12:16:24:32 (ratio 3:4:6:8) */
    --font-sm: 12px;
    --font-base: 16px;
    --font-lg: 24px;
    --font-xl: 32px;

    /* Font family */
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-mono: 'SF Mono', Monaco, 'Cascadia Code', 'Consolas', monospace;

    /* Spacing — 8px base grid */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    font-size: var(--font-base);
    background: var(--bg-page);
    color: var(--text-primary);
    display: grid;
    grid-template-rows: 48px 1fr;
    grid-template-columns: 7fr 3fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Toolbar ── */
  #wf-toolbar {
    grid-column: 1 / -1;
    height: 48px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border-default);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--space-lg);
    z-index: 100;
    font-size: 13px;
  }

  #wf-toolbar-left {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    flex: 1;
  }

  #wf-toolbar-title {
    font-weight: 600;
    font-size: 20px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  #wf-edited-badge {
    display: none;
    background: var(--accent-bg);
    color: var(--accent);
    font-weight: 600;
    padding: var(--space-xs) var(--space-sm);
    border-radius: var(--radius-full);
  }


  .wf-btn {
    padding: 6px 14px;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    background: var(--bg-surface);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-primary);
    transition: background 0.15s;
  }

  .wf-btn:hover { background: var(--bg-subtle); text-decoration: none; }
  .wf-btn:active { background: var(--border-default); }

  .wf-add-wrap { position: relative; display: inline-block; }
  .wf-add-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    margin-top: 4px;
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    box-shadow: 0 4px 12px var(--shadow-dropdown);
    z-index: 150;
    min-width: 160px;
    padding: var(--space-xs) 0;
  }
  .wf-add-dropdown.open { display: block; }
  .wf-add-section {
    padding: var(--space-xs) var(--space-md);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .wf-add-item {
    display: block;
    width: 100%;
    padding: 6px var(--space-md);
    border: none;
    background: none;
    text-align: left;
    font-size: 13px;
    color: var(--text-primary);
    cursor: pointer;
    font-family: var(--font-sans);
  }
  .wf-add-item:hover { background: var(--accent-bg); color: var(--accent); }

  .wf-btn-success {
    background: var(--success-bg);
    border-color: var(--success-border);
    color: var(--success-text);
  }

  /* ── _entity badge on nodes ── */
  .wf-entity-badge {
    position: absolute;
    top: 2px;
    right: var(--space-xs);
    font-size: 10px;
    color: var(--text-tertiary);
    background: var(--bg-subtle);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    padding: 1px 4px;
    pointer-events: none;
    z-index: 1;
    white-space: nowrap;
  }

  .wf-entity-attrs {
    font-size: 10px;
    color: var(--text-tertiary);
    padding: 0 var(--space-xs);
    pointer-events: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Viewport ── */
  #wf-viewport-wrap {
    grid-column: 1;
    padding: var(--space-lg);
    overflow: auto;
  }

  /* #wf-root がスクロール可能なラッパー、.wf-viewport が固定サイズのキャンバス本体 */
  .wf-viewport {
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    overflow: hidden;
    margin: 0 auto;
    max-width: 100%;
    box-sizing: border-box;
  }

  /* ── Entity Panel (右ペイン) ── */
  #wf-entity-panel {
    grid-column: 2;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border-default);
    background: var(--bg-views);
    overflow: hidden;
  }

  #wf-entity-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-sm) var(--space-md);
    border-bottom: 1px solid var(--border-default);
    flex-shrink: 0;
  }

  #wf-entity-panel-header > span {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  #wf-entity-panel-header .panel-header-link {
    font-size: 13px;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    color: var(--accent);
    text-decoration: none;
    cursor: pointer;
  }

  #wf-entity-panel-header .panel-header-link:hover {
    text-decoration: underline;
  }

  .wf-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-sm) var(--space-md);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-tertiary);
    border-bottom: 1px solid var(--border-default);
  }

  #wf-view-info {
    padding: var(--space-sm) var(--space-md);
    border-bottom: 1px solid var(--border-default);
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    flex-direction: column;
    gap: 4px;
    line-height: 1.5;
  }
  #wf-view-info .wf-view-label { color: var(--text-tertiary); margin-right: 4px; }

  #wf-entity-list {
    flex: 1;
    overflow-y: auto;
    padding: var(--space-md);
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
  }

  .wf-entity-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    padding: var(--space-md);
  }

  .wf-entity-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-sm);
  }

  .wf-entity-card-name {
    font-weight: 600;
    color: var(--text-primary);
    font-size: 16px;
  }

  .wf-entity-card-attrs {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-xs);
  }

  .wf-entity-card-attr {
    font-size: 11px;
    color: var(--text-tertiary);
    background: var(--bg-subtle);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-full);
    padding: 1px 8px;
    white-space: nowrap;
  }
  .wf-entity-card-attr-used {
    color: var(--text-secondary);
    background: var(--accent-bg);
    border-color: var(--accent-border);
  }

  /* ── File drop overlay ── */
  .file-drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--accent-overlay);
    border: 3px dashed var(--accent);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .file-drop-overlay.active { display: flex; }
  .file-drop-overlay .drop-msg {
    padding: var(--space-md) var(--space-xl);
    background: var(--bg-surface);
    border-radius: var(--radius-md);
    font-size: 15px;
    color: var(--accent);
    font-weight: 600;
    box-shadow: 0 2px 12px var(--shadow-dropdown);
  }

  /* ── Tab bar ── */
  .wf-tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border-default);
    flex-shrink: 0;
  }
  .wf-tab {
    flex: 1;
    padding: 8px 4px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-tertiary);
    text-align: center;
    cursor: pointer;
    border: none;
    background: none;
    border-bottom: 2px solid transparent;
    font-family: var(--font-sans);
    transition: color 0.15s, border-color 0.15s;
  }
  .wf-tab:hover { color: var(--text-primary); }
  .wf-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .wf-tab-content { display: none; flex: 1; overflow-y: auto; flex-direction: column; }
  .wf-tab-content.active { display: flex; }

  /* ── Properties Panel ── */
  #wf-props-content {
    padding: var(--space-sm) var(--space-md);
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 13px;
    overflow-y: auto;
  }
  .wf-props-empty { color: var(--text-muted); font-size: 13px; padding: var(--space-xs) 0; text-align: center; }
  .wf-prop-group {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding-top: 16px;
    margin-bottom: 4px;
  }
  .wf-prop-row { display: flex; align-items: center; gap: var(--space-sm); }
  .wf-prop-label { width: 54px; flex-shrink: 0; color: var(--text-tertiary); font-size: 12px; }
  .wf-prop-input {
    flex: 1;
    padding: 3px 6px;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: var(--font-sans);
    color: var(--text-primary);
    background: var(--bg-surface);
    min-width: 0;
  }
  .wf-prop-input:focus { outline: none; border-color: var(--accent); }
  .wf-prop-select {
    flex: 1;
    padding: 3px 6px;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    font-size: 13px;
    background: var(--bg-surface);
    color: var(--text-primary);
    min-width: 0;
  }
  .wf-prop-select:focus { outline: none; border-color: var(--accent); }
  .wf-prop-check { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-secondary); cursor: pointer; }

  .wf-prop-textarea {
    flex: 1;
    padding: 4px 6px;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-family: var(--font-sans);
    color: var(--text-primary);
    background: var(--bg-surface);
    min-width: 0;
    min-height: 48px;
    resize: vertical;
    line-height: 1.4;
  }
  .wf-prop-textarea:focus { outline: none; border-color: var(--accent); }
  .wf-prop-textarea::placeholder { color: var(--text-muted); font-size: 11px; }

  .wf-note-indicator {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.7;
    pointer-events: none;
    z-index: 5;
  }

  .wf-entity-card-no-data {
    font-size: 13px;
    color: var(--text-muted);
    padding: var(--space-md);
    text-align: center;
  }

  /* ── Save status button ── */
  .save-status-btn {
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
    font-size: 13px;
    color: var(--text-tertiary);
    background: none;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    cursor: pointer;
    font-family: var(--font-sans);
    transition: border-color 0.15s, color 0.15s;
  }
  .save-status-btn:hover { border-color: var(--accent); color: var(--accent); }
  .save-status-btn .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border-default);
    flex-shrink: 0;
  }
  .save-status-btn .dot.connected { background: var(--status-connected); }
  .save-status-btn .dot.saving { background: var(--status-saving); }
  .save-status-btn .dot.error { background: var(--status-error); }
  .save-status-btn .save-hint { color: var(--text-muted); }

  /* ── Toast ── */
  #wf-toast {
    position: fixed;
    bottom: var(--space-lg);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-dark);
    color: var(--bg-surface);
    padding: var(--space-sm) var(--space-lg);
    border-radius: var(--radius-md);
    font-size: var(--font-sm);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 200;
  }

  #wf-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Base node ── */
  .wf-node {
    display: flex;
    position: relative;
    min-height: 24px;
    min-width: 24px;
    transition: opacity 0.15s;
  }

  .wf-node[data-direction="vertical"] { flex-direction: column; }
  .wf-node[data-direction="horizontal"] { flex-direction: row; }

  .wf-grow { flex: 1; }
  .wf-wrap { flex-wrap: wrap; }

  /* Draggable cursor */
  .wf-node[draggable="true"] { cursor: grab; }
  .wf-node[draggable="true"]:active { cursor: grabbing; }

  /* Dragging state */
  .wf-dragging { opacity: 0.3; }

  /* Drop target highlight */
  .wf-drag-over { outline: 4px solid var(--drop-indicator) !important; outline-offset: -4px; background: var(--drop-indicator-bg) !important; }
  .wf-drag-over > .wf-label { color: var(--drop-indicator) !important; }

  /* 選択状態 */
  .wf-selected { outline: 2px solid var(--accent) !important; outline-offset: -2px; background: var(--accent-bg-subtle) !important; }
  .wf-selected > .wf-label { color: var(--accent) !important; }

  /* ── Node name label ── */
  .wf-label {
    position: absolute;
    top: 2px;
    left: var(--space-xs);
    font-size: var(--font-sm);
    font-weight: 500;
    color: var(--text-muted);
    z-index: 1;
    white-space: nowrap;
    cursor: default;
  }

  .wf-name-edit {
    font-size: var(--font-sm);
    font-weight: 500;
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 0 4px;
    outline: none;
    background: var(--bg-surface);
    color: var(--text-primary);
    min-width: 60px;
    z-index: 20;
  }

  .wf-node:hover > .wf-label { color: var(--text-primary); }
  .wf-node:hover { outline: 1px dashed var(--text-muted); outline-offset: -1px; background: var(--hover-bg); }

  /* ── Grab bar for compound nodes ── */
  .wf-grab-bar {
    display: none;
    align-items: center;
    gap: 8px;
    height: 28px;
    max-height: 100%;
    overflow: hidden;
    padding: 0 var(--space-md);
    cursor: grab;
    font-size: var(--font-sm);
    font-weight: 500;
    color: var(--text-tertiary);
    background: color-mix(in srgb, var(--bg-panel) 92%, transparent);
    border-bottom: 1px solid var(--border-light);
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    user-select: none;
  }
  .wf-node:hover:not(:has(.wf-node:hover)) > .wf-grab-bar,
  #wf-root:hover:not(:has(.wf-node:hover)) > .wf-grab-bar {
    display: flex;
  }
  .wf-grab-bar:hover {
    background: var(--bg-subtle);
    color: var(--text-secondary);
  }
  .wf-grab-bar:active { cursor: grabbing; }
  .wf-grab-bar .wf-grip { font-size: 11px; letter-spacing: 1px; opacity: 0.5; }
  .wf-grab-bar:hover .wf-grip { opacity: 0.8; }

  /* ── Grab bar hover trigger zone ── */
  .wf-node:has(> .wf-grab-bar)::after,
  #wf-root:has(> .wf-grab-bar)::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 28px;
    z-index: 9;
    pointer-events: none;
  }
  .wf-node:hover:has(> .wf-grab-bar)::after,
  #wf-root:hover:has(> .wf-grab-bar)::after {
    pointer-events: auto;
  }

  /* ── Direction toggle button ── */
  .wf-dir-toggle {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    padding: 2px 6px;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    color: var(--text-tertiary);
    transition: background 0.15s, color 0.15s;
    user-select: none;
  }
  .wf-dir-toggle:hover {
    background: var(--accent-bg);
    color: var(--accent);
    border-color: var(--accent);
  }

  /* ── Drop indicator ── */
  .wf-drop-indicator {
    position: absolute;
    background: var(--drop-indicator);
    z-index: 50;
    pointer-events: none;
    border-radius: 2px;
    box-shadow: 0 0 6px var(--drop-indicator);
  }

  .wf-drop-label {
    position: absolute;
    z-index: 51;
    pointer-events: none;
    background: var(--drop-indicator);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: var(--radius-sm);
    white-space: nowrap;
  }

  /* ── Element type placeholders ── */

  .wf-type-text {
    color: var(--text-primary);
    font-size: var(--font-base);
    padding: var(--space-xs) 0;
    display: flex;
    align-items: center;
    min-height: 28px;
  }

  .wf-type-text[data-variant="display"] { font-size: var(--font-xl); font-weight: 600; }
  .wf-type-text[data-variant="heading"] { font-size: var(--font-lg); font-weight: 600; }
  .wf-type-text[data-variant="caption"] { font-size: var(--font-sm); color: var(--text-tertiary); }

  .wf-type-image {
    background: var(--bg-placeholder);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    min-height: 40px;
  }

  .wf-type-icon {
    background: var(--bg-placeholder-dark);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-tertiary);
  }

  .wf-type-button {
    background: var(--bg-dark);
    border-radius: var(--radius-sm);
    padding: var(--space-xs) var(--space-md);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--bg-surface);
    font-size: 13px;
    font-weight: 500;
    min-height: 28px;
    cursor: default;
  }

  .wf-type-link {
    padding: var(--space-xs) 0;
    display: flex;
    align-items: center;
    color: var(--text-primary);
    font-size: var(--font-base);
    font-weight: 500;
    text-decoration: underline;
    text-underline-offset: 3px;
    min-height: 28px;
    cursor: default;
  }

  .wf-type-input {
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    padding: var(--space-xs) var(--space-sm);
    color: var(--text-tertiary);
    font-size: 13px;
    min-height: 28px;
    display: flex;
    align-items: center;
  }

  .wf-type-card {
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    background: var(--bg-panel);
    min-height: 80px;
    padding: var(--space-md);
    display: flex;
    flex-direction: column;
  }

  .wf-card-label {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
  }

  .wf-type-divider {
    height: 1px;
    background: var(--border-default);
    width: 100%;
    flex-shrink: 0;
  }

  .wf-type-table {
    width: 100%;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    overflow: hidden;
    display: block;
  }

  .wf-table-row {
    display: flex;

</style>
</head>
<body>

        <button class="wf-add-item" onclick="addNode('image')">image</button>
        <button class="wf-add-item" onclick="addNode('icon')">icon</button>
        <button class="wf-add-item" onclick="addNode('card')">card</button>
        <button class="wf-add-item" onclick="addNode('table')">table</button>

      </div>

</div>

<div id="wf-viewport-wrap">
  <div id="wf-root"></div>
</div>

  <div id="wf-entity-panel-header">
    <span>View</span>
    <a class="panel-header-link" href="../../reqs/conceptual-model.html" target="_blank">Edit in Conceptual Model</a>
  </div>
  <div id="wf-view-info"></div>

    <button class="wf-tab active" data-tab="entity" onclick="switchTab('entity')">Entity &amp; Attributes</button>
    <button class="wf-tab" data-tab="props" onclick="switchTab('props')">Properties</button>
  </div>
  <div id="wf-tab-entity" class="wf-tab-content active">
    <div id="wf-entity-list"></div>
  </div>
  <div id="wf-tab-props" class="wf-tab-content">
    <div id="wf-props-content">
      <div class="wf-props-empty">No node selected</div>
    </div>
  </div>
</div>

<div class="file-drop-overlay" id="wf-file-drop-overlay"><span class="drop-msg">Drop JSON file to connect</span></div>
<div id="wf-toast"></div>

<script>
let WIREFRAME_DATA = null; // %%WIREFRAME_DATA%%

let modified = false;
let dragPath = null;
let dropIndicator = null;
let fileHandle = null;
let selectedPath = null;
let clipboardNode = null;
const undoStack = [];
const redoStack = [];
const MAX_UNDO = 50;
const WF_FILENAME = null; // スキル実行時に置換される
const originalFilename = WF_FILENAME || (WIREFRAME_DATA?.name || 'wireframe').replace(/\s+/g, '-').toLowerCase() + '.wireframe.json';
let saveTimer = null;

// ── Undo / Redo ──

function saveSnapshot() {
  if (!WIREFRAME_DATA || !WIREFRAME_DATA.root) return;
  undoStack.push(JSON.stringify(WIREFRAME_DATA.root));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  // 新しい操作が入ったらredo履歴をクリア
  redoStack.length = 0;
}

function handleUndo() {
  if (undoStack.length === 0) return;
  // 現在の状態をredo stackに保存
  redoStack.push(JSON.stringify(WIREFRAME_DATA.root));
  WIREFRAME_DATA.root = JSON.parse(undoStack.pop());
  selectedPath = null;

  render();
  switchTab('entity');
  showToast('元に戻しました');

  // undoで全て戻した場合はeditedバッジを消し、auto-saveしない
  if (undoStack.length === 0) {
    modified = false;
    document.getElementById('wf-edited-badge').style.display = 'none';
  }
  updateJSONPanel();
}

function handleRedo() {
  if (redoStack.length === 0) return;
  // 現在の状態をundo stackに保存
  undoStack.push(JSON.stringify(WIREFRAME_DATA.root));
  WIREFRAME_DATA.root = JSON.parse(redoStack.pop());
  selectedPath = null;

  markModified();

  render();
  switchTab('entity');
  updateJSONPanel();
  showToast('やり直しました');
}

// ── JSON tree traversal ──

function getNodeByPath(path) {
  if (path === null || path === undefined || path === '') return null;
  const indices = String(path).split('.').map(Number);
  if (indices.some(n => isNaN(n))) return null;
  let parent = WIREFRAME_DATA.root;
  let node = parent;
  let index = 0;

  for (let i = 0; i < indices.length; i++) {
    parent = node;
    index = indices[i];
    node = parent.children[index];
    if (!node) return null;
  }

  return { parent, index, node };
}

function getParentPath(path) {
  const parts = String(path).split('.');
  if (parts.length <= 1) return null;
  return parts.slice(0, -1).join('.');
}

// ── Drag and Drop ──

function handleDragStart(e) {
  const bar = e.target.closest('.wf-grab-bar');
  let nodeEl;
  if (bar) {
    nodeEl = bar.closest('.wf-node[data-path]');
  } else {
    nodeEl = e.target.closest('.wf-node[data-path]');
  }
  if (!nodeEl) return;

  dragPath = nodeEl.dataset.path;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragPath);

  requestAnimationFrame(() => nodeEl.classList.add('wf-dragging'));
}

function handleDragEnd(e) {
  const dragging = document.querySelector('.wf-dragging');
  if (dragging) dragging.classList.remove('wf-dragging');

  document.querySelectorAll('.wf-drag-over').forEach(el => el.classList.remove('wf-drag-over'));
  removeDropIndicator();
  dragPath = null;
}

function distToRect(x, y, rect) {
  const dx = Math.max(rect.left - x, 0, x - rect.right);
  const dy = Math.max(rect.top - y, 0, y - rect.bottom);
  return Math.sqrt(dx * dx + dy * dy);
}

let wfDropTarget = null; // { path, before, intoGroup }

function findClosestNode(e) {
  if (!dragPath) return null;
  const allNodes = document.querySelectorAll('#wf-root [data-path]');
  let closest = null;
  let closestDist = Infinity;
  for (const el of allNodes) {
    if (el.dataset.path === dragPath) continue;
    // ドラッグ中ノードの子孫を除外
    if (el.dataset.path.startsWith(dragPath + '.')) continue;
    const rect = el.getBoundingClientRect();
    const dist = distToRect(e.clientX, e.clientY, rect);
    if (dist < closestDist) {
      closestDist = dist;
      closest = el;
    }
  }
  return closest;
}

let _dragOverRAF = null;
let _lastDragEvent = null;
function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';

  if (!dragPath) return;
  // RAFでスロットリング — 処理自体をRAFコールバック内で実行
  _lastDragEvent = e;
  if (_dragOverRAF) return;
  _dragOverRAF = requestAnimationFrame(() => {
    _dragOverRAF = null;
    _processDragOver(_lastDragEvent);
  });
}

function _processDragOver(e) {
  const nodeEl = findClosestNode(e);
  if (!nodeEl) { removeDropIndicator(); wfDropTarget = null; return; }

  const targetPath = nodeEl.dataset.path;
  if (targetPath === dragPath) { removeDropIndicator(); wfDropTarget = null; return; }

  const targetInfo = getNodeByPath(targetPath);
  if (!targetInfo) return;
  const targetNode = targetInfo.node;
  const rect = nodeEl.getBoundingClientRect();

  // コンテナノード（childrenあり）: 端→兄弟挿入、中央→グループ内ドロップ
  if (targetNode.children) {
    const parentDir = (targetInfo.parent.direction || 'vertical');
    const threshold = Math.min(parentDir === 'vertical' ? rect.height * 0.25 : rect.width * 0.25, 30);

    if (parentDir === 'vertical' && e.clientY < rect.top + threshold) {
      wfDropTarget = { path: targetPath, before: true, intoGroup: false };
      showDropIndicator(nodeEl, true, true);
    } else if (parentDir === 'vertical' && e.clientY > rect.bottom - threshold) {
      wfDropTarget = { path: targetPath, before: false, intoGroup: false };
      showDropIndicator(nodeEl, true, false);
    } else if (parentDir === 'horizontal' && e.clientX < rect.left + threshold) {
      wfDropTarget = { path: targetPath, before: true, intoGroup: false };
      showDropIndicator(nodeEl, false, true);
    } else if (parentDir === 'horizontal' && e.clientX > rect.right - threshold) {
      wfDropTarget = { path: targetPath, before: false, intoGroup: false };
      showDropIndicator(nodeEl, false, false);
    } else {
      nodeEl.classList.add('wf-drag-over');
      showDropIntoIndicator(nodeEl);
      wfDropTarget = { path: targetPath, before: false, intoGroup: true };
    }
    return;
  }

  // 子ノード: 前後判定
  const parentNode = targetInfo.parent;
  const isVertical = (parentNode.direction || 'vertical') === 'vertical';
  let before;
  if (isVertical) {
    before = e.clientY < rect.top + rect.height / 2;
  } else {
    before = e.clientX < rect.left + rect.width / 2;
  }
  wfDropTarget = { path: targetPath, before, intoGroup: false };
  showDropIndicator(nodeEl, isVertical, before);
}

function handleDrop(e) {
  e.preventDefault();
  removeDropIndicator();
  document.querySelectorAll('.wf-drag-over').forEach(el => el.classList.remove('wf-drag-over'));

  if (!dragPath || !wfDropTarget) return;
  const sourcePath = dragPath;

  // 自分自身または子孫へのドロップを防止
  if (wfDropTarget.path === sourcePath || wfDropTarget.path.startsWith(sourcePath + '.')) return;

  const sourceInfo = getNodeByPath(sourcePath);
  if (!sourceInfo) return;

  // ドロップ先の参照情報をsplice前に取得
  const tgtNode = getNodeByPath(wfDropTarget.path);
  if (!tgtNode && !wfDropTarget.intoGroup) return;
  // ターゲットノードへの直接参照を保持（パスずれに依存しない）
  const tgtNodeRef = tgtNode ? tgtNode.node : null;
  const tgtParentRef = tgtNode ? tgtNode.parent : null;

  saveSnapshot();
  const [movedNode] = sourceInfo.parent.children.splice(sourceInfo.index, 1);

  if (wfDropTarget.intoGroup) {
    // グループ内にドロップ
    if (tgtNodeRef) tgtNodeRef.children.push(movedNode);
  } else {
    // 兄弟として挿入 — splice後に実インデックスを再計算
    const actualIdx = tgtParentRef.children.indexOf(tgtNodeRef);
    if (actualIdx === -1) return;
    const insertIdx = wfDropTarget.before ? actualIdx : actualIdx + 1;
    tgtParentRef.children.splice(insertIdx, 0, movedNode);
  }

  markModified();
  selectedPath = null;
  wfDropTarget = null;
  dragPath = null;

  render();
  updateJSONPanel();
}

// ── Drop indicator ──

let dropLabel = null;

function showDropIndicator(targetEl, isVertical, before) {
  removeDropIndicator();

  dropIndicator = document.createElement('div');
  dropIndicator.className = 'wf-drop-indicator';

  const rect = targetEl.getBoundingClientRect();
  const targetName = targetEl.querySelector('.wf-label')?.textContent || '';

  if (isVertical) {
    dropIndicator.style.height = '4px';
    dropIndicator.style.left = `${rect.left}px`;
    dropIndicator.style.width = `${rect.width}px`;
    dropIndicator.style.top = before ? `${rect.top - 2}px` : `${rect.bottom - 2}px`;
  } else {
    dropIndicator.style.width = '4px';
    dropIndicator.style.top = `${rect.top}px`;
    dropIndicator.style.height = `${rect.height}px`;
    dropIndicator.style.left = before ? `${rect.left - 2}px` : `${rect.right - 2}px`;
  }

  document.body.appendChild(dropIndicator);

  // ドロップ先ラベル表示
  if (targetName) {
    dropLabel = document.createElement('div');
    dropLabel.className = 'wf-drop-label';
    dropLabel.textContent = (before ? '↑ before ' : '↓ after ') + targetName;
    if (isVertical) {
      dropLabel.style.left = `${rect.left}px`;
      dropLabel.style.top = before ? `${rect.top - 22}px` : `${rect.bottom + 4}px`;
    } else {
      dropLabel.textContent = (before ? '← before ' : '→ after ') + targetName;
      dropLabel.style.top = `${rect.top}px`;
      dropLabel.style.left = before ? `${rect.left - 4}px` : `${rect.right + 4}px`;
    }
    document.body.appendChild(dropLabel);
  }
}

function showDropIntoIndicator(targetEl) {
  removeDropIndicator();
  // コンテナ内ドロップ時のラベル表示
  const rect = targetEl.getBoundingClientRect();
  const targetName = targetEl.querySelector('.wf-label')?.textContent || '';
  if (targetName) {
    dropLabel = document.createElement('div');
    dropLabel.className = 'wf-drop-label';
    dropLabel.textContent = '→ into ' + targetName;
    dropLabel.style.left = `${rect.left + 8}px`;
    dropLabel.style.top = `${rect.top + 4}px`;
    document.body.appendChild(dropLabel);
  }
}

function removeDropIndicator() {
  if (dropIndicator) {
    dropIndicator.remove();
    dropIndicator = null;
  }
  if (dropLabel) {
    dropLabel.remove();
    dropLabel = null;
  }
}

// ── JSON Panel (auto-saveトリガー用に呼び出し箇所は残す) ──

function updateJSONPanel() {
  scheduleAutoSave();
}

// ── Connect & Auto-save ──

let isSaving = false;

function disconnectFile() {
  fileHandle = null;
  if (saveTimer) clearTimeout(saveTimer);
  updateSaveStatus('', 'Connect', '(Drop a JSON file)');
}

// JSONファイルを読み込んで描画する共通処理
const MAX_DEPTH = 50;
function checkDepth(obj, depth) {
  if (depth > MAX_DEPTH) return false;
  if (obj && obj.children && Array.isArray(obj.children)) {
    return obj.children.every(c => checkDepth(c, depth + 1));
  }
  return true;
}

async function loadJsonFromHandle(handle) {
  const file = await handle.getFile();
  const text = await file.text();
  let data;
  try { data = JSON.parse(text); } catch { updateSaveStatus('error', 'Invalid JSON'); return false; }
  if (data.root && !checkDepth(data.root, 0)) {
    updateSaveStatus('error', 'JSON too deeply nested'); return false;
  }
  if (WIREFRAME_DATA) {
    Object.keys(WIREFRAME_DATA).forEach(k => delete WIREFRAME_DATA[k]);
    Object.assign(WIREFRAME_DATA, data);
  } else {
    WIREFRAME_DATA = data;
  }
  undoStack.length = 0;
  redoStack.length = 0;
  fileHandle = handle;
  updateSaveStatus('connected', handle.name);
  init();
  return true;
}

async function connectFile() {
  // 接続中ならDisconnect
  if (fileHandle) { disconnectFile(); return; }
  if (!('showOpenFilePicker' in window)) {
    alert('This browser does not support the File System Access API. Please drop a JSON file to connect.');
    return;
  }
  try {
    const [handle] = await window.showOpenFilePicker({
      id: 'wf-editor',
      types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
    });
    await loadJsonFromHandle(handle);
  } catch (err) {
    if (err.name !== 'AbortError') {
      console.error(err);
      updateSaveStatus('error', 'Error');
    }
  }
}

function updateSaveStatus(state, label, hint) {
  document.getElementById('wf-save-dot').className = 'dot ' + (state || '');
  document.getElementById('wf-save-label').textContent = label || '';
  document.getElementById('wf-save-hint').textContent = hint || '';
}

async function writeToFile() {
  if (!fileHandle || isSaving) return;
  isSaving = true;
  updateSaveStatus('saving', 'Saving...');
  try {
    const json = JSON.stringify(WIREFRAME_DATA, null, 2) + '\n';
    const writable = await fileHandle.createWritable();
    await writable.write(json);
    await writable.close();
    updateSaveStatus('connected', fileHandle.name);
    document.getElementById('wf-edited-badge').style.display = 'none';
  } catch (err) {
    console.error(err);
    updateSaveStatus('error', 'Save failed');
    if (err.name === 'NotAllowedError') {
      fileHandle = null;
      updateSaveStatus('', 'Connect', '(Drop a JSON file)');
    }
  } finally {
    isSaving = false;
  }
}

function scheduleAutoSave() {
  if (saveTimer) clearTimeout(saveTimer);
  if (!fileHandle) return;
  saveTimer = setTimeout(() => writeToFile(), 500);
}

// ドラッグ&ドロップでファイル接続（document全体）
let fileDragCounter = 0;
const wfOverlay = document.getElementById('wf-file-drop-overlay');

document.addEventListener('dragenter', e => {
  if (!e.dataTransfer.types.includes('Files')) return;
  fileDragCounter++;
  wfOverlay.classList.add('active');
});

document.addEventListener('dragleave', e => {
  if (!e.dataTransfer.types.includes('Files')) return;
  fileDragCounter--;
  if (fileDragCounter <= 0) {
    fileDragCounter = 0;
    wfOverlay.classList.remove('active');
  }
});

document.addEventListener('dragover', e => {
  if (e.dataTransfer.types.includes('Files')) e.preventDefault();
});
document.addEventListener('drop', async e => {
  fileDragCounter = 0;
  wfOverlay.classList.remove('active');
  if (!e.dataTransfer.types.includes('Files')) return;
  e.preventDefault();
  const items = [...e.dataTransfer.items];
  for (const item of items) {
    if (item.kind !== 'file') continue;
    if (typeof item.getAsFileSystemHandle === 'function') {
      const handle = await item.getAsFileSystemHandle();
      if (handle.kind === 'file' && handle.name.endsWith('.json')) {
        await loadJsonFromHandle(handle);
        return;
      }
    }
  }
  updateSaveStatus('error', 'Drop not supported');
});

function markModified() {
  modified = true;
  document.getElementById('wf-edited-badge').style.display = 'inline';
  scheduleAutoSave();
}

let _toastTimer = null;
function showToast(message) {
  const toast = document.getElementById('wf-toast');
  toast.textContent = message;
  toast.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { toast.classList.remove('show'); _toastTimer = null; }, 3000);
}

// ── Add Node ──

const NODE_DEFAULTS = {
  container: { name: 'コンテナ', direction: 'vertical', children: [] },
  text: { name: 'テキスト', type: 'text' },
  button: { name: 'ボタン', type: 'button' },
  input: { name: '入力', type: 'input' },
  select: { name: 'セレクト', type: 'select' },
  link: { name: 'リンク', type: 'link' },
  image: { name: '画像', type: 'image', width: 200, height: 150 },
  icon: { name: 'アイコン', type: 'icon', width: 32, height: 32 },
  card: { name: 'カード', type: 'card' },
  table: { name: 'テーブル', type: 'table', columns: ['列1', '列2', '列3'], rows: 3 },
  divider: { name: '区切り線', type: 'divider' },
};

function toggleAddDropdown(e) {
  e.stopPropagation();
  document.getElementById('wf-add-dropdown').classList.toggle('open');
}

document.addEventListener('click', () => {
  document.getElementById('wf-add-dropdown')?.classList.remove('open');
});

function addNode(type) {
  document.getElementById('wf-add-dropdown').classList.remove('open');
  const template = NODE_DEFAULTS[type];
  if (!template) return;
  const newNode = JSON.parse(JSON.stringify(template));

  saveSnapshot();
  if (selectedPath !== null) {
    const info = getNodeByPath(selectedPath);
    if (info) {
      info.parent.children.splice(info.index + 1, 0, newNode);
      // 挿入した新ノードを選択するため、パスの末尾インデックスを+1に更新
      const parts = selectedPath.split('.');
      parts[parts.length - 1] = String(info.index + 1);
      selectedPath = parts.join('.');
    }
  } else {
    WIREFRAME_DATA.root.children.push(newNode);
    selectedPath = String(WIREFRAME_DATA.root.children.length - 1);
  }

  markModified();
  render();
  updateSelection();
  updateJSONPanel();
  showToast(`追加: ${newNode.name}`);
}

// ── Direction Toggle ──

function toggleDirection(path) {
  // pathがnullの場合はrootノード
  let node;
  if (path === null) {
    node = WIREFRAME_DATA.root;
  } else {
    const info = getNodeByPath(path);
    if (!info) return;
    node = info.node;
  }

  saveSnapshot();
  const current = node.direction || 'vertical';
  node.direction = current === 'vertical' ? 'horizontal' : 'vertical';

  markModified();

  render();
  updateJSONPanel();
  showToast(`${node.name}: ${node.direction}`);
}

// ── Selection & Copy/Paste ──

function switchTab(tabName) {
  document.querySelectorAll('.wf-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
  document.querySelectorAll('.wf-tab-content').forEach(c => c.classList.toggle('active', c.id === `wf-tab-${tabName}`));
}

function selectNode(path) {
  // 同じノードをクリックしたら選択解除してエンティティタブに戻す
  if (selectedPath === path) {
    selectedPath = null;
    switchTab('entity');
  } else {
    selectedPath = path;
    // ノード選択時にPropertiesタブを開く
    switchTab('props');
  }
  updateSelection();
}

function updateSelection() {
  document.querySelectorAll('.wf-selected').forEach(el => el.classList.remove('wf-selected'));
  if (selectedPath !== null) {
    const el = document.querySelector(`[data-path="${selectedPath}"]`);
    if (el) el.classList.add('wf-selected');
  }
  renderPropsPanel();
}

// ノードのディープコピー（nameに " (copy)" を付与）
function deepCopyNode(node) {
  const copy = JSON.parse(JSON.stringify(node));
  copy.name = (copy.name || '') + ' (copy)';
  return copy;
}

function handleCopy() {
  if (selectedPath === null) return;
  const info = getNodeByPath(selectedPath);
  if (!info) return;
  clipboardNode = JSON.parse(JSON.stringify(info.node));
  showToast(`コピー: ${clipboardNode.name}`);
}

function handlePaste() {
  if (!clipboardNode || selectedPath === null) return;
  const info = getNodeByPath(selectedPath);
  if (!info) return;

  saveSnapshot();
  const copy = deepCopyNode(clipboardNode);
  // 選択中の要素の直後に挿入
  info.parent.children.splice(info.index + 1, 0, copy);

  markModified();

  // ペースト先を選択状態にする
  const parts = selectedPath.split('.');
  parts[parts.length - 1] = String(info.index + 1);
  selectedPath = parts.join('.');

  render();
  updateSelection();
  updateJSONPanel();
  showToast(`貼り付け: ${copy.name}`);
}

function handleDuplicate() {
  if (selectedPath === null) return;
  const info = getNodeByPath(selectedPath);
  if (!info) return;

  saveSnapshot();
  const copy = deepCopyNode(info.node);
  info.parent.children.splice(info.index + 1, 0, copy);
  markModified();

  const parts = selectedPath.split('.');
  parts[parts.length - 1] = String(info.index + 1);
  selectedPath = parts.join('.');

  render();
  updateSelection();
  updateJSONPanel();
  showToast(`複製: ${info.node.name}`);
}

function handleCut() {
  if (selectedPath === null) return;
  const info = getNodeByPath(selectedPath);
  if (!info) return;
  // コピー
  clipboardNode = JSON.parse(JSON.stringify(info.node));
  // 削除
  saveSnapshot();
  info.parent.children.splice(info.index, 1);
  markModified();
  selectedPath = null;
  render();
  updateJSONPanel();
  showToast(`切り取り: ${clipboardNode.name}`);
}

function handleDelete() {
  if (selectedPath === null) return;
  const info = getNodeByPath(selectedPath);
  if (!info) return;

  saveSnapshot();
  const name = info.node.name || '';
  info.parent.children.splice(info.index, 1);

  markModified();

  selectedPath = null;

  render();
  updateJSONPanel();
  showToast(`削除: ${name}`);
}

function isInputFocused() {
  const el = document.activeElement;
  return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable);
}

function handleKeyDown(e) {
  const isMeta = e.metaKey || e.ctrlKey;

  // ⌘Z: Undo
  if (isMeta && !e.shiftKey && e.key === 'z') {
    e.preventDefault();
    handleUndo();
    return;
  }

  // ⌘⇧Z: Redo
  if (isMeta && e.shiftKey && e.key === 'z') {
    e.preventDefault();
    handleRedo();
    return;
  }

  // ⌘S: 手動保存
  if (isMeta && e.key === 's') {
    e.preventDefault();
    if (fileHandle) {
      writeToFile();
      showToast('保存しました（自動保存も有効）');
    } else {
      showToast('先にファイルを接続してください（Connectまたはドロップ）');
    }
    return;
  }

  // ⌘X: 切り取り
  if (isMeta && e.key === 'x' && selectedPath !== null && !isInputFocused()) {
    e.preventDefault();
    handleCut();
    return;
  }

  // ⌘C: コピー
  if (isMeta && e.key === 'c' && selectedPath !== null && !isInputFocused()) {
    if (window.getSelection()?.toString()) return;
    e.preventDefault();
    handleCopy();
    return;
  }

  // ⌘V: ペースト
  if (isMeta && e.key === 'v' && !isInputFocused()) {
    e.preventDefault();
    handlePaste();
    return;
  }

  // ⌘D: 複製
  if (isMeta && e.key === 'd' && selectedPath !== null && !isInputFocused()) {
    e.preventDefault();
    handleDuplicate();
    return;
  }

  // Delete / Backspace: 削除
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedPath !== null && !isInputFocused()) {
    e.preventDefault();
    handleDelete();
    return;
  }

  // 矢印キー: 選択中ノードを移動（親のdirectionに応じて）
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key) && selectedPath !== null && !isInputFocused()) {
    const info = getNodeByPath(selectedPath);
    if (!info) return;
    const parent = info.parent;
    const dir = parent.direction || 'vertical';
    const idx = info.index;
    let delta = 0;
    if (dir === 'horizontal' && e.key === 'ArrowLeft') delta = -1;
    if (dir === 'horizontal' && e.key === 'ArrowRight') delta = 1;
    if (dir === 'vertical' && e.key === 'ArrowUp') delta = -1;
    if (dir === 'vertical' && e.key === 'ArrowDown') delta = 1;
    if (delta === 0) return;
    const newIdx = idx + delta;
    if (newIdx < 0 || newIdx >= parent.children.length) return;
    e.preventDefault();
    saveSnapshot();
    const [removed] = parent.children.splice(idx, 1);
    parent.children.splice(newIdx, 0, removed);
    // 移動後のパスを更新
    const parts = String(selectedPath).split('.');
    parts[parts.length - 1] = String(newIdx);
    selectedPath = parts.join('.');
    markModified();
    render();
    updateJSONPanel();
    return;
  }
}

function handleNodeClick(e) {
  // direction toggleは無視
  if (e.target.closest('.wf-dir-toggle')) return;

  // グラブバークリック → そのコンテナを選択
  const grabBar = e.target.closest('.wf-grab-bar');
  if (grabBar) {
    e.stopPropagation();
    const nodeEl = grabBar.closest('[data-path]');
    if (nodeEl) selectNode(nodeEl.dataset.path);
    return;
  }

  const nodeEl = e.target.closest('[data-path]');
  if (!nodeEl) return;

  e.stopPropagation();
  selectNode(nodeEl.dataset.path);
}

// ── Inline Name Edit ──

function handleNodeDblClick(e) {
  const grabLabel = e.target.closest('.wf-grab-bar > span:not(.wf-grip)');
  const wfLabel = e.target.closest('.wf-label');
  const labelEl = grabLabel || wfLabel;
  if (!labelEl) return;
  if (labelEl.querySelector('.wf-name-edit')) return;

  e.stopPropagation();
  const nodeEl = labelEl.closest('[data-path]') || labelEl.closest('#wf-root');
  const path = nodeEl?.dataset?.path;

  let node;
  if (path === undefined || path === null) {
    node = WIREFRAME_DATA.root;
  } else {
    const info = getNodeByPath(path);
    if (!info) return;
    node = info.node;
  }

  const originalName = node.name || '';
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'wf-name-edit';
  input.value = originalName;

  labelEl.textContent = '';
  labelEl.appendChild(input);
  input.focus();
  input.select();

  let committed = false;
  function commit() {
    if (committed) return;
    committed = true;
    const newName = input.value.trim();
    if (newName && newName !== originalName) {
      saveSnapshot();
      node.name = newName;
      markModified();
      updateJSONPanel();
    }
    render();
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', ev => {
    ev.stopPropagation();
    if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
    if (ev.key === 'Escape') {
      input.removeEventListener('blur', commit);
      committed = true;
      render();
    }
  });
}

// ── Properties Panel ──

function renderPropsPanel() {
  const content = document.getElementById('wf-props-content');
  if (!content) return;
  // propsパネル内にフォーカスがある場合は再描画スキップ
  if (content.contains(document.activeElement) &&
      (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT' || document.activeElement.tagName === 'TEXTAREA')) {
    return;
  }
  content.innerHTML = '';

  if (selectedPath === null) {
    content.innerHTML = '<div class="wf-props-empty">No node selected</div>';
    return;
  }

  const info = getNodeByPath(selectedPath);
  if (!info) return;
  const node = info.node;
  const isContainer = !!(node.children);

  // プロパティ変更のヘルパー
  function applyProp(key, val) {
    saveSnapshot();
    if (val === '' || val === null || val === undefined) { delete node[key]; }
    else { node[key] = val; }
    markModified();
    render();
    updateJSONPanel();
  }

  // --- name ---
  addTextProp(content, 'name', node.name || '', v => applyProp('name', v || undefined), '要素名');

  // --- type (子ノードのみ) ---
  if (!isContainer) {
    const typeOptions = [
      ['', '(none)'], ['text', 'text'], ['button', 'button'], ['input', 'input'],
      ['select', 'select'], ['link', 'link'], ['image', 'image'], ['icon', 'icon'],
      ['card', 'card'], ['table', 'table'], ['divider', 'divider'],
    ];
    addSelectProp(content, 'type', node.type || node._originalType || '', typeOptions, v => {
      saveSnapshot();
      if (v) { node.type = v; delete node._originalType; } else { delete node.type; }
      // type変更時にtype固有フィールドをクリーンアップ
      if (v !== 'text') { delete node.variant; delete node.content; }
      if (v !== 'input' && v !== 'select') { delete node.placeholder; }
      if (v !== 'table') { delete node.columns; delete node.rows; }
      // tableに戻す場合はデフォルトのcolumns/rowsを復元
      if (v === 'table' && !node.columns) { node.columns = ['列1', '列2', '列3']; node.rows = 3; }
      markModified(); render(); updateJSONPanel();
      // フォーカスガードを回避するため一旦blurしてから再描画
      if (document.activeElement) document.activeElement.blur();
      renderPropsPanel();
    });

    // --- type固有プロパティ ---
    if (node.type === 'text') {
      addTextProp(content, 'content', node.content || '', v => applyProp('content', v || undefined), '表示テキスト');
      addSelectProp(content, 'variant', node.variant || '', [
        ['', '(default)'], ['display', 'display'], ['heading', 'heading'], ['caption', 'caption'],
      ], v => applyProp('variant', v || undefined));
    }
    if (node.type === 'input' || node.type === 'select') {
      addTextProp(content, 'placeholder', node.placeholder || '', v => applyProp('placeholder', v || undefined), '入力のヒントテキスト');
    }
    if (node.type === 'table') {
      addTextProp(content, 'columns', (node.columns || []).map(c => typeof c === 'string' ? c : c.name).join(', '), v => {
        saveSnapshot();
        node.columns = v ? v.split(',').map(s => s.trim()).filter(Boolean) : [];
        markModified(); render(); updateJSONPanel();
      }, 'カンマ区切りで列名');
      addNumberProp(content, 'rows', node.rows, v => applyProp('rows', v));
    }
  }

  // --- Size ---
  addGroupTitle(content, 'Size');
  addNumberProp(content, 'width', node.width, v => applyProp('width', v));
  addNumberProp(content, 'height', node.height, v => applyProp('height', v));
  addCheckProp(content, 'grow', !!node.grow, v => applyProp('grow', v || undefined));

  // --- Spacing ---
  addGroupTitle(content, 'Spacing');
  const padVal = Array.isArray(node.padding) ? node.padding.join(', ') : (node.padding ?? '');
  addTextProp(content, 'padding', String(padVal), v => {
    saveSnapshot();
    if (!v) { delete node.padding; }
    else if (v.includes(',')) { node.padding = v.split(',').map(s => Number(s.trim())).filter(n => !isNaN(n)).slice(0, 4); }
    else { const n = Number(v); node.padding = isNaN(n) ? undefined : n; }
    markModified(); render(); updateJSONPanel();
  }, '例: 8 または 8, 16');
  if (isContainer) {
    addNumberProp(content, 'gap', node.gap, v => applyProp('gap', v));
  }

  // --- Layout (コンテナのみ) ---
  if (isContainer) {
    addGroupTitle(content, 'Layout');
    addSelectProp(content, 'justify', node.justify || '', [
      ['', '(default)'], ['flex-start', 'flex-start'], ['center', 'center'],
      ['flex-end', 'flex-end'], ['space-between', 'space-between'], ['space-around', 'space-around'],
    ], v => applyProp('justify', v || undefined));
    addSelectProp(content, 'align', node.align || '', [
      ['', '(default)'], ['stretch', 'stretch'], ['flex-start', 'flex-start'],
      ['center', 'center'], ['flex-end', 'flex-end'],
    ], v => applyProp('align', v || undefined));
    addCheckProp(content, 'wrap', !!node.wrap, v => applyProp('wrap', v || undefined));
  }

  // --- Entity ---
  addGroupTitle(content, 'Entity');
  const viewEntities = (WIREFRAME_DATA?.view?.entities || []).map(e => e.entity);
  const entityOptions = [['', '(none)'], ...viewEntities.map(n => [n, n])];
  addSelectProp(content, '_entity', node._entity || '', entityOptions, v => {
    saveSnapshot();
    if (v) {
      node._entity = v;
      // エンティティ選択時にattributesを全選択
      const ent = findCmEntity(v);
      if (ent && ent.attributes && ent.attributes.length > 0) {
        const attrs = ent.attributes.map(a => typeof a === 'string' ? a.split(':')[0].trim() : (a.name || a));
        node._attributes = attrs;
        applyEntityToNode(node, v, attrs);
      }
    } else {
      delete node._entity; delete node._attributes;
    }
    markModified(); render(); updateJSONPanel();
    renderPropsPanel();
  });
  if (node._entity) {
    // view.entitiesから全属性一覧を取得、なければノードの_attributesを使用
    const viewEntity = findViewEntity(node._entity);
    let allAttrs;
    if (viewEntity && viewEntity.attributes && viewEntity.attributes.length > 0) {
      allAttrs = viewEntity.attributes.map(a => typeof a === 'string' ? a.split(':')[0].trim() : (a.name || a));
    } else {
      allAttrs = node._attributes ? [...node._attributes] : [];
    }
    if (allAttrs.length > 0) {
      const currentAttrs = node._attributes || [];
      addAttrCheckboxes(content, allAttrs, currentAttrs, selected => {
        saveSnapshot();
        if (selected.length > 0) { node._attributes = selected; } else { delete node._attributes; }
        applyEntityToNode(node, node._entity, selected);
        markModified(); render(); updateJSONPanel();
        renderPropsPanel();
      });
    }
  }

  // --- Note ---
  addGroupTitle(content, 'Note');
  addTextareaProp(content, null, node._note || '', v => {
    saveSnapshot();
    if (v) { node._note = v; } else { delete node._note; }
    markModified();
    render();
    updateJSONPanel();
  });
}

// PropsPanel ヘルパー
function addGroupTitle(container, title) {
  const el = document.createElement('div');
  el.className = 'wf-prop-group';
  el.textContent = title;
  container.appendChild(el);
}

function addTextProp(container, label, value, onChange, placeholder) {
  const row = document.createElement('div');
  row.className = 'wf-prop-row';
  const lbl = document.createElement('span');
  lbl.className = 'wf-prop-label';
  lbl.textContent = label;
  row.appendChild(lbl);
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'wf-prop-input';
  input.value = value;
  if (placeholder) input.placeholder = placeholder;
  input.addEventListener('change', () => onChange(input.value.trim()));
  input.addEventListener('keydown', e => e.stopPropagation());
  row.appendChild(input);
  container.appendChild(row);
}

function addNumberProp(container, label, value, onChange) {
  const row = document.createElement('div');
  row.className = 'wf-prop-row';
  const lbl = document.createElement('span');
  lbl.className = 'wf-prop-label';
  lbl.textContent = label;
  row.appendChild(lbl);
  const input = document.createElement('input');
  input.type = 'number';
  input.className = 'wf-prop-input';
  input.value = value != null ? value : '';
  input.placeholder = '—';
  input.addEventListener('change', () => {
    const v = input.value.trim();
    onChange(v === '' ? null : Number(v));
  });
  input.addEventListener('keydown', e => {
    e.stopPropagation();
    // Shift+矢印で±10
    if (e.shiftKey && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
      e.preventDefault();
      const current = input.value.trim() === '' ? 0 : Number(input.value);
      const delta = e.key === 'ArrowUp' ? 10 : -10;
      input.value = current + delta;
      input.dispatchEvent(new Event('change'));
    }
  });
  row.appendChild(input);
  container.appendChild(row);
}

function addCheckProp(container, label, checked, onChange) {
  const row = document.createElement('div');
  row.className = 'wf-prop-row';
  const lbl = document.createElement('label');
  lbl.className = 'wf-prop-check';
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = checked;
  cb.addEventListener('change', () => onChange(cb.checked));
  lbl.appendChild(cb);
  lbl.appendChild(document.createTextNode(label));
  row.appendChild(lbl);
  container.appendChild(row);
}

function addAttrCheckboxes(container, allAttrs, currentAttrs, onChange) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:4px 8px;padding:2px 0;';
  allAttrs.forEach(attr => {
    const lbl = document.createElement('label');
    lbl.className = 'wf-prop-check';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = currentAttrs.includes(attr);
    cb.addEventListener('change', () => {
      const selected = [];
      wrap.querySelectorAll('input[type="checkbox"]').forEach((c, i) => {
        if (c.checked) selected.push(allAttrs[i]);
      });
      onChange(selected);
    });
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(attr));
    wrap.appendChild(lbl);
  });
  container.appendChild(wrap);
}

function addTextareaProp(container, label, value, onChange) {
  const row = document.createElement('div');
  row.className = 'wf-prop-row';
  if (label) {
    const lbl = document.createElement('span');
    lbl.className = 'wf-prop-label';
    lbl.textContent = label;
    row.appendChild(lbl);
  }
  const ta = document.createElement('textarea');
  ta.className = 'wf-prop-textarea';
  ta.value = value;
  ta.placeholder = '実装の意図を自由に書く（例：ソート可能にしたい、クリックでモーダルを開く）';
  ta.addEventListener('change', () => onChange(ta.value.trim()));
  ta.addEventListener('keydown', e => e.stopPropagation());
  row.appendChild(ta);
  container.appendChild(row);
}

function addSelectProp(container, label, value, options, onChange) {
  const row = document.createElement('div');
  row.className = 'wf-prop-row';
  const lbl = document.createElement('span');
  lbl.className = 'wf-prop-label';
  lbl.textContent = label;
  row.appendChild(lbl);
  const sel = document.createElement('select');
  sel.className = 'wf-prop-select';
  options.forEach(([val, text]) => {
    const opt = document.createElement('option');
    opt.value = val;
    opt.textContent = text;
    if (val === value) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => onChange(sel.value));
  sel.addEventListener('keydown', e => e.stopPropagation());
  row.appendChild(sel);
  container.appendChild(row);
}

// ── Entity Panel ──

// view.entities から該当エンティティの属性一覧を取得
function findViewEntity(entityName) {
  if (!WIREFRAME_DATA || !WIREFRAME_DATA.view || !WIREFRAME_DATA.view.entities) return null;
  return WIREFRAME_DATA.view.entities.find(e => e.entity === entityName) || null;
}

// _noteインジケーターを要素に追加
function appendNoteIndicator(el, note) {
  if (!note) return;
  const dot = document.createElement('div');
  dot.className = 'wf-note-indicator';
  dot.title = note;
  el.appendChild(dot);
}

// エンティティ選択・属性変更時にノードtypeに応じた内容を自動補完
function applyEntityToNode(node, entityName, attrs) {
  const t = node.type || node._originalType;
  if (!t) return;
  switch (t) {
    case 'table':
      // columnsを属性から設定
      node.columns = attrs.length > 0 ? [...attrs] : ['列1', '列2', '列3'];
      break;
    case 'card':
      // childrenが空なら属性をテキストノードとして生成しコンテナに変換
      if (!node.children || node.children.length === 0) {
        node.children = attrs.map(a => ({ name: a, type: 'text', content: a }));
        node._originalType = 'card';
        delete node.type;
        node.direction = 'vertical';
      }
      break;
    case 'select':
      // nameが未設定なら最初の属性名を反映
      if (attrs.length > 0 && !node.name) {
        node.name = attrs[0];
      }
      break;
    case 'text':
      // contentが空ならエンティティ名を設定
      if (!node.content) {
        node.content = entityName;
      }
      break;
    case 'input':
      // placeholderが空なら最初の属性名を設定
      if (!node.placeholder && attrs.length > 0) {
        node.placeholder = attrs[0] + 'を入力...';
      }
      break;
  }
}

function renderEntityPanel() {
  const list = document.getElementById('wf-entity-list');
  list.innerHTML = '';

  if (!WIREFRAME_DATA) {
    list.innerHTML = '<div class="wf-entity-card-no-data">No data</div>';
    return;
  }

  const v = WIREFRAME_DATA.view;
  // entities配列を取得（旧形式entityもフォールバック）
  let entities = [];
  if (v && v.entities && v.entities.length > 0) {
    entities = v.entities;
  } else if (v && v.entity) {
    entities = [{ entity: v.entity }];
  }

  if (entities.length === 0) {
    list.innerHTML = '<div class="wf-entity-card-no-data">No entities defined</div>';
    return;
  }

  // ツリーを走査して使用中の属性を収集
  const usedAttrMap = new Map();
  (function collectAll(n) {
    if (n._entity && n._attributes) {
      if (!usedAttrMap.has(n._entity)) usedAttrMap.set(n._entity, new Set());
      const set = usedAttrMap.get(n._entity);
      n._attributes.forEach(a => set.add(a));
    }
    if (n.children) n.children.forEach(collectAll);
  })(WIREFRAME_DATA.root);

  entities.forEach(ent => {
    const card = document.createElement('div');
    card.className = 'wf-entity-card';

    // ヘッダー
    const header = document.createElement('div');
    header.className = 'wf-entity-card-header';
    const nameSpan = document.createElement('span');
    nameSpan.className = 'wf-entity-card-name';
    nameSpan.textContent = ent.entity;
    header.appendChild(nameSpan);
    card.appendChild(header);

    // view.entities[].attributesから全属性を表示（使用中はハイライト）
    const allAttrs = ent.attributes || [];
    const usedSet = usedAttrMap.get(ent.entity) || new Set();
    if (allAttrs.length > 0) {
      const attrsDiv = document.createElement('div');
      attrsDiv.className = 'wf-entity-card-attrs';
      allAttrs.forEach(attr => {
        const attrSpan = document.createElement('span');
        attrSpan.className = 'wf-entity-card-attr';
        // 属性名部分（"属性名: 説明" の "属性名" 部分）で使用中か判定
        const attrName = attr.split(':')[0].trim();
        if (usedSet.has(attrName) || usedSet.has(attr)) {
          attrSpan.classList.add('wf-entity-card-attr-used');
        }
        attrSpan.textContent = attr;
        attrsDiv.appendChild(attrSpan);
      });
      card.appendChild(attrsDiv);
    }

    list.appendChild(card);
  });
}

// ── Render ──

function createGrabBar(name, path, direction) {
  const bar = document.createElement('div');
  bar.className = 'wf-grab-bar';
  bar.draggable = true;
  const grip = document.createElement('span');
  grip.className = 'wf-grip';
  grip.textContent = '\u2817';
  bar.appendChild(grip);
  const label = document.createElement('span');
  label.textContent = name;
  bar.appendChild(label);

  // direction切り替えボタン（childrenを持つコンテナのみ）
  if (direction) {
    const toggle = document.createElement('button');
    toggle.className = 'wf-dir-toggle';
    toggle.title = direction === 'vertical' ? 'Switch to horizontal' : 'Switch to vertical';
    toggle.textContent = direction === 'vertical' ? '\u2195' : '\u2194';
    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      e.preventDefault();
      toggleDirection(path);
    });
    // ドラッグ開始を抑止
    toggle.addEventListener('mousedown', (e) => e.stopPropagation());
    toggle.draggable = false;
    bar.appendChild(toggle);
  }

  return bar;
}

function calcPlaceholderBarWidth(row, col) {
  const seed = (row * 7 + col * 13) % 5;
  return 50 + seed * 10;
}

function renderNode(node, container, path) {
  if (node.type === 'divider') {
    const el = document.createElement('div');
    el.className = 'wf-type-divider';
    el.dataset.path = path;
    el.draggable = true;
    appendNoteIndicator(el, node._note);
    container.appendChild(el);
    return;
  }

  if (node.type === 'table' && node.columns) {
    const el = document.createElement('div');
    el.className = 'wf-node wf-type-table';
    if (node.grow) el.classList.add('wf-grow');
    el.dataset.path = path;
    el.draggable = false;
    if (node.width) el.style.width = typeof node.width === 'number' ? `${node.width}px` : node.width;
    if (node.height) el.style.height = `${node.height}px`;
    if (node.maxWidth) el.style.maxWidth = `${node.maxWidth}px`;

    // Grab bar (compound node)
    el.appendChild(createGrabBar(node.name || 'Table', path, null));

    appendNoteIndicator(el, node._note);

    // Header row
    const header = document.createElement('div');
    header.className = 'wf-table-row wf-table-row-header';
    node.columns.forEach(col => {
      const colName = typeof col === 'string' ? col : (col.name || '');
      const colGrow = typeof col === 'string' ? false : col.grow;
      const colWidth = typeof col === 'string' ? undefined : col.width;
      const cell = document.createElement('div');
      cell.className = 'wf-table-cell' + (colGrow ? ' wf-table-cell-grow' : '');
      if (colWidth) cell.style.width = `${colWidth}px`;
      if (!colGrow && !colWidth) cell.classList.add('wf-table-cell-grow');
      cell.textContent = colName;
      header.appendChild(cell);
    });
    el.appendChild(header);

    // Data rows
    const rows = node.rows || 3;
    for (let r = 0; r < rows; r++) {
      const row = document.createElement('div');
      row.className = 'wf-table-row';
      node.columns.forEach((col, c) => {
        const colGrow = typeof col === 'string' ? false : col.grow;
        const colWidth = typeof col === 'string' ? undefined : col.width;
        const cell = document.createElement('div');
        cell.className = 'wf-table-cell' + (colGrow ? ' wf-table-cell-grow' : '');
        if (colWidth) cell.style.width = `${colWidth}px`;
        if (!colGrow && !colWidth) cell.classList.add('wf-table-cell-grow');
        const bar = document.createElement('div');
        bar.className = 'wf-table-bar';
        bar.style.width = `${calcPlaceholderBarWidth(r, c)}%`;
        cell.appendChild(bar);
        row.appendChild(cell);
      });
      el.appendChild(row);
    }

    container.appendChild(el);
    return;
  }

  const el = document.createElement('div');
  const classes = ['wf-node'];
  const hasChildren = node.children && node.children.length > 0;
  const typeClass = node.type ? `wf-type-${node.type}` : '';

  if (typeClass) classes.push(typeClass);
  if (node.grow) classes.push('wf-grow');
  if (node.wrap) classes.push('wf-wrap');

  el.className = classes.join(' ');
  el.dataset.path = path;
  el.draggable = !hasChildren;

  // Direction
  const dir = node.direction || (hasChildren ? 'vertical' : null);
  if (dir) el.dataset.direction = dir;

  // Sizing
  if (node.width) el.style.width = typeof node.width === 'number' ? `${node.width}px` : node.width;
  if (node.height) {
    el.style.height = `${node.height}px`;
  }
  if (node.maxWidth) el.style.maxWidth = `${node.maxWidth}px`;

  // Layout
  if (node.gap) el.style.gap = `${node.gap}px`;
  if (node.justify) el.style.justifyContent = node.justify;
  if (node.align) el.style.alignItems = node.align;

  // Padding（非数値・負数をサニタイズ）
  if (node.padding != null) {
    if (Array.isArray(node.padding)) {
      el.style.padding = node.padding.map(v => `${Math.max(0, Number(v) || 0)}px`).join(' ');
    } else {
      el.style.padding = `${Math.max(0, Number(node.padding) || 0)}px`;
    }
  }

  // Label / Grab bar
  if (hasChildren) {
    el.appendChild(createGrabBar(node.name || '', path, dir));
  } else if (node.name && !node.type) {
    const label = document.createElement('span');
    label.className = 'wf-label';
    label.textContent = node.name;
    el.appendChild(label);
  }

  // Leaf content for typed elements（テキスト系はspanで追加し、既存の子要素を壊さない）
  if (node.type && !hasChildren) {
    switch (node.type) {
      case 'text': {
        const span = document.createElement('span');
        span.textContent = node.content || node.name || 'Text';
        el.appendChild(span);
        if (node.variant) el.dataset.variant = node.variant;
        break;
      }
      case 'image': {
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('width', '24'); svg.setAttribute('height', '24');
        svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'none');
        svg.setAttribute('stroke', 'currentColor'); svg.setAttribute('stroke-width', '1.5');
        svg.style.color = 'var(--text-muted)';
        const ns = 'http://www.w3.org/2000/svg';
        const rect = document.createElementNS(ns, 'rect');
        rect.setAttribute('x', '3'); rect.setAttribute('y', '3');
        rect.setAttribute('width', '18'); rect.setAttribute('height', '18'); rect.setAttribute('rx', '2');
        svg.appendChild(rect);
        const circle = document.createElementNS(ns, 'circle');
        circle.setAttribute('cx', '8.5'); circle.setAttribute('cy', '8.5'); circle.setAttribute('r', '1.5');
        svg.appendChild(circle);
        const pathEl = document.createElementNS(ns, 'path');
        pathEl.setAttribute('d', 'm21 15-5-5L5 21');
        svg.appendChild(pathEl);
        el.appendChild(svg);
        break;
      }
      case 'icon':
        if (!node.width) el.style.width = '32px';
        if (!node.height) el.style.height = '32px';
        break;
      case 'button': case 'link': case 'input': case 'select': {
        const span = document.createElement('span');
        span.textContent = node.name || node.type;
        el.appendChild(span);
        break;
      }
      case 'card': {
        const cardLabel = document.createElement('span');
        cardLabel.className = 'wf-card-label';
        cardLabel.textContent = node.name || 'Card';
        el.appendChild(cardLabel);
        break;
      }
    }
  }

  // _note / _entity / _attributes（Leaf content の後に追加）
  appendNoteIndicator(el, node._note);
  if (node._entity) {
    const badge = document.createElement('span');
    badge.className = 'wf-entity-badge';
    badge.textContent = node._entity;
    el.appendChild(badge);
  }
  if (node._attributes && node._attributes.length > 0) {
    const attrEl = document.createElement('div');
    attrEl.className = 'wf-entity-attrs';
    attrEl.textContent = node._attributes.join(' \u00b7 ');
    el.appendChild(attrEl);
  }

  // Render children
  if (hasChildren) {
    node.children.forEach((child, i) => {
      renderNode(child, el, path !== undefined ? `${path}.${i}` : `${i}`);
    });
  }

  container.appendChild(el);
}

function render() {
  const viewport = document.getElementById('wf-root');
  viewport.innerHTML = '';

  const vp = WIREFRAME_DATA.viewport || {};
  viewport.className = 'wf-viewport';
  if (vp.width) viewport.style.width = `${vp.width}px`;
  if (vp.height) viewport.style.minHeight = `${vp.height}px`;

  if (WIREFRAME_DATA.root) {
    // Render root's children directly (root itself is the viewport)
    if (WIREFRAME_DATA.root.children) {
      // Apply root direction to viewport
      viewport.style.display = 'flex';
      viewport.style.position = 'relative';
      const rootDir = WIREFRAME_DATA.root.direction || 'vertical';
      viewport.style.flexDirection = rootDir === 'horizontal' ? 'row' : 'column';
      if (WIREFRAME_DATA.root.gap) viewport.style.gap = `${WIREFRAME_DATA.root.gap}px`;
      if (WIREFRAME_DATA.root.padding != null) {
        const p = WIREFRAME_DATA.root.padding;
        viewport.style.padding = Array.isArray(p) ? p.map(v => `${Math.max(0, Number(v) || 0)}px`).join(' ') : `${Math.max(0, Number(p) || 0)}px`;
      }
      if (WIREFRAME_DATA.root.justify) viewport.style.justifyContent = WIREFRAME_DATA.root.justify;
      if (WIREFRAME_DATA.root.align) viewport.style.alignItems = WIREFRAME_DATA.root.align;
      if (WIREFRAME_DATA.root.wrap) viewport.style.flexWrap = 'wrap';

      // rootノード用のgrab bar（direction切り替え用）
      viewport.appendChild(createGrabBar(WIREFRAME_DATA.root.name || 'Root', null, rootDir));

      WIREFRAME_DATA.root.children.forEach((child, i) => {
        renderNode(child, viewport, `${i}`);
      });
    }
  }

  // render後にDOM上の選択状態を再適用
  updateSelection();
}

let _initialized = false;

function init() {
  if (!WIREFRAME_DATA) {
    document.getElementById('wf-root').textContent = 'No wireframe data found. Click "Open JSON" to load a file.';
    document.getElementById('wf-entity-list').innerHTML = '<div class="wf-entity-card-no-data">No data</div>';
    return;
  }

  document.title = (WIREFRAME_DATA.name || 'Wireframe') + ' — WIREFRAME';

  // ビュー情報表示
  const info = document.getElementById('wf-view-info');
  info.innerHTML = '';
  if (WIREFRAME_DATA.view) {
    const v = WIREFRAME_DATA.view;
    const primaryEntity = v.entities && v.entities.length > 0
      ? v.entities[0].entity
      : (v.entity || '');
    if (primaryEntity) {
      const s = document.createElement('span');
      const label1 = document.createElement('span');
      label1.className = 'wf-view-label';
      label1.textContent = 'View:';
      s.appendChild(label1);
      s.appendChild(document.createTextNode(primaryEntity));
      info.appendChild(s);
    }
    if (v.context) {
      const s = document.createElement('span');
      const label2 = document.createElement('span');
      label2.className = 'wf-view-label';
      label2.textContent = 'Context:';
      s.appendChild(label2);
      s.appendChild(document.createTextNode(v.context));
      info.appendChild(s);
    }
    if (v.primaryType) {
      const s = document.createElement('span');
      const label3 = document.createElement('span');
      label3.className = 'wf-view-label';
      label3.textContent = 'Type:';
      s.appendChild(label3);
      s.appendChild(document.createTextNode(v.primaryType));
      info.appendChild(s);
    }
  }

  // エンティティパネル描画
  renderEntityPanel();

  // イベントリスナーは初回のみ登録
  if (!_initialized) {
    _initialized = true;
    const viewport = document.getElementById('wf-root');
    viewport.addEventListener('dragstart', handleDragStart);
    viewport.addEventListener('dragend', handleDragEnd);
    viewport.addEventListener('dragover', handleDragOver);
    viewport.addEventListener('drop', handleDrop);
    viewport.addEventListener('click', handleNodeClick);
    viewport.addEventListener('dblclick', handleNodeDblClick);
    document.addEventListener('keydown', handleKeyDown);

    document.getElementById('wf-viewport-wrap').addEventListener('click', (e) => {
      if (e.target.closest('#wf-root [data-path]')) return;
      selectedPath = null;
      updateSelection();
    });
  }

  render();
  updateJSONPanel();
}

init();
</script>
