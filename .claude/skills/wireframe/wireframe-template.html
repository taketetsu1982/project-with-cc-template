<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe Preview</title>
<style>
  :root {
    /* Text */
    --text-primary: #333;
    --text-secondary: #555;
    --text-tertiary: #888;
    --text-muted: #B0B0B0;

    /* Background */
    --bg-page: #F8F8F8;
    --bg-surface: #FFF;
    --bg-panel: #FAFAFA;
    --bg-subtle: #F0F0F0;
    --bg-placeholder: #E8E8E8;
    --bg-placeholder-dark: #DDD;
    --bg-dark: #333;

    /* Border */
    --border-default: #E0E0E0;
    --border-light: #F0F0F0;

    /* Accent */
    --accent: #4A90D9;
    --accent-bg: #E8F0FE;
    --drop-indicator: #29b3f1;
    --success-bg: #E8F5E9;
    --success-border: #A5D6A7;
    --success-text: #2E7D32;

    /* Status */
    --status-connected: #4CAF50;
    --status-saving: #FF9800;
    --status-error: #F44336;
    --accent-overlay: rgba(74, 144, 217, 0.08);
    --shadow-dropdown: rgba(0, 0, 0, 0.1);
    --drop-indicator-bg: rgba(41, 179, 241, 0.06);
    --accent-bg-subtle: rgba(74, 144, 217, 0.06);
    --hover-bg: rgba(0, 0, 0, 0.015);

    /* Radius */
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-full: 999px;

    /* Font size — 12:16:24:32 (ratio 3:4:6:8) */
    --font-sm: 12px;
    --font-base: 16px;
    --font-lg: 24px;
    --font-xl: 32px;

    /* Font family */
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-mono: 'SF Mono', Monaco, 'Cascadia Code', 'Consolas', monospace;

    /* Spacing — 8px base grid */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    font-size: var(--font-base);
    background: var(--bg-page);
    color: var(--text-primary);
    display: grid;
    grid-template-rows: 48px 1fr;
    grid-template-columns: 7fr 3fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Toolbar ── */
  #wf-toolbar {
    grid-column: 1 / -1;
    height: 48px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border-default);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--space-lg);
    z-index: 100;
    font-size: 13px;
  }

  #wf-toolbar-left {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    flex: 1;
  }

  #wf-toolbar-title {
    font-weight: 600;
    font-size: 20px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  #wf-edited-badge {
    display: none;
    background: var(--accent-bg);
    color: var(--accent);
    font-weight: 600;
    padding: var(--space-xs) var(--space-sm);
    border-radius: var(--radius-full);
  }

  #wf-toolbar-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  #wf-toolbar-actions {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    flex: 1;
    justify-content: flex-end;
  }

  .wf-btn {
    padding: 6px 14px;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    background: var(--bg-surface);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-primary);
    transition: background 0.15s;
  }

  .wf-btn:hover { background: var(--bg-subtle); text-decoration: none; }
  .wf-btn:active { background: var(--border-default); }

  .wf-btn-success {
    background: var(--success-bg);
    border-color: var(--success-border);
    color: var(--success-text);
  }

  /* ── View info (右ペイン) ── */
  #wf-view-info {
    padding: var(--space-sm) var(--space-md);
    border-bottom: 1px solid var(--border-default);
    font-size: var(--font-sm);
    color: var(--text-secondary);
    display: flex;
    flex-direction: column;
    gap: 4px;
    line-height: 1.5;
  }
  #wf-view-info .wf-view-label { color: var(--text-tertiary); margin-right: 4px; }

  /* ── _entity badge on nodes ── */
  .wf-entity-badge {
    position: absolute;
    top: 2px;
    right: var(--space-xs);
    font-size: 10px;
    color: var(--text-tertiary);
    background: var(--bg-subtle);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    padding: 1px 4px;
    pointer-events: none;
    z-index: 1;
    white-space: nowrap;
  }

  .wf-entity-attrs {
    font-size: 10px;
    color: var(--text-tertiary);
    padding: 0 var(--space-xs);
    pointer-events: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Viewport ── */
  #wf-viewport-wrap {
    grid-column: 1;
    padding: var(--space-lg);
    overflow-y: auto;
  }

  .wf-viewport {
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    overflow: hidden;
    margin: 0 auto;
  }

  /* ── Entity Panel (右ペイン) ── */
  #wf-entity-panel {
    grid-column: 2;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border-default);
    background: var(--bg-panel);
    overflow: hidden;
  }

  #wf-entity-panel-header {
    height: 40px;
    min-height: 40px;
    padding: 0 var(--space-md);
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-default);
    display: flex;
    align-items: center;
    font-size: var(--font-sm);
    font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  #wf-entity-panel-note {
    padding: var(--space-sm) var(--space-md);
    font-size: var(--font-sm);
    color: var(--text-muted);
    border-bottom: 1px solid var(--border-default);
    line-height: 1.5;
  }

  #wf-entity-list {
    flex: 1;
    overflow-y: auto;
    padding: var(--space-md);
    display: flex;
    flex-direction: column;
    gap: var(--space-sm);
  }

  .wf-entity-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    padding: var(--space-sm) var(--space-md);
    cursor: pointer;
    transition: outline 0.15s;
  }
  .wf-entity-card:hover {
    outline: 1px solid var(--accent);
    outline-offset: -1px;
  }
  .wf-entity-card.wf-entity-card-active {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
    background: var(--accent-bg);
  }

  .wf-entity-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-xs);
  }

  .wf-entity-card-name {
    font-weight: 600;
    color: var(--text-primary);
    font-size: var(--font-base);
  }

  .wf-entity-card-role {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
  }

  .wf-entity-card-attrs {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-xs);
  }

  .wf-entity-card-attr {
    font-size: 11px;
    color: var(--text-tertiary);
    background: var(--bg-subtle);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-full);
    padding: 1px 8px;
    white-space: nowrap;
  }

  .wf-entity-card-no-data {
    font-size: var(--font-sm);
    color: var(--text-muted);
    padding: var(--space-md);
    text-align: center;
  }

  /* ── Save status button ── */
  .save-status-btn {
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
    font-size: 13px;
    color: var(--text-tertiary);
    background: none;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    cursor: pointer;
    font-family: var(--font-sans);
    transition: border-color 0.15s, color 0.15s;
  }
  .save-status-btn:hover { border-color: var(--accent); color: var(--accent); }
  .save-status-btn .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border-default);
    flex-shrink: 0;
  }
  .save-status-btn .dot.connected { background: var(--status-connected); }
  .save-status-btn .dot.saving { background: var(--status-saving); }
  .save-status-btn .dot.error { background: var(--status-error); }
  .save-status-btn .save-hint { color: var(--text-muted); }

  /* ── Toast ── */
  #wf-toast {
    position: fixed;
    bottom: var(--space-lg);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-dark);
    color: var(--bg-surface);
    padding: var(--space-sm) var(--space-lg);
    border-radius: var(--radius-md);
    font-size: var(--font-sm);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 200;
  }

  #wf-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Base node ── */
  .wf-node {
    display: flex;
    position: relative;
    min-height: 0;
    min-width: 0;
    transition: opacity 0.15s;
  }

  .wf-node[data-direction="vertical"] { flex-direction: column; }
  .wf-node[data-direction="horizontal"] { flex-direction: row; }

  .wf-grow { flex: 1; }
  .wf-wrap { flex-wrap: wrap; }

  /* Draggable cursor */
  .wf-node[draggable="true"] { cursor: grab; }
  .wf-node[draggable="true"]:active { cursor: grabbing; }

  /* Dragging state */
  .wf-dragging { opacity: 0.3; }

  /* Drop target highlight */
  .wf-drag-over { outline: 4px solid var(--drop-indicator) !important; outline-offset: -4px; background: var(--drop-indicator-bg) !important; }
  .wf-drag-over > .wf-label { color: var(--drop-indicator) !important; }

  /* 選択状態 */
  .wf-selected { outline: 2px solid var(--accent) !important; outline-offset: -2px; background: var(--accent-bg-subtle) !important; }
  .wf-selected > .wf-label { color: var(--accent) !important; }

  /* エンティティハイライト */
  .wf-entity-highlight { outline: 2px solid var(--status-saving) !important; outline-offset: -2px; background: var(--accent-overlay) !important; }

  /* ── Node name label ── */
  .wf-label {
    position: absolute;
    top: 2px;
    left: var(--space-xs);
    font-size: var(--font-sm);
    font-weight: 500;
    color: var(--text-muted);
    pointer-events: none;
    z-index: 1;
    white-space: nowrap;
  }

  .wf-node:hover > .wf-label { color: var(--text-primary); }
  .wf-node:hover { outline: 1px dashed var(--text-muted); outline-offset: -1px; background: var(--hover-bg); }

  /* ── Grab bar for compound nodes ── */
  .wf-grab-bar {
    display: none;
    align-items: center;
    gap: 8px;
    height: 28px;
    max-height: 100%;
    overflow: hidden;
    padding: 0 var(--space-md);
    cursor: grab;
    font-size: var(--font-sm);
    font-weight: 500;
    color: var(--text-tertiary);
    background: color-mix(in srgb, var(--bg-panel) 92%, transparent);
    border-bottom: 1px solid var(--border-light);
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    user-select: none;
  }
  .wf-node:hover:not(:has(.wf-node:hover)) > .wf-grab-bar,
  #wf-root:hover:not(:has(.wf-node:hover)) > .wf-grab-bar {
    display: flex;
  }
  .wf-grab-bar:hover {
    background: var(--bg-subtle);
    color: var(--text-secondary);
  }
  .wf-grab-bar:active { cursor: grabbing; }
  .wf-grab-bar .wf-grip { font-size: 11px; letter-spacing: 1px; opacity: 0.5; }
  .wf-grab-bar:hover .wf-grip { opacity: 0.8; }

  /* ── Grab bar hover trigger zone ──
     コンテナ上端にinvisibleなhitゾーンを配置し、
     子ノードのhoverをブロックしてgrab barへのマウス到達を確保する。
     :hover時のみ有効にしてドラッグ操作への干渉を防ぐ */
  .wf-node:has(> .wf-grab-bar)::after,
  #wf-root:has(> .wf-grab-bar)::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 28px;
    z-index: 9;
    pointer-events: none;
  }
  .wf-node:hover:has(> .wf-grab-bar)::after,
  #wf-root:hover:has(> .wf-grab-bar)::after {
    pointer-events: auto;
  }

  /* ── Direction toggle button ── */
  .wf-dir-toggle {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    padding: 2px 6px;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    color: var(--text-tertiary);
    transition: background 0.15s, color 0.15s;
    user-select: none;
  }
  .wf-dir-toggle:hover {
    background: var(--accent-bg);
    color: var(--accent);
    border-color: var(--accent);
  }

  /* ── Drop indicator ── */
  .wf-drop-indicator {
    position: absolute;
    background: var(--drop-indicator);
    z-index: 50;
    pointer-events: none;
    border-radius: 2px;
  }

  /* ── Element type placeholders ── */

  .wf-type-text {
    color: var(--text-primary);
    font-size: var(--font-base);
    padding: var(--space-sm) 0;
    display: flex;
    align-items: center;
  }

  .wf-type-text[data-variant="display"] { font-size: var(--font-xl); font-weight: 600; }
  .wf-type-text[data-variant="heading"] { font-size: var(--font-lg); font-weight: 600; }
  .wf-type-text[data-variant="caption"] { font-size: var(--font-sm); color: var(--text-tertiary); }

  .wf-type-image {
    background: var(--bg-placeholder);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    min-height: 40px;
  }

  .wf-type-icon {
    background: var(--bg-placeholder-dark);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-tertiary);
  }

  .wf-type-button {
    background: var(--bg-dark);
    border-radius: var(--radius-md);
    padding: var(--space-sm) var(--space-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--bg-surface);
    font-size: var(--font-base);
    font-weight: 500;
    min-height: 40px;
    cursor: default;
  }

  .wf-type-link {
    padding: var(--space-sm) 0;
    display: flex;
    align-items: center;
    color: var(--text-primary);
    font-size: var(--font-base);
    font-weight: 500;
    text-decoration: underline;
    text-underline-offset: 3px;
    min-height: 40px;
    cursor: default;
  }

  .wf-type-input {
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    padding: var(--space-sm) var(--space-md);
    color: var(--text-tertiary);
    font-size: var(--font-base);
    min-height: 40px;
    display: flex;
    align-items: center;
  }

  .wf-type-card {
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    background: var(--bg-panel);
    min-height: 80px;
    padding: var(--space-md);
    display: flex;
    flex-direction: column;
  }

  .wf-card-label {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
  }

  .wf-type-divider {
    height: 1px;
    background: var(--border-default);
    width: 100%;
    flex-shrink: 0;
  }

  .wf-type-table {
    width: 100%;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    overflow: hidden;
    display: block;
  }

  .wf-table-row {
    display: flex;
    border-bottom: 1px solid var(--border-default);
  }

  .wf-table-row:last-child { border-bottom: none; }

  .wf-table-row-header {
    background: var(--bg-subtle);
    border-bottom: 1px solid var(--border-default);
  }

  .wf-table-cell {
    padding: 14px var(--space-md);
    font-size: var(--font-base);
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    border-right: 1px solid var(--border-light);
    min-width: 0;
  }

  .wf-table-cell:last-child { border-right: none; }

  .wf-table-row-header .wf-table-cell {
    font-size: var(--font-sm);
    font-weight: 600;
    color: var(--text-primary);
  }

  .wf-table-cell-grow { flex: 1; }

  .wf-table-bar {
    height: 12px;
    background: var(--bg-placeholder-dark);
    border-radius: var(--radius-sm);
  }
</style>
</head>
<body>

<div id="wf-toolbar">
  <div id="wf-toolbar-left">
    <span id="wf-toolbar-title"></span>
    <button class="save-status-btn" id="wf-connect-btn" onclick="connectFile()"><span class="dot" id="wf-save-dot"></span><span id="wf-save-label">Connect</span> <span class="save-hint" id="wf-save-hint">(Drop a JSON file)</span></button>
    <span id="wf-edited-badge">Edited</span>
  </div>
  <div id="wf-toolbar-actions">
    <button class="wf-btn" onclick="handleUndo()" title="Undo (⌘Z)">↩ Undo</button>
    <button class="wf-btn" onclick="handleRedo()" title="Redo (⌘⇧Z)">↪ Redo</button>
  </div>
</div>

<div id="wf-viewport-wrap">
  <div id="wf-root"></div>
</div>

<div id="wf-entity-panel">
  <div id="wf-entity-panel-header">
    <span>View</span>
  </div>
  <div id="wf-view-info"></div>
  <div id="wf-entity-panel-note">
    Entities &amp; attributes are read-only.<br>Edit in Conceptual Model.
  </div>
  <div id="wf-entity-list"></div>
</div>

<div id="wf-toast"></div>

<script>
const WIREFRAME_DATA = null; // %%WIREFRAME_DATA%%
const CM_DATA = null; // スキル実行時にconceptual-model.jsonで置換される

let modified = false;
let dragPath = null;
let dropIndicator = null;
let fileHandle = null;
let selectedPath = null;
let clipboardNode = null;
let highlightedEntity = null;
const undoStack = [];
const redoStack = [];
const MAX_UNDO = 50;
const WF_FILENAME = null; // スキル実行時に置換される
const originalFilename = WF_FILENAME || (WIREFRAME_DATA?.name || 'wireframe').replace(/\s+/g, '-').toLowerCase() + '.wireframe.json';
let dirHandle = null;
let saveTimer = null;

// ── Undo / Redo ──

function saveSnapshot() {
  undoStack.push(JSON.stringify(WIREFRAME_DATA.root));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  // 新しい操作が入ったらredo履歴をクリア
  redoStack.length = 0;
}

function handleUndo() {
  if (undoStack.length === 0) return;
  // 現在の状態をredo stackに保存
  redoStack.push(JSON.stringify(WIREFRAME_DATA.root));
  WIREFRAME_DATA.root = JSON.parse(undoStack.pop());
  selectedPath = null;

  render();
  updateJSONPanel();
  showToast('Undo');

  // undoで全て戻した場合はeditedバッジを消す
  if (undoStack.length === 0) {
    modified = false;
    document.getElementById('wf-edited-badge').style.display = 'none';
  }
}

function handleRedo() {
  if (redoStack.length === 0) return;
  // 現在の状態をundo stackに保存
  undoStack.push(JSON.stringify(WIREFRAME_DATA.root));
  WIREFRAME_DATA.root = JSON.parse(redoStack.pop());
  selectedPath = null;

  markModified();

  render();
  updateJSONPanel();
  showToast('Redo');
}

// ── JSON tree traversal ──

function getNodeByPath(path) {
  if (!path && path !== '0') return null;
  const indices = String(path).split('.').map(Number);
  let parent = WIREFRAME_DATA.root;
  let node = parent;
  let index = 0;

  for (let i = 0; i < indices.length; i++) {
    parent = node;
    index = indices[i];
    node = parent.children[index];
    if (!node) return null;
  }

  return { parent, index, node };
}

function getParentPath(path) {
  const parts = String(path).split('.');
  if (parts.length <= 1) return null;
  return parts.slice(0, -1).join('.');
}

// ── Drag and Drop ──

function handleDragStart(e) {
  const bar = e.target.closest('.wf-grab-bar');
  let nodeEl;
  if (bar) {
    nodeEl = bar.closest('.wf-node[data-path]');
  } else {
    nodeEl = e.target.closest('.wf-node[data-path]');
  }
  if (!nodeEl) return;

  dragPath = nodeEl.dataset.path;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragPath);

  requestAnimationFrame(() => nodeEl.classList.add('wf-dragging'));
}

function handleDragEnd(e) {
  const dragging = document.querySelector('.wf-dragging');
  if (dragging) dragging.classList.remove('wf-dragging');

  document.querySelectorAll('.wf-drag-over').forEach(el => el.classList.remove('wf-drag-over'));
  removeDropIndicator();
  dragPath = null;
}

function distToRect(x, y, rect) {
  const dx = Math.max(rect.left - x, 0, x - rect.right);
  const dy = Math.max(rect.top - y, 0, y - rect.bottom);
  return Math.sqrt(dx * dx + dy * dy);
}

function findClosestSibling(e) {
  if (!dragPath) return null;

  const parentPath = getParentPath(dragPath);
  // Find the parent DOM element
  let parentEl;
  if (parentPath === null) {
    // Dragged node is a root child — parent is the viewport
    parentEl = document.getElementById('wf-root');
  } else {
    parentEl = document.querySelector(`.wf-node[data-path="${parentPath}"]`);
  }
  if (!parentEl) return null;

  // Get direct child nodes with data-path (siblings of dragged node)
  const siblings = parentEl.querySelectorAll(':scope > [data-path]');
  let closest = null;
  let closestDist = Infinity;

  for (const sib of siblings) {
    if (sib.dataset.path === dragPath) continue;
    const rect = sib.getBoundingClientRect();
    const dist = distToRect(e.clientX, e.clientY, rect);
    if (dist < closestDist) {
      closestDist = dist;
      closest = sib;
    }
  }

  return closest;
}

let wfDropTarget = null; // { path, before, intoGroup }

function findClosestNode(e) {
  if (!dragPath) return null;
  const allNodes = document.querySelectorAll('#wf-root [data-path]');
  let closest = null;
  let closestDist = Infinity;
  for (const el of allNodes) {
    if (el.dataset.path === dragPath) continue;
    // ドラッグ中ノードの子孫を除外
    if (el.dataset.path.startsWith(dragPath + '.')) continue;
    const rect = el.getBoundingClientRect();
    const dist = distToRect(e.clientX, e.clientY, rect);
    if (dist < closestDist) {
      closestDist = dist;
      closest = el;
    }
  }
  return closest;
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';

  if (!dragPath) return;

  const nodeEl = findClosestNode(e);
  if (!nodeEl) { removeDropIndicator(); wfDropTarget = null; return; }

  const targetPath = nodeEl.dataset.path;
  if (targetPath === dragPath) { removeDropIndicator(); wfDropTarget = null; return; }

  const targetInfo = getNodeByPath(targetPath);
  if (!targetInfo) return;
  const targetNode = targetInfo.node;
  const rect = nodeEl.getBoundingClientRect();

  // コンテナノード（childrenあり）: 端→兄弟挿入、中央→グループ内ドロップ
  if (targetNode.children) {
    const parentDir = (targetInfo.parent.direction || 'vertical');
    const threshold = Math.min(parentDir === 'vertical' ? rect.height * 0.25 : rect.width * 0.25, 30);

    if (parentDir === 'vertical' && e.clientY < rect.top + threshold) {
      wfDropTarget = { path: targetPath, before: true, intoGroup: false };
      showDropIndicator(nodeEl, true, true);
    } else if (parentDir === 'vertical' && e.clientY > rect.bottom - threshold) {
      wfDropTarget = { path: targetPath, before: false, intoGroup: false };
      showDropIndicator(nodeEl, true, false);
    } else if (parentDir === 'horizontal' && e.clientX < rect.left + threshold) {
      wfDropTarget = { path: targetPath, before: true, intoGroup: false };
      showDropIndicator(nodeEl, false, true);
    } else if (parentDir === 'horizontal' && e.clientX > rect.right - threshold) {
      wfDropTarget = { path: targetPath, before: false, intoGroup: false };
      showDropIndicator(nodeEl, false, false);
    } else {
      removeDropIndicator();
      nodeEl.classList.add('wf-drag-over');
      wfDropTarget = { path: targetPath, before: false, intoGroup: true };
    }
    return;
  }

  // 葉ノード: 前後判定
  const parentNode = targetInfo.parent;
  const isVertical = (parentNode.direction || 'vertical') === 'vertical';
  let before;
  if (isVertical) {
    before = e.clientY < rect.top + rect.height / 2;
  } else {
    before = e.clientX < rect.left + rect.width / 2;
  }
  wfDropTarget = { path: targetPath, before, intoGroup: false };
  showDropIndicator(nodeEl, isVertical, before);
}

function handleDrop(e) {
  e.preventDefault();
  removeDropIndicator();
  document.querySelectorAll('.wf-drag-over').forEach(el => el.classList.remove('wf-drag-over'));

  if (!dragPath || !wfDropTarget) return;
  const sourcePath = dragPath;

  const sourceInfo = getNodeByPath(sourcePath);
  if (!sourceInfo) return;

  saveSnapshot();
  const [movedNode] = sourceInfo.parent.children.splice(sourceInfo.index, 1);

  if (wfDropTarget.intoGroup) {
    // グループ内にドロップ
    const tgtInfo = getNodeByPath(wfDropTarget.path);
    if (tgtInfo) tgtInfo.node.children.push(movedNode);
  } else {
    // 兄弟として挿入
    const tgtInfo = getNodeByPath(wfDropTarget.path);
    if (!tgtInfo) return;
    let tgtIdx = tgtInfo.index;
    // 同一親の場合のインデックス調整
    const sameParent = getParentPath(sourcePath) === getParentPath(wfDropTarget.path);
    if (sameParent && sourceInfo.index < tgtIdx) tgtIdx--;
    if (!wfDropTarget.before) tgtIdx++;
    tgtInfo.parent.children.splice(tgtIdx, 0, movedNode);
  }

  markModified();
  selectedPath = null;
  wfDropTarget = null;
  dragPath = null;

  render();
  updateJSONPanel();
}

// ── Drop indicator ──

function showDropIndicator(targetEl, isVertical, before) {
  removeDropIndicator();

  dropIndicator = document.createElement('div');
  dropIndicator.className = 'wf-drop-indicator';

  const rect = targetEl.getBoundingClientRect();
  const parentRect = targetEl.parentElement.getBoundingClientRect();

  if (isVertical) {
    // Horizontal line above or below target
    dropIndicator.style.height = '4px';
    dropIndicator.style.left = `${rect.left}px`;
    dropIndicator.style.width = `${rect.width}px`;
    dropIndicator.style.top = before ? `${rect.top - 2}px` : `${rect.bottom - 2}px`;
  } else {
    // Vertical line left or right of target
    dropIndicator.style.width = '4px';
    dropIndicator.style.top = `${rect.top}px`;
    dropIndicator.style.height = `${rect.height}px`;
    dropIndicator.style.left = before ? `${rect.left - 2}px` : `${rect.right - 2}px`;
  }

  document.body.appendChild(dropIndicator);
}

function removeDropIndicator() {
  if (dropIndicator) {
    dropIndicator.remove();
    dropIndicator = null;
  }
}

// ── JSON Panel (auto-saveトリガー用に呼び出し箇所は残す) ──

function updateJSONPanel() {
  scheduleAutoSave();
}

// ── Connect & Auto-save ──

async function connectFile() {
  try {
    dirHandle = await window.showDirectoryPicker({ id: 'wf-dir', mode: 'readwrite' });
    const fh = await dirHandle.getFileHandle(originalFilename, { create: true });
    fileHandle = fh;
    updateSaveStatus('connected', originalFilename);
    scheduleAutoSave();
  } catch (err) {
    if (err.name === 'AbortError') return;
    updateSaveStatus('error', 'Error');
  }
}

function updateSaveStatus(state, label, hint) {
  document.getElementById('wf-save-dot').className = 'dot ' + (state || '');
  document.getElementById('wf-save-label').textContent = label || '';
  document.getElementById('wf-save-hint').textContent = hint || '';
}

async function writeToFile() {
  if (!fileHandle) return;
  updateSaveStatus('saving', 'Saving...');
  try {
    const json = JSON.stringify(WIREFRAME_DATA, null, 2);
    const writable = await fileHandle.createWritable();
    await writable.write(json);
    await writable.close();
    updateSaveStatus('connected', fileHandle.name);
    document.getElementById('wf-edited-badge').style.display = 'none';
  } catch (err) {
    updateSaveStatus('error', 'Save failed');
    if (err.name === 'NotAllowedError') {
      fileHandle = null;
      updateSaveStatus('', 'Connect', '(Drop a JSON file)');
    }
  }
}

function scheduleAutoSave() {
  if (saveTimer) clearTimeout(saveTimer);
  if (!fileHandle) return;
  saveTimer = setTimeout(() => writeToFile(), 500);
}

// ドラッグ&ドロップでファイル接続
document.getElementById('wf-viewport-wrap').addEventListener('dragover', e => {
  if (e.dataTransfer.types.includes('Files')) { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; }
});
document.getElementById('wf-viewport-wrap').addEventListener('drop', async e => {
  if (!e.dataTransfer.types.includes('Files')) return;
  e.preventDefault();
  const items = e.dataTransfer.items;
  for (const item of items) {
    if (item.kind !== 'file') continue;
    const handle = await item.getAsFileSystemHandle();
    if (handle.kind === 'file' && handle.name.endsWith('.json')) {
      fileHandle = handle;
      updateSaveStatus('connected', handle.name);
      scheduleAutoSave();
      return;
    }
  }
  updateSaveStatus('error', 'Drop not supported');
});

function markModified() {
  modified = true;
  document.getElementById('wf-edited-badge').style.display = 'inline';
  scheduleAutoSave();
}

function showToast(message) {
  const toast = document.getElementById('wf-toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ── Direction Toggle ──

function toggleDirection(path) {
  // pathがnullの場合はrootノード
  let node;
  if (path === null) {
    node = WIREFRAME_DATA.root;
  } else {
    const info = getNodeByPath(path);
    if (!info) return;
    node = info.node;
  }

  saveSnapshot();
  const current = node.direction || 'vertical';
  node.direction = current === 'vertical' ? 'horizontal' : 'vertical';

  markModified();

  render();
  updateJSONPanel();
  showToast(`${node.name}: ${node.direction}`);
}

// ── Selection & Copy/Paste ──

function selectNode(path) {
  // 同じノードをクリックしたら選択解除
  if (selectedPath === path) {
    selectedPath = null;
  } else {
    selectedPath = path;
  }
  updateSelection();
}

function updateSelection() {
  document.querySelectorAll('.wf-selected').forEach(el => el.classList.remove('wf-selected'));
  if (selectedPath !== null) {
    const el = document.querySelector(`[data-path="${selectedPath}"]`);
    if (el) el.classList.add('wf-selected');
  }
}

// ノードのディープコピー（nameに " (copy)" を付与）
function deepCopyNode(node) {
  const copy = JSON.parse(JSON.stringify(node));
  copy.name = (copy.name || '') + ' (copy)';
  return copy;
}

function handleCopy() {
  if (selectedPath === null) return;
  const info = getNodeByPath(selectedPath);
  if (!info) return;
  clipboardNode = JSON.parse(JSON.stringify(info.node));
  showToast(`Copied: ${clipboardNode.name}`);
}

function handlePaste() {
  if (!clipboardNode || selectedPath === null) return;
  const info = getNodeByPath(selectedPath);
  if (!info) return;

  saveSnapshot();
  const copy = deepCopyNode(clipboardNode);
  // 選択中の要素の直後に挿入
  info.parent.children.splice(info.index + 1, 0, copy);

  markModified();

  // ペースト先を選択状態にする
  const parts = selectedPath.split('.');
  parts[parts.length - 1] = String(info.index + 1);
  selectedPath = parts.join('.');

  render();
  updateSelection();
  updateJSONPanel();
  showToast(`Pasted: ${copy.name}`);
}

function handleDelete() {
  if (selectedPath === null) return;
  const info = getNodeByPath(selectedPath);
  if (!info) return;

  saveSnapshot();
  const name = info.node.name || '';
  info.parent.children.splice(info.index, 1);

  markModified();

  selectedPath = null;

  render();
  updateJSONPanel();
  showToast(`Deleted: ${name}`);
}

function isInputFocused() {
  const el = document.activeElement;
  return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable);
}

function handleKeyDown(e) {
  const isMeta = e.metaKey || e.ctrlKey;

  // ⌘Z: Undo
  if (isMeta && !e.shiftKey && e.key === 'z') {
    e.preventDefault();
    handleUndo();
    return;
  }

  // ⌘⇧Z: Redo
  if (isMeta && e.shiftKey && e.key === 'z') {
    e.preventDefault();
    handleRedo();
    return;
  }

  // ⌘S: 手動保存
  if (isMeta && e.key === 's') {
    e.preventDefault();
    if (fileHandle) {
      writeToFile();
      showToast('Saved — auto-save is also enabled');
    } else {
      showToast('Connect a file first (click Connect or drop a JSON file)');
    }
    return;
  }

  // ⌘C: コピー
  if (isMeta && e.key === 'c' && selectedPath !== null && !isInputFocused()) {
    if (window.getSelection()?.toString()) return;
    e.preventDefault();
    handleCopy();
    return;
  }

  // ⌘V: ペースト
  if (isMeta && e.key === 'v' && !isInputFocused()) {
    e.preventDefault();
    handlePaste();
    return;
  }

  // Delete / Backspace: 削除
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedPath !== null && !isInputFocused()) {
    e.preventDefault();
    handleDelete();
    return;
  }

  // 矢印キー: 選択中ノードを移動（親のdirectionに応じて）
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key) && selectedPath !== null && !isInputFocused()) {
    const info = getNodeByPath(selectedPath);
    if (!info) return;
    const parent = info.parent;
    const dir = parent.direction || 'vertical';
    const idx = info.index;
    let delta = 0;
    if (dir === 'horizontal' && e.key === 'ArrowLeft') delta = -1;
    if (dir === 'horizontal' && e.key === 'ArrowRight') delta = 1;
    if (dir === 'vertical' && e.key === 'ArrowUp') delta = -1;
    if (dir === 'vertical' && e.key === 'ArrowDown') delta = 1;
    if (delta === 0) return;
    const newIdx = idx + delta;
    if (newIdx < 0 || newIdx >= parent.children.length) return;
    e.preventDefault();
    saveSnapshot();
    const [removed] = parent.children.splice(idx, 1);
    parent.children.splice(newIdx, 0, removed);
    // 移動後のパスを更新
    const parts = String(selectedPath).split('.');
    parts[parts.length - 1] = String(newIdx);
    selectedPath = parts.join('.');
    markModified();
    render();
    updateJSONPanel();
    return;
  }
}

function handleNodeClick(e) {
  // direction toggleやgrab bar内のボタンクリックは無視
  if (e.target.closest('.wf-dir-toggle') || e.target.closest('button')) return;

  const nodeEl = e.target.closest('[data-path]');
  if (!nodeEl) return;

  e.stopPropagation();
  selectNode(nodeEl.dataset.path);
}

// ── Entity Panel ──

function findCmEntity(entityName) {
  if (!CM_DATA || !CM_DATA.entities) return null;
  return CM_DATA.entities.find(e => e.name === entityName) || null;
}

function renderEntityPanel() {
  const list = document.getElementById('wf-entity-list');
  list.innerHTML = '';

  if (!WIREFRAME_DATA) {
    list.innerHTML = '<div class="wf-entity-card-no-data">データなし</div>';
    return;
  }

  const v = WIREFRAME_DATA.view;
  // entities配列を取得（旧形式entityもフォールバック）
  let entities = [];
  if (v && v.entities && v.entities.length > 0) {
    entities = v.entities;
  } else if (v && v.entity) {
    entities = [{ entity: v.entity, role: '' }];
  }

  if (entities.length === 0) {
    list.innerHTML = '<div class="wf-entity-card-no-data">エンティティ未定義</div>';
    return;
  }

  entities.forEach(ent => {
    const card = document.createElement('div');
    card.className = 'wf-entity-card';
    card.dataset.entityName = ent.entity;

    // ヘッダー
    const header = document.createElement('div');
    header.className = 'wf-entity-card-header';
    const nameSpan = document.createElement('span');
    nameSpan.className = 'wf-entity-card-name';
    nameSpan.textContent = ent.entity;
    header.appendChild(nameSpan);
    if (ent.role) {
      const roleSpan = document.createElement('span');
      roleSpan.className = 'wf-entity-card-role';
      roleSpan.textContent = ent.role;
      header.appendChild(roleSpan);
    }
    card.appendChild(header);

    // CM_DATAからattributesを取得して表示
    const cmEntity = findCmEntity(ent.entity);
    if (cmEntity && cmEntity.attributes && cmEntity.attributes.length > 0) {
      const attrsDiv = document.createElement('div');
      attrsDiv.className = 'wf-entity-card-attrs';
      cmEntity.attributes.forEach(attr => {
        const attrSpan = document.createElement('span');
        attrSpan.className = 'wf-entity-card-attr';
        attrSpan.textContent = typeof attr === 'string' ? attr : (attr.name || attr);
        attrsDiv.appendChild(attrSpan);
      });
      card.appendChild(attrsDiv);
    }

    // クリックでキャンバス上の該当エンティティノードをハイライト
    card.addEventListener('click', () => {
      highlightEntityNodes(ent.entity);
    });

    list.appendChild(card);
  });
}

function highlightEntityNodes(entityName) {
  // 以前のハイライトをクリア
  document.querySelectorAll('.wf-entity-highlight').forEach(el => el.classList.remove('wf-entity-highlight'));
  document.querySelectorAll('.wf-entity-card-active').forEach(el => el.classList.remove('wf-entity-card-active'));

  // 同じエンティティをクリックしたらトグル
  if (highlightedEntity === entityName) {
    highlightedEntity = null;
    return;
  }

  highlightedEntity = entityName;

  // キャンバス上の_entityが一致するノードをハイライト
  document.querySelectorAll('#wf-root [data-path]').forEach(el => {
    const badge = el.querySelector('.wf-entity-badge');
    if (badge && badge.textContent === entityName) {
      el.classList.add('wf-entity-highlight');
    }
  });

  // 右ペインのカードをアクティブに
  const card = document.querySelector(`.wf-entity-card[data-entity-name="${entityName}"]`);
  if (card) card.classList.add('wf-entity-card-active');
}

// ── Render ──

function createGrabBar(name, path, direction) {
  const bar = document.createElement('div');
  bar.className = 'wf-grab-bar';
  bar.draggable = true;
  const grip = document.createElement('span');
  grip.className = 'wf-grip';
  grip.textContent = '\u2817';
  bar.appendChild(grip);
  const label = document.createElement('span');
  label.textContent = name;
  bar.appendChild(label);

  // direction切り替えボタン（childrenを持つコンテナのみ）
  if (direction) {
    const toggle = document.createElement('button');
    toggle.className = 'wf-dir-toggle';
    toggle.title = direction === 'vertical' ? 'Switch to horizontal' : 'Switch to vertical';
    toggle.textContent = direction === 'vertical' ? '\u2195' : '\u2194';
    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      e.preventDefault();
      toggleDirection(path);
    });
    // ドラッグ開始を抑止
    toggle.addEventListener('mousedown', (e) => e.stopPropagation());
    toggle.draggable = false;
    bar.appendChild(toggle);
  }

  return bar;
}

function barWidth(row, col) {
  const seed = (row * 7 + col * 13) % 5;
  return 50 + seed * 10;
}

function renderNode(node, container, path) {
  if (node.type === 'divider') {
    const el = document.createElement('div');
    el.className = 'wf-type-divider';
    el.dataset.path = path;
    el.draggable = true;
    container.appendChild(el);
    return;
  }

  if (node.type === 'table' && node.columns) {
    const el = document.createElement('div');
    el.className = 'wf-node wf-type-table';
    if (node.grow) el.classList.add('wf-grow');
    el.dataset.path = path;
    el.draggable = false;
    if (node.width) el.style.width = typeof node.width === 'number' ? `${node.width}px` : node.width;
    if (node.height) el.style.height = `${node.height}px`;
    if (node.maxWidth) el.style.maxWidth = `${node.maxWidth}px`;

    // Grab bar (compound node)
    el.appendChild(createGrabBar(node.name || 'Table', path, null));

    // Header row
    const header = document.createElement('div');
    header.className = 'wf-table-row wf-table-row-header';
    node.columns.forEach(col => {
      const cell = document.createElement('div');
      cell.className = 'wf-table-cell' + (col.grow ? ' wf-table-cell-grow' : '');
      if (col.width) cell.style.width = `${col.width}px`;
      if (!col.grow && !col.width) cell.classList.add('wf-table-cell-grow');
      cell.textContent = col.name || '';
      header.appendChild(cell);
    });
    el.appendChild(header);

    // Data rows
    const rows = node.rows || 3;
    for (let r = 0; r < rows; r++) {
      const row = document.createElement('div');
      row.className = 'wf-table-row';
      node.columns.forEach((col, c) => {
        const cell = document.createElement('div');
        cell.className = 'wf-table-cell' + (col.grow ? ' wf-table-cell-grow' : '');
        if (col.width) cell.style.width = `${col.width}px`;
        if (!col.grow && !col.width) cell.classList.add('wf-table-cell-grow');
        const bar = document.createElement('div');
        bar.className = 'wf-table-bar';
        bar.style.width = `${barWidth(r, c)}%`;
        cell.appendChild(bar);
        row.appendChild(cell);
      });
      el.appendChild(row);
    }

    container.appendChild(el);
    return;
  }

  const el = document.createElement('div');
  const classes = ['wf-node'];
  const hasChildren = node.children && node.children.length > 0;
  const typeClass = node.type ? `wf-type-${node.type}` : '';

  if (typeClass) classes.push(typeClass);
  if (node.grow) classes.push('wf-grow');
  if (node.wrap) classes.push('wf-wrap');

  el.className = classes.join(' ');
  el.dataset.path = path;
  el.draggable = !hasChildren;

  // Direction
  const dir = node.direction || (hasChildren ? 'vertical' : null);
  if (dir) el.dataset.direction = dir;

  // Sizing
  if (node.width) el.style.width = typeof node.width === 'number' ? `${node.width}px` : node.width;
  if (node.height) {
    el.style.height = `${node.height}px`;
  }
  if (node.maxWidth) el.style.maxWidth = `${node.maxWidth}px`;

  // Layout
  if (node.gap) el.style.gap = `${node.gap}px`;
  if (node.justify) el.style.justifyContent = node.justify;
  if (node.align) el.style.alignItems = node.align;

  // Padding
  if (node.padding != null) {
    if (Array.isArray(node.padding)) {
      el.style.padding = `${node.padding[0]}px ${node.padding[1]}px`;
    } else {
      el.style.padding = `${node.padding}px`;
    }
  }

  // Label / Grab bar
  if (hasChildren) {
    el.appendChild(createGrabBar(node.name || '', path, dir));
  } else if (node.name && !node.type) {
    const label = document.createElement('span');
    label.className = 'wf-label';
    label.textContent = node.name;
    el.appendChild(label);
  }

  // _entity バッジ表示
  if (node._entity) {
    const badge = document.createElement('span');
    badge.className = 'wf-entity-badge';
    badge.textContent = node._entity;
    el.appendChild(badge);
  }

  // _attributes ラベル表示
  if (node._attributes && node._attributes.length > 0) {
    const attrEl = document.createElement('div');
    attrEl.className = 'wf-entity-attrs';
    attrEl.textContent = node._attributes.join(' \u00b7 ');
    el.appendChild(attrEl);
  }

  // Leaf content for typed elements
  if (node.type && !hasChildren) {
    switch (node.type) {
      case 'text':
        el.textContent = node.name || 'Text';
        if (node.variant) el.dataset.variant = node.variant;
        break;
      case 'image':
        el.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text-muted)"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>';
        break;
      case 'icon':
        if (!node.width) el.style.width = '32px';
        if (!node.height) el.style.height = '32px';
        break;
      case 'button':
        el.textContent = node.name || 'Button';
        break;
      case 'link':
        el.textContent = node.name || 'Link';
        break;
      case 'input':
        el.textContent = node.name || 'Input';
        break;
      case 'card':
        const cardLabel = document.createElement('span');
        cardLabel.className = 'wf-card-label';
        cardLabel.textContent = node.name || 'Card';
        el.appendChild(cardLabel);
        break;
    }
  }

  // Render children
  if (hasChildren) {
    node.children.forEach((child, i) => {
      renderNode(child, el, path !== undefined ? `${path}.${i}` : `${i}`);
    });
  }

  container.appendChild(el);
}

function render() {
  const viewport = document.getElementById('wf-root');
  viewport.innerHTML = '';

  const vp = WIREFRAME_DATA.viewport || {};
  viewport.className = 'wf-viewport';
  if (vp.width) viewport.style.width = `${vp.width}px`;
  if (vp.height) viewport.style.minHeight = `${vp.height}px`;

  if (WIREFRAME_DATA.root) {
    // Render root's children directly (root itself is the viewport)
    if (WIREFRAME_DATA.root.children) {
      // Apply root direction to viewport
      viewport.style.display = 'flex';
      viewport.style.position = 'relative';
      const rootDir = WIREFRAME_DATA.root.direction || 'vertical';
      viewport.style.flexDirection = rootDir === 'horizontal' ? 'row' : 'column';
      if (WIREFRAME_DATA.root.gap) viewport.style.gap = `${WIREFRAME_DATA.root.gap}px`;
      if (WIREFRAME_DATA.root.padding != null) {
        const p = WIREFRAME_DATA.root.padding;
        viewport.style.padding = Array.isArray(p) ? `${p[0]}px ${p[1]}px` : `${p}px`;
      }
      if (WIREFRAME_DATA.root.justify) viewport.style.justifyContent = WIREFRAME_DATA.root.justify;
      if (WIREFRAME_DATA.root.align) viewport.style.alignItems = WIREFRAME_DATA.root.align;
      if (WIREFRAME_DATA.root.wrap) viewport.style.flexWrap = 'wrap';

      // rootノード用のgrab bar（direction切り替え用）
      viewport.appendChild(createGrabBar(WIREFRAME_DATA.root.name || 'Root', null, rootDir));

      WIREFRAME_DATA.root.children.forEach((child, i) => {
        renderNode(child, viewport, `${i}`);
      });
    }
  }

  // render後にDOM上の選択状態を再適用
  updateSelection();
}

function init() {
  if (!WIREFRAME_DATA) {
    document.getElementById('wf-root').textContent = 'No wireframe data found.';
    document.getElementById('wf-entity-list').innerHTML = '<div class="wf-entity-card-no-data">データなし</div>';
    return;
  }

  document.getElementById('wf-toolbar-title').textContent = WIREFRAME_DATA.name || 'Wireframe';
  document.title = WIREFRAME_DATA.name || 'Wireframe Preview';

  // ビュー情報表示
  if (WIREFRAME_DATA.view) {
    const v = WIREFRAME_DATA.view;
    const info = document.getElementById('wf-view-info');
    info.innerHTML = '';
    // ビュー名: 先頭エンティティ名 + context（例: 「プロジェクト詳細」）
    const primaryEntity = v.entities && v.entities.length > 0
      ? v.entities[0].entity
      : (v.entity || '');
    if (primaryEntity) {
      const s = document.createElement('span');
      s.innerHTML = '<span class="wf-view-label">ビュー:</span>' + primaryEntity + (v.context || '');
      info.appendChild(s);
    }
    if (v.context) {
      const s = document.createElement('span');
      s.innerHTML = '<span class="wf-view-label">コンテキスト:</span>' + v.context;
      info.appendChild(s);
    }
    // エンティティ表示: entities配列 or 旧形式entity（フォールバック）
    if (v.entities && v.entities.length > 0) {
      const s = document.createElement('span');
      const entitiesStr = v.entities.map(e => e.entity + '\uff08' + (e.role || '') + '\uff09').join(', ');
      s.innerHTML = '<span class="wf-view-label">エンティティ:</span>' + entitiesStr;
      info.appendChild(s);
    } else if (v.entity) {
      const s = document.createElement('span');
      s.innerHTML = '<span class="wf-view-label">エンティティ:</span>' + v.entity;
      info.appendChild(s);
    }
    if (v.primaryType) {
      const s = document.createElement('span');
      s.innerHTML = '<span class="wf-view-label">Type:</span>' + v.primaryType;
      info.appendChild(s);
    }
  }

  // エンティティパネル描画
  renderEntityPanel();

  // Set up drag-and-drop event delegation
  const viewport = document.getElementById('wf-root');
  viewport.addEventListener('dragstart', handleDragStart);
  viewport.addEventListener('dragend', handleDragEnd);
  viewport.addEventListener('dragover', handleDragOver);
  viewport.addEventListener('drop', handleDrop);

  // 選択とコピー&ペースト
  viewport.addEventListener('click', handleNodeClick);
  document.addEventListener('keydown', handleKeyDown);

  // viewport外クリックで選択解除
  document.getElementById('wf-viewport-wrap').addEventListener('click', (e) => {
    if (e.target.closest('#wf-root [data-path]')) return;
    selectedPath = null;
    updateSelection();
  });

  render();
  updateJSONPanel();
}

init();
</script>
</body>
</html>
