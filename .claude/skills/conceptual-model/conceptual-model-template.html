<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conceptual Model Editor</title>
<style>
  :root {
    /* Text */
    --text-primary: #333;
    --text-secondary: #555;
    --text-tertiary: #888;
    --text-muted: #B0B0B0;

    /* Background */
    --bg-page: #F8F8F8;
    --bg-surface: #FFF;
    --bg-panel: #FAFAFA;
    --bg-subtle: #F0F0F0;
    --bg-placeholder: #E8E8E8;
    --bg-placeholder-dark: #DDD;
    --bg-dark: #333;

    /* Border */
    --border-default: #E0E0E0;
    --border-light: #F0F0F0;

    /* Accent */
    --accent: #4A90D9;
    --accent-bg: #E8F0FE;
    --drop-indicator: #29b3f1;
    --success-bg: #E8F5E9;
    --success-border: #A5D6A7;
    --success-text: #2E7D32;

    /* Syntax highlighting (dark panel用) */
    --syntax-key: #9CDCFE;
    --syntax-string: #CE9178;
    --syntax-number: #d16969;
    --syntax-bool: #569CD6;

    /* Radius */
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-full: 999px;

    /* Font size */
    --font-sm: 12px;
    --font-base: 16px;
    --font-lg: 24px;
    --font-xl: 32px;

    /* Font family */
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-mono: 'SF Mono', Monaco, 'Cascadia Code', 'Consolas', monospace;

    /* Spacing */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;

    /* ビューエリア専用 */
    --bg-views: #f0f4f8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: var(--bg-page);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
  }

  /* ===== レイアウト ===== */
  .app {
    display: grid;
    grid-template-rows: 48px 1fr;
    grid-template-columns: 1fr 400px;
    height: 100vh;
  }

  .toolbar {
    grid-column: 1 / -1;
    height: 48px;
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    padding: 0 var(--space-md);
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border-default);
    z-index: 100;
  }

  .toolbar-left {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    flex: 1;
  }

  .toolbar-title {
    font-weight: 600;
    font-size: 20px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .toolbar-center {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
  }

  .toolbar-right {
    flex: 1;
  }


  .toolbar button {
    padding: 6px 14px;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    background: var(--bg-surface);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-primary);
  }
  .toolbar button:hover { background: var(--bg-subtle); }
  .toolbar button.primary { background: var(--bg-dark); color: var(--bg-surface); border-color: var(--bg-dark); }
  .toolbar button.primary:hover { background: var(--text-secondary); }

  .canvas-pane {
    grid-column: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .canvas {
    flex: 1;
    overflow: auto;
    padding: var(--space-lg);
  }

  .json-pane {
    grid-column: 2;
    background: #2d2d30;
    color: #d4d4d4;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border-default);
  }

  .json-header {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    padding: var(--space-sm) var(--space-md);
    background: #2d2d2d;
    border-bottom: 1px solid #444;
    font-size: 13px;
  }

  .json-body {
    flex: 1;
    overflow: auto;
    padding: 12px;
  }

  .json-body pre {
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* ===== ノード共通 ===== */
  .node {
    position: relative;
    user-select: none;
  }

  .node.selected > .node-inner {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .node.drag-over > .node-inner {
    outline: 2px dashed var(--accent);
    outline-offset: 2px;
  }

  .drop-indicator {
    position: absolute;
    background: var(--drop-indicator);
    z-index: 50;
    pointer-events: none;
    border-radius: 2px;
  }

  /* ===== グループノード ===== */
  .group > .node-inner {
    border: 1px solid var(--border-default);
    border-radius: 6px;
    background: var(--bg-panel);
    min-width: 120px;
    min-height: 60px;
  }

  .group-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border-default);
    background: var(--bg-subtle);
    border-radius: 6px 6px 0 0;
    cursor: grab;
  }
  .group-header:active { cursor: grabbing; }

  .grab-bar {
    display: flex;
    flex-direction: column;
    gap: 2px;
    opacity: 0.4;
    flex-shrink: 0;
  }
  .grab-bar span {
    display: block;
    width: 12px;
    height: 2px;
    background: #999;
    border-radius: 1px;
  }

  .group-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    border: none;
    background: none;
    outline: none;
    flex: 1;
    min-width: 60px;
  }
  .group-name:focus { border-bottom: 1px solid var(--accent); }

  .direction-btn {
    font-size: 13px;
    padding: 2px 6px;
    border: 1px solid var(--border-default);
    border-radius: 3px;
    background: var(--bg-surface);
    cursor: pointer;
    color: var(--text-tertiary);
    flex-shrink: 0;
  }
  .direction-btn:hover { background: var(--bg-placeholder); }

  .group-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }
  .group-actions button {
    font-size: 13px;
    padding: 2px 6px;
    border: 1px solid var(--border-default);
    border-radius: 3px;
    background: var(--bg-surface);
    cursor: pointer;
    color: var(--text-tertiary);
  }
  .group-actions button:hover { background: var(--bg-placeholder); }

  .group-children {
    padding: 10px;
    display: flex;
    gap: 10px;
  }
  .group-children.vertical { flex-direction: column; }
  .group-children.horizontal { flex-direction: row; flex-wrap: wrap; }
  .group-children.horizontal > .node { flex: 1; min-width: 0; }

  .drop-zone {
    min-height: 40px;
    min-width: 40px;
    border: 2px dashed var(--border-default);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #bbb;
    font-size: 13px;
  }
  .drop-zone:empty::after { content: 'ドラッグで追加'; }

  /* ===== エンティティノード ===== */
  .entity > .node-inner {
    border: 1px solid #bbb;
    border-radius: 6px;
    background: var(--bg-surface);
    min-width: 140px;
  }

  .entity-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-bottom: 1px solid var(--bg-placeholder);
    cursor: grab;
  }
  .entity-header:active { cursor: grabbing; }

  .entity-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    border: none;
    background: none;
    outline: none;
    flex: 1;
    min-width: 60px;
  }
  .entity-name:focus { border-bottom: 1px solid var(--accent); }

  .entity-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }
  .entity-actions button {
    font-size: 13px;
    padding: 2px 6px;
    border: 1px solid var(--border-default);
    border-radius: 3px;
    background: var(--bg-surface);
    cursor: pointer;
    color: var(--text-tertiary);
  }
  .entity-actions button:hover { background: var(--bg-placeholder); }

  .attributes {
    padding: var(--space-sm) 10px;
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-xs);
    min-height: 32px;
  }

  .attr-tag {
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
    padding: 2px var(--space-sm);
    background: #eee;
    border: 1px solid var(--border-default);
    border-radius: 12px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: default;
  }

  .attr-tag .attr-key,
  .attr-tag .attr-val {
    border: none;
    background: none;
    outline: none;
    font-size: 13px;
    width: 30px; /* JS で動的に設定 */
    min-width: 20px;
  }
  .attr-tag .attr-key { color: var(--text-primary); font-weight: 600; }
  .attr-tag .attr-val { color: #666; }
  .attr-tag .attr-key:focus,
  .attr-tag .attr-val:focus { color: #111; }
  .attr-tag .attr-sep {
    color: #aaa;
    font-size: 13px;
    margin: 0 1px;
    flex-shrink: 0;
  }

  .attr-tag .attr-remove {
    cursor: pointer;
    color: #aaa;
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
  }
  .attr-tag .attr-remove:hover { color: #e44; }

  .attr-add {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border: 1px dashed var(--border-default);
    border-radius: 12px;
    font-size: 14px;
    color: #aaa;
    cursor: pointer;
    background: none;
  }
  .attr-add:hover { border-color: #999; color: #666; }

  /* ===== Auto Save ステータス ===== */
  .save-status {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
    font-size: 13px;
    color: var(--text-primary);
  }
  .save-status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border-default);
  }
  .save-status .dot.connected { background: #4caf50; }
  .save-status .dot.saving { background: #ff9800; }
  .save-status .dot.error { background: #f44336; }

  /* ===== ファイルドロップオーバーレイ ===== */
  .file-drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(74, 144, 217, 0.08);
    border: 3px dashed var(--accent);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .file-drop-overlay.active { display: flex; }
  .file-drop-overlay .drop-msg {
    padding: var(--space-md) var(--space-xl);
    background: var(--bg-surface);
    border-radius: var(--radius-md);
    font-size: 15px;
    color: var(--accent);
    font-weight: 600;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }

  /* ===== セクション区切り ===== */
  .section-divider {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    margin: var(--space-xl) 0 var(--space-md);
    color: var(--text-tertiary);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .section-divider::before,
  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-default);
  }

  /* ===== ビュー定義エリア ===== */
  .views-area {
    background: var(--bg-views);
    border-radius: var(--radius-md);
    padding: var(--space-md);
  }

  .views-list {
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
  }

  .view-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    padding: var(--space-md);
  }

  .view-card-header {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    margin-bottom: var(--space-sm);
  }

  .view-card-header .view-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .view-card-header .view-delete-btn {
    margin-left: auto;
    font-size: 13px;
    padding: 2px 8px;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    background: var(--bg-surface);
    cursor: pointer;
    color: var(--text-tertiary);
  }
  .view-card-header .view-delete-btn:hover { background: var(--bg-subtle); color: #e44; }

  .view-field {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    margin-bottom: var(--space-sm);
  }

  .view-field label {
    font-size: 13px;
    color: var(--text-secondary);
    min-width: 80px;
    flex-shrink: 0;
  }

  .view-field input,
  .view-field select {
    flex: 1;
    padding: 6px var(--space-sm);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: var(--font-sans);
    color: var(--text-primary);
    background: var(--bg-surface);
  }
  .view-field input:focus,
  .view-field select:focus {
    outline: none;
    border-color: var(--accent);
  }

  .view-entities-section {
    margin-top: var(--space-sm);
  }

  .view-entities-section .section-label {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: var(--space-xs);
  }

  .view-entity-row {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    margin-bottom: var(--space-xs);
  }

  .view-entity-row select,
  .view-entity-row input {
    flex: 1;
    padding: 6px var(--space-sm);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: var(--font-sans);
    color: var(--text-primary);
    background: var(--bg-surface);
  }
  .view-entity-row select:focus,
  .view-entity-row input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .view-entity-row .entity-remove-btn {
    font-size: 13px;
    padding: 2px 6px;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    background: var(--bg-surface);
    cursor: pointer;
    color: var(--text-tertiary);
    flex-shrink: 0;
  }
  .view-entity-row .entity-remove-btn:hover { color: #e44; }

  .view-add-entity-btn {
    font-size: 13px;
    padding: var(--space-xs) var(--space-sm);
    border: 1px dashed var(--border-default);
    border-radius: var(--radius-sm);
    background: none;
    cursor: pointer;
    color: var(--text-tertiary);
    margin-top: var(--space-xs);
  }
  .view-add-entity-btn:hover { border-color: var(--accent); color: var(--accent); }

  .view-card-footer {
    display: flex;
    justify-content: flex-end;
    margin-top: var(--space-sm);
    padding-top: var(--space-sm);
    border-top: 1px solid var(--border-light);
  }

  .view-wireframe-btn {
    font-size: 13px;
    padding: 6px 14px;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--bg-dark);
    color: var(--bg-surface);
    cursor: pointer;
    font-family: var(--font-sans);
  }
  .view-wireframe-btn:hover { opacity: 0.85; }

  .view-wireframe-btn .copy-feedback {
    color: var(--success-text);
    font-size: var(--font-sm);
  }

  .add-view-btn {
    font-size: 13px;
    padding: var(--space-sm) var(--space-md);
    border: 2px dashed var(--border-default);
    border-radius: var(--radius-md);
    background: none;
    cursor: pointer;
    color: var(--text-tertiary);
    width: 100%;
    text-align: center;
  }
  .add-view-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ===== ユーティリティ ===== */
  .hidden { display: none !important; }

  /* ドラッグ中のゴースト */
  .dragging { opacity: 0.4; }
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <div class="toolbar-left">
      <span class="toolbar-title">Conceptual Model</span>
      <button id="btnConnect" onclick="connectFile()">Connect</button>
      <span class="save-status" id="saveStatus"><span class="dot" id="saveDot"></span><span id="saveLabel">未接続：JSONファイルをドロップ</span></span>
    </div>
    <div class="toolbar-center">
      <button onclick="addGroup()">+ グループ</button>
      <button onclick="addEntity()">+ エンティティ</button>
      <button onclick="doUndo()" title="⌘Z">↩ Undo</button>
      <button onclick="doRedo()" title="⌘⇧Z">↪ Redo</button>
    </div>
    <div class="toolbar-right"></div>
  </div>
  <div class="canvas-pane">
    <div class="canvas" id="canvas"></div>
  </div>
  <div class="json-pane" id="jsonPane">
    <div class="json-header">
      <span>JSON</span>
    </div>
    <div class="json-body">
      <pre id="jsonOutput"></pre>
    </div>
  </div>
</div>
<div class="file-drop-overlay" id="fileDropOverlay"><span class="drop-msg">JSONファイルをドロップして接続</span></div>

<script>
// ===== データ =====
const CM_DATA = null;
const CM_FILENAME = null;

let model = CM_DATA ? structuredClone(CM_DATA) : {
  name: 'Conceptual Model',
  root: { name: 'ルート', direction: 'vertical', children: [] },
  views: []
};

// views配列がなければ初期化
model.views = model.views || [];

// ===== Undo / Redo =====
const undoStack = [];
const redoStack = [];
const MAX_UNDO = 50;

function pushUndo() {
  undoStack.push(JSON.stringify(model));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack.length = 0;
}

function doUndo() {
  if (!undoStack.length) return;
  redoStack.push(JSON.stringify(model));
  model = JSON.parse(undoStack.pop());
  model.views = model.views || [];
  selectedPath = null;
  render();
}

function doRedo() {
  if (!redoStack.length) return;
  undoStack.push(JSON.stringify(model));
  model = JSON.parse(redoStack.pop());
  model.views = model.views || [];
  selectedPath = null;
  render();
}

// ===== 選択 =====
let selectedPath = null; // 配列: ルートからのchildren index

function getNodeByPath(path) {
  let node = model.root;
  for (const idx of path) {
    if (!node.children) return null;
    node = node.children[idx];
    if (!node) return null;
  }
  return node;
}

function getParentByPath(path) {
  if (path.length === 0) return null;
  return getNodeByPath(path.slice(0, -1));
}

// ===== エンティティ名の収集（ビュー用） =====
function collectEntityNames(node) {
  const names = [];
  if (node.type === 'entity') {
    names.push(node.name);
  }
  if (node.children) {
    for (const child of node.children) {
      names.push(...collectEntityNames(child));
    }
  }
  return names;
}

// ===== 文字幅計測 =====
const _measureCanvas = document.createElement('canvas');
const _measureCtx = _measureCanvas.getContext('2d');

function measureTextWidth(text, font) {
  _measureCtx.font = font || '13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  return Math.ceil(_measureCtx.measureText(text).width);
}

function fitInputWidth(input) {
  const width = measureTextWidth(input.value || ' ') + 8; // 余白分
  input.style.width = Math.max(width, 20) + 'px';
}

// ===== Auto Save（File System Access API） =====
let fileHandle = null;
let autoSaveTimer = null;
let isSaving = false;
const AUTO_SAVE_DELAY = 500; // ms

function updateSaveStatus(state, label) {
  const dot = document.getElementById('saveDot');
  const lbl = document.getElementById('saveLabel');
  dot.className = 'dot ' + state;
  lbl.textContent = label;
}

async function connectFile() {
  if (!('showDirectoryPicker' in window)) {
    alert('このブラウザはFile System Access APIに対応していません。JSONファイルをドロップして接続してください。');
    return;
  }
  const filename = CM_FILENAME || 'conceptual-model.json';
  try {
    // フォルダ選択 → そこから対象JSONファイルを取得（なければ作成）
    // id を指定して、2回目以降は前回選んだフォルダからスタート
    const dirHandle = await window.showDirectoryPicker({ id: 'cm-editor', mode: 'readwrite' });
    fileHandle = await dirHandle.getFileHandle(filename, { create: true });
    updateSaveStatus('connected', fileHandle.name + ' (自動保存)');
    document.getElementById('btnConnect').textContent = 'Reconnect';
    // 接続直後に一度保存
    await writeToFile();
  } catch (e) {
    if (e.name !== 'AbortError') {
      console.error(e);
      updateSaveStatus('error', 'エラー');
    }
  }
}

async function writeToFile() {
  if (!fileHandle || isSaving) return;
  isSaving = true;
  updateSaveStatus('saving', '保存中...');
  try {
    const json = JSON.stringify(model, null, 2) + '\n';
    const writable = await fileHandle.createWritable();
    await writable.write(json);
    await writable.close();
    updateSaveStatus('connected', fileHandle.name + ' (自動保存)');
  } catch (e) {
    console.error(e);
    updateSaveStatus('error', '保存失敗');
    // 権限が失われた場合はfileHandleをリセット
    if (e.name === 'NotAllowedError') {
      fileHandle = null;
      updateSaveStatus('', '未接続（権限切れ）');
      document.getElementById('btnConnect').textContent = 'Connect';
    }
  } finally {
    isSaving = false;
  }
}

function scheduleAutoSave() {
  if (!fileHandle) return;
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => writeToFile(), AUTO_SAVE_DELAY);
}

// ===== ドラッグ&ドロップ =====
let dragPath = null;
let dropIndicator = null;
let dropTarget = null; // { path, before }

function onDragStart(e, path) {
  dragPath = path;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', '');
  requestAnimationFrame(() => {
    const el = getNodeElement(path);
    if (el) el.classList.add('dragging');
  });
}

function onDragEnd(e, path) {
  const el = getNodeElement(path);
  if (el) el.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  removeDropIndicator();
  dragPath = null;
  dropTarget = null;
}

function onDragOver(e, targetPath) {
  if (!dragPath) return;
  if (isDescendant(dragPath, targetPath)) return;
  if (pathEquals(dragPath, targetPath)) { removeDropIndicator(); return; }
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';

  const targetNode = getNodeByPath(targetPath);
  // グループノードの上半分→グループの前に挿入、下半分→グループ内にドロップ
  if (targetNode && targetNode.children) {
    const el = getNodeElement(targetPath);
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const threshold = Math.min(rect.height * 0.25, 30);
    const parent = getParentByPath(targetPath);
    const parentDir = parent ? (parent.direction || 'vertical') : 'vertical';

    if (parentDir === 'vertical' && e.clientY < rect.top + threshold) {
      // グループの前にインジケータ表示
      dropTarget = { path: targetPath, before: true, intoGroup: false };
      showDropIndicator(el, true, true);
    } else if (parentDir === 'vertical' && e.clientY > rect.bottom - threshold) {
      // グループの後にインジケータ表示
      dropTarget = { path: targetPath, before: false, intoGroup: false };
      showDropIndicator(el, true, false);
    } else if (parentDir === 'horizontal' && e.clientX < rect.left + threshold) {
      dropTarget = { path: targetPath, before: true, intoGroup: false };
      showDropIndicator(el, false, true);
    } else if (parentDir === 'horizontal' && e.clientX > rect.right - threshold) {
      dropTarget = { path: targetPath, before: false, intoGroup: false };
      showDropIndicator(el, false, false);
    } else {
      // グループ内にドロップ
      removeDropIndicator();
      el.classList.add('drag-over');
      dropTarget = { path: targetPath, before: false, intoGroup: true };
    }
    return;
  }

  // 葉ノード（エンティティ）: 前/後のインジケータ
  const el = getNodeElement(targetPath);
  if (!el) return;
  const rect = el.getBoundingClientRect();
  const parent = getParentByPath(targetPath);
  const isVertical = parent ? (parent.direction || 'vertical') === 'vertical' : true;
  let before;
  if (isVertical) {
    before = e.clientY < rect.top + rect.height / 2;
  } else {
    before = e.clientX < rect.left + rect.width / 2;
  }
  dropTarget = { path: targetPath, before, intoGroup: false };
  showDropIndicator(el, isVertical, before);
}

function onDragEnter(e, targetPath) {
  if (!dragPath || isDescendant(dragPath, targetPath) || pathEquals(dragPath, targetPath)) return;
  e.preventDefault();
}

function onDragLeave(e, targetPath) {
  const el = getNodeElement(targetPath);
  if (el) el.classList.remove('drag-over');
}

function onDrop(e, targetPath) {
  e.preventDefault();
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  removeDropIndicator();
  if (!dragPath || !dropTarget || isDescendant(dragPath, targetPath) || pathEquals(dragPath, targetPath)) return;

  // ソースノードを削除
  const srcParent = getParentByPath(dragPath);
  if (!srcParent) return;
  const srcIdx = dragPath[dragPath.length - 1];

  pushUndo();

  if (dropTarget.intoGroup) {
    // グループの中にドロップ
    const targetNode = getNodeByPath(dropTarget.path);
    const [removed] = srcParent.children.splice(srcIdx, 1);
    targetNode.children.push(removed);
  } else {
    // 兄弟として挿入
    const tgtParent = getParentByPath(dropTarget.path);
    if (!tgtParent) return;
    let tgtIdx = dropTarget.path[dropTarget.path.length - 1];

    // 同一親の場合のインデックス調整
    const sameParent = pathEquals(dragPath.slice(0, -1), dropTarget.path.slice(0, -1));
    const [removed] = srcParent.children.splice(srcIdx, 1);
    if (sameParent && srcIdx < tgtIdx) tgtIdx--;
    if (!dropTarget.before) tgtIdx++;
    tgtParent.children.splice(tgtIdx, 0, removed);
  }

  dragPath = null;
  dropTarget = null;
  selectedPath = null;
  render();
}

function showDropIndicator(targetEl, isVertical, before) {
  removeDropIndicator();
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));

  dropIndicator = document.createElement('div');
  dropIndicator.className = 'drop-indicator';

  const rect = targetEl.getBoundingClientRect();
  if (isVertical) {
    dropIndicator.style.height = '4px';
    dropIndicator.style.left = `${rect.left}px`;
    dropIndicator.style.width = `${rect.width}px`;
    dropIndicator.style.top = before ? `${rect.top - 2}px` : `${rect.bottom - 2}px`;
  } else {
    dropIndicator.style.width = '4px';
    dropIndicator.style.top = `${rect.top}px`;
    dropIndicator.style.height = `${rect.height}px`;
    dropIndicator.style.left = before ? `${rect.left - 2}px` : `${rect.right - 2}px`;
  }
  document.body.appendChild(dropIndicator);
}

function removeDropIndicator() {
  if (dropIndicator) {
    dropIndicator.remove();
    dropIndicator = null;
  }
}

function isDescendant(parentPath, childPath) {
  if (childPath.length <= parentPath.length) return false;
  for (let i = 0; i < parentPath.length; i++) {
    if (parentPath[i] !== childPath[i]) return false;
  }
  return true;
}

function pathEquals(a, b) {
  if (!a || !b) return false;
  if (a.length !== b.length) return false;
  return a.every((v, i) => v === b[i]);
}

function getNodeElement(path) {
  return document.querySelector(`[data-path="${path.join(',')}"]`);
}

// ===== コピー&ペースト =====
let clipboard = null;

// ===== 削除 =====
function deleteNode(path) {
  if (path.length === 0) return; // ルートは削除不可
  pushUndo();
  const parent = getParentByPath(path);
  const idx = path[path.length - 1];
  parent.children.splice(idx, 1);
  selectedPath = null;
  render();
}

// ===== レンダリング =====
function render() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';

  // エンティティ定義エリア（上段）
  canvas.appendChild(renderNode(model.root, []));

  // セクション区切り
  const divider = document.createElement('div');
  divider.className = 'section-divider';
  divider.textContent = 'Views';
  canvas.appendChild(divider);

  // ビュー定義エリア（下段）
  canvas.appendChild(renderViewsArea());

  updateJsonPanel();
}

function renderNode(node, path) {
  if (node.type === 'entity') {
    return renderEntity(node, path);
  }
  return renderGroup(node, path);
}

function renderGroup(node, path) {
  const div = document.createElement('div');
  div.className = 'node group' + (pathEquals(selectedPath, path) ? ' selected' : '');
  div.dataset.path = path.join(',');
  div.setAttribute('draggable', path.length > 0 ? 'true' : 'false');

  if (path.length > 0) {
    div.addEventListener('dragstart', e => { e.stopPropagation(); onDragStart(e, path); });
    div.addEventListener('dragend', e => onDragEnd(e, path));
  }
  div.addEventListener('dragover', e => { e.stopPropagation(); onDragOver(e, path); });
  div.addEventListener('dragenter', e => { e.stopPropagation(); onDragEnter(e, path); });
  div.addEventListener('dragleave', e => { e.stopPropagation(); onDragLeave(e, path); });
  div.addEventListener('drop', e => { e.stopPropagation(); onDrop(e, path); });

  const inner = document.createElement('div');
  inner.className = 'node-inner';

  // ヘッダー
  const header = document.createElement('div');
  header.className = 'group-header';
  header.addEventListener('click', e => {
    e.stopPropagation();
    selectedPath = pathEquals(selectedPath, path) ? null : path;
    render();
  });

  if (path.length > 0) {
    const grab = document.createElement('div');
    grab.className = 'grab-bar';
    grab.innerHTML = '<span></span><span></span><span></span>';
    header.appendChild(grab);
  }

  const nameInput = document.createElement('input');
  nameInput.className = 'group-name';
  nameInput.value = node.name;
  nameInput.addEventListener('click', e => e.stopPropagation());
  nameInput.addEventListener('change', e => {
    pushUndo();
    node.name = e.target.value;
    updateJsonPanel();
  });
  header.appendChild(nameInput);

  const dirBtn = document.createElement('button');
  dirBtn.className = 'direction-btn';
  dirBtn.textContent = node.direction === 'vertical' ? '↕' : '↔';
  dirBtn.title = node.direction === 'vertical' ? 'vertical → horizontal' : 'horizontal → vertical';
  dirBtn.addEventListener('click', e => {
    e.stopPropagation();
    pushUndo();
    node.direction = node.direction === 'vertical' ? 'horizontal' : 'vertical';
    render();
  });
  header.appendChild(dirBtn);

  if (path.length > 0) {
    const actions = document.createElement('div');
    actions.className = 'group-actions';

    const delBtn = document.createElement('button');
    delBtn.textContent = '✕';
    delBtn.title = '削除';
    delBtn.addEventListener('click', e => {
      e.stopPropagation();
      deleteNode(path);
    });
    actions.appendChild(delBtn);
    header.appendChild(actions);
  }

  inner.appendChild(header);

  // 子要素
  const children = document.createElement('div');
  children.className = 'group-children ' + node.direction;

  if (node.children.length === 0) {
    const dropZone = document.createElement('div');
    dropZone.className = 'drop-zone';
    children.appendChild(dropZone);
  } else {
    node.children.forEach((child, i) => {
      children.appendChild(renderNode(child, [...path, i]));
    });
  }

  inner.appendChild(children);
  div.appendChild(inner);
  return div;
}

function renderEntity(node, path) {
  const div = document.createElement('div');
  div.className = 'node entity' + (pathEquals(selectedPath, path) ? ' selected' : '');
  div.dataset.path = path.join(',');
  div.setAttribute('draggable', 'true');

  div.addEventListener('dragstart', e => { e.stopPropagation(); onDragStart(e, path); });
  div.addEventListener('dragend', e => onDragEnd(e, path));
  div.addEventListener('dragover', e => { e.stopPropagation(); onDragOver(e, path); });
  div.addEventListener('dragenter', e => { e.stopPropagation(); onDragEnter(e, path); });
  div.addEventListener('dragleave', e => { e.stopPropagation(); onDragLeave(e, path); });
  div.addEventListener('drop', e => { e.stopPropagation(); onDrop(e, path); });

  const inner = document.createElement('div');
  inner.className = 'node-inner';

  // ヘッダー
  const header = document.createElement('div');
  header.className = 'entity-header';
  header.addEventListener('click', e => {
    e.stopPropagation();
    selectedPath = pathEquals(selectedPath, path) ? null : path;
    render();
  });

  const grab = document.createElement('div');
  grab.className = 'grab-bar';
  grab.innerHTML = '<span></span><span></span><span></span>';
  header.appendChild(grab);

  const nameInput = document.createElement('input');
  nameInput.className = 'entity-name';
  nameInput.value = node.name;
  nameInput.addEventListener('click', e => e.stopPropagation());
  nameInput.addEventListener('change', e => {
    pushUndo();
    node.name = e.target.value;
    updateJsonPanel();
  });
  header.appendChild(nameInput);

  const actions = document.createElement('div');
  actions.className = 'entity-actions';

  const delBtn = document.createElement('button');
  delBtn.textContent = '✕';
  delBtn.title = '削除';
  delBtn.addEventListener('click', e => {
    e.stopPropagation();
    deleteNode(path);
  });
  actions.appendChild(delBtn);
  header.appendChild(actions);

  inner.appendChild(header);

  // 属性タグ
  const attrs = document.createElement('div');
  attrs.className = 'attributes';

  node.attributes.forEach((attr, i) => {
    const tag = document.createElement('span');
    tag.className = 'attr-tag';

    // "key: value" 形式をパース（最初の : で分割）
    const colonIdx = attr.indexOf(':');
    const keyStr = colonIdx >= 0 ? attr.substring(0, colonIdx).trim() : attr.trim();
    const valStr = colonIdx >= 0 ? attr.substring(colonIdx + 1).trim() : '';

    const commitAttr = () => {
      pushUndo();
      node.attributes[i] = keyInput.value.trim() + ': ' + valInput.value.trim();
      updateJsonPanel();
    };

    const keyInput = document.createElement('input');
    keyInput.className = 'attr-key';
    keyInput.value = keyStr;
    keyInput.placeholder = 'field';
    requestAnimationFrame(() => fitInputWidth(keyInput));
    keyInput.addEventListener('click', e => e.stopPropagation());
    keyInput.addEventListener('input', () => fitInputWidth(keyInput));
    keyInput.addEventListener('change', commitAttr);
    tag.appendChild(keyInput);

    const sep = document.createElement('span');
    sep.className = 'attr-sep';
    sep.textContent = ':';
    tag.appendChild(sep);

    const valInput = document.createElement('input');
    valInput.className = 'attr-val';
    valInput.value = valStr;
    valInput.placeholder = '説明';
    requestAnimationFrame(() => fitInputWidth(valInput));
    valInput.addEventListener('click', e => e.stopPropagation());
    valInput.addEventListener('input', () => fitInputWidth(valInput));
    valInput.addEventListener('change', commitAttr);
    tag.appendChild(valInput);

    const remove = document.createElement('span');
    remove.className = 'attr-remove';
    remove.textContent = '×';
    remove.addEventListener('click', e => {
      e.stopPropagation();
      pushUndo();
      node.attributes.splice(i, 1);
      render();
    });
    tag.appendChild(remove);

    attrs.appendChild(tag);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'attr-add';
  addBtn.textContent = '+';
  addBtn.title = '属性を追加';
  addBtn.addEventListener('click', e => {
    e.stopPropagation();
    pushUndo();
    node.attributes.push('field: 説明');
    render();
  });
  attrs.appendChild(addBtn);

  inner.appendChild(attrs);
  div.appendChild(inner);
  return div;
}

// ===== ビュー定義エリアのレンダリング =====
function renderViewsArea() {
  const area = document.createElement('div');
  area.className = 'views-area';

  const list = document.createElement('div');
  list.className = 'views-list';

  const entityNames = collectEntityNames(model.root);

  model.views.forEach((view, vi) => {
    list.appendChild(renderViewCard(view, vi, entityNames));
  });

  area.appendChild(list);

  // 「+ ビューを追加」ボタン
  const addBtn = document.createElement('button');
  addBtn.className = 'add-view-btn';
  addBtn.textContent = '+ ビューを追加';
  addBtn.style.marginTop = model.views.length > 0 ? 'var(--space-md)' : '0';
  addBtn.addEventListener('click', () => addView());
  area.appendChild(addBtn);

  return area;
}

function renderViewCard(view, viewIndex, entityNames) {
  const card = document.createElement('div');
  card.className = 'view-card';

  // ヘッダー
  const header = document.createElement('div');
  header.className = 'view-card-header';
  const label = document.createElement('span');
  label.className = 'view-label';
  label.textContent = 'View';
  header.appendChild(label);
  const delBtn = document.createElement('button');
  delBtn.className = 'view-delete-btn';
  delBtn.textContent = '✕';
  delBtn.title = 'ビューを削除';
  delBtn.addEventListener('click', () => deleteView(viewIndex));
  header.appendChild(delBtn);
  card.appendChild(header);

  // name フィールド
  const nameField = document.createElement('div');
  nameField.className = 'view-field';
  const nameLabel = document.createElement('label');
  nameLabel.textContent = 'name';
  nameField.appendChild(nameLabel);
  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.value = view.name;
  nameInput.addEventListener('change', e => {
    pushUndo();
    view.name = e.target.value;
    updateJsonPanel();
  });
  nameField.appendChild(nameInput);
  card.appendChild(nameField);

  // context フィールド
  const ctxField = document.createElement('div');
  ctxField.className = 'view-field';
  const ctxLabel = document.createElement('label');
  ctxLabel.textContent = 'context';
  ctxField.appendChild(ctxLabel);
  const ctxInput = document.createElement('input');
  ctxInput.type = 'text';
  ctxInput.value = view.context;
  ctxInput.addEventListener('change', e => {
    pushUndo();
    view.context = e.target.value;
    updateJsonPanel();
  });
  ctxField.appendChild(ctxInput);
  card.appendChild(ctxField);

  // primaryType フィールド
  const typeField = document.createElement('div');
  typeField.className = 'view-field';
  const typeLabel = document.createElement('label');
  typeLabel.textContent = 'primaryType';
  typeField.appendChild(typeLabel);
  const typeSelect = document.createElement('select');
  ['table', 'card', 'form', 'detail', 'dashboard'].forEach(t => {
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = t;
    if (view.primaryType === t) opt.selected = true;
    typeSelect.appendChild(opt);
  });
  typeSelect.addEventListener('change', e => {
    pushUndo();
    view.primaryType = e.target.value;
    updateJsonPanel();
  });
  typeField.appendChild(typeSelect);
  card.appendChild(typeField);

  // entities セクション
  const entSection = document.createElement('div');
  entSection.className = 'view-entities-section';
  const entLabel = document.createElement('div');
  entLabel.className = 'section-label';
  entLabel.textContent = 'entities';
  entSection.appendChild(entLabel);

  view.entities.forEach((ent, ei) => {
    const row = document.createElement('div');
    row.className = 'view-entity-row';

    // エンティティ名プルダウン
    const entSelect = document.createElement('select');
    const emptyOpt = document.createElement('option');
    emptyOpt.value = '';
    emptyOpt.textContent = '— エンティティを選択 —';
    entSelect.appendChild(emptyOpt);
    entityNames.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      if (ent.entity === name) opt.selected = true;
      entSelect.appendChild(opt);
    });
    // 現在の値がentityNamesに含まれない場合も表示
    if (ent.entity && !entityNames.includes(ent.entity)) {
      const opt = document.createElement('option');
      opt.value = ent.entity;
      opt.textContent = ent.entity + ' (不明)';
      opt.selected = true;
      entSelect.appendChild(opt);
    }
    entSelect.addEventListener('change', e => {
      pushUndo();
      ent.entity = e.target.value;
      updateJsonPanel();
    });
    row.appendChild(entSelect);

    // role テキスト入力
    const roleInput = document.createElement('input');
    roleInput.type = 'text';
    roleInput.value = ent.role;
    roleInput.placeholder = 'role';
    roleInput.addEventListener('change', e => {
      pushUndo();
      ent.role = e.target.value;
      updateJsonPanel();
    });
    row.appendChild(roleInput);

    // 削除ボタン
    const removeBtn = document.createElement('button');
    removeBtn.className = 'entity-remove-btn';
    removeBtn.textContent = '✕';
    removeBtn.title = 'エンティティ参照を削除';
    removeBtn.addEventListener('click', () => removeViewEntity(viewIndex, ei));
    row.appendChild(removeBtn);

    entSection.appendChild(row);
  });

  // 「+ エンティティを追加」ボタン
  const addEntBtn = document.createElement('button');
  addEntBtn.className = 'view-add-entity-btn';
  addEntBtn.textContent = '+ エンティティを追加';
  addEntBtn.addEventListener('click', () => addViewEntity(viewIndex));
  entSection.appendChild(addEntBtn);

  card.appendChild(entSection);

  // フッター: Wireframe生成ボタン
  const footer = document.createElement('div');
  footer.className = 'view-card-footer';
  const wfBtn = document.createElement('button');
  wfBtn.className = 'view-wireframe-btn';
  wfBtn.innerHTML = '&rarr; Wireframe生成';
  wfBtn.addEventListener('click', () => copyWireframeCommand(view.name, wfBtn));
  footer.appendChild(wfBtn);
  card.appendChild(footer);

  return card;
}

// ===== キーボードショートカット =====
document.addEventListener('keydown', e => {
  const isMeta = e.metaKey || e.ctrlKey;

  // ⌘Z: Undo
  if (isMeta && !e.shiftKey && e.key === 'z') {
    e.preventDefault();
    doUndo();
    return;
  }

  // ⌘⇧Z: Redo
  if (isMeta && e.shiftKey && e.key === 'z') {
    e.preventDefault();
    doRedo();
    return;
  }

  // ⌘C: コピー
  if (isMeta && e.key === 'c' && selectedPath && !isInputFocused()) {
    e.preventDefault();
    const node = getNodeByPath(selectedPath);
    if (node) clipboard = JSON.stringify(node);
    return;
  }

  // ⌘V: ペースト
  if (isMeta && e.key === 'v' && clipboard && !isInputFocused()) {
    e.preventDefault();
    pushUndo();
    const pasted = JSON.parse(clipboard);
    const target = selectedPath ? getNodeByPath(selectedPath) : model.root;
    const parent = (target && target.children) ? target : model.root;
    parent.children.push(pasted);
    render();
    return;
  }

  // Delete / Backspace: 削除
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedPath && !isInputFocused()) {
    e.preventDefault();
    deleteNode(selectedPath);
    return;
  }

  // 矢印キー: 選択中ノードを移動（親のdirectionに応じて）
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key) && selectedPath && selectedPath.length > 0 && !isInputFocused()) {
    const parent = getParentByPath(selectedPath);
    if (!parent) return;
    const dir = parent.direction || 'vertical';
    const idx = selectedPath[selectedPath.length - 1];
    let delta = 0;
    if (dir === 'horizontal' && e.key === 'ArrowLeft') delta = -1;
    if (dir === 'horizontal' && e.key === 'ArrowRight') delta = 1;
    if (dir === 'vertical' && e.key === 'ArrowUp') delta = -1;
    if (dir === 'vertical' && e.key === 'ArrowDown') delta = 1;
    if (delta === 0) return;
    const newIdx = idx + delta;
    if (newIdx < 0 || newIdx >= parent.children.length) return;
    e.preventDefault();
    pushUndo();
    const [removed] = parent.children.splice(idx, 1);
    parent.children.splice(newIdx, 0, removed);
    selectedPath = [...selectedPath.slice(0, -1), newIdx];
    render();
    return;
  }

  // ⌘S: 手動保存（接続済みならすぐ保存、未接続ならConnect）
  if (isMeta && e.key === 's') {
    e.preventDefault();
    if (fileHandle) { writeToFile(); } else { connectFile(); }
    return;
  }
});

function isInputFocused() {
  const el = document.activeElement;
  return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT' || el.isContentEditable);
}

// ===== キャンバスクリックで選択解除 =====
document.getElementById('canvas').addEventListener('click', () => {
  selectedPath = null;
  render();
});

// ===== ファイルドラッグ&ドロップで接続 =====
let fileDragCounter = 0;
const overlay = document.getElementById('fileDropOverlay');

document.addEventListener('dragenter', e => {
  // 外部ファイルのドラッグのみ反応（内部ノードドラッグは無視）
  if (!e.dataTransfer.types.includes('Files')) return;
  fileDragCounter++;
  overlay.classList.add('active');
});

document.addEventListener('dragleave', e => {
  if (!e.dataTransfer.types.includes('Files')) return;
  fileDragCounter--;
  if (fileDragCounter <= 0) {
    fileDragCounter = 0;
    overlay.classList.remove('active');
  }
});

document.addEventListener('dragover', e => {
  if (e.dataTransfer.types.includes('Files')) e.preventDefault();
});

document.addEventListener('drop', async e => {
  fileDragCounter = 0;
  overlay.classList.remove('active');
  if (!e.dataTransfer.types.includes('Files')) return;
  e.preventDefault();

  // DataTransferItem から FileSystemFileHandle を取得（Chrome/Edge）
  const items = [...e.dataTransfer.items];
  for (const item of items) {
    if (item.kind !== 'file') continue;
    if (typeof item.getAsFileSystemHandle === 'function') {
      const handle = await item.getAsFileSystemHandle();
      if (handle.kind === 'file' && handle.name.endsWith('.json')) {
        fileHandle = handle;
        updateSaveStatus('connected', handle.name + ' (自動保存)');
        document.getElementById('btnConnect').textContent = 'Reconnect';
        await writeToFile();
        return;
      }
    }
  }
  // getAsFileSystemHandle 非対応の場合
  updateSaveStatus('error', 'ドロップ接続非対応 — Connectを使用');
});

// ===== 初期レンダリング =====
render();
</script>
</body>
</html>
