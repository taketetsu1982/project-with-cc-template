<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conceptual Model Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5;
    color: #333;
    height: 100vh;
    overflow: hidden;
  }

  /* ===== レイアウト ===== */
  .app {
    display: flex;
    height: 100vh;
  }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 8px 16px;
    background: #fff;
    border-bottom: 1px solid #ddd;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .toolbar button {
    padding: 6px 14px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    color: #333;
  }
  .toolbar button:hover { background: #f0f0f0; }
  .toolbar button.primary { background: #333; color: #fff; border-color: #333; }
  .toolbar button.primary:hover { background: #555; }

  .canvas-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .canvas {
    flex: 1;
    overflow: auto;
    padding: 24px;
  }

  .json-pane {
    width: 400px;
    background: #1e1e1e;
    color: #d4d4d4;
    display: flex;
    flex-direction: column;
    border-left: 1px solid #ddd;
  }

  .json-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: #2d2d2d;
    border-bottom: 1px solid #444;
    font-size: 13px;
  }
  .json-header-spacer { flex: 1; }
  .json-header-btn {
    padding: 6px 14px;
    border: 1px solid #555;
    border-radius: 4px;
    background: #383838;
    color: #ccc;
    cursor: pointer;
    font-size: 13px;
    flex-shrink: 0;
  }
  .json-header-btn:hover { background: #4a4a4a; color: #fff; }

  .json-header .save-status {
    font-size: 13px;
    color: #fff;
  }

  .json-body {
    flex: 1;
    overflow: auto;
    padding: 12px;
  }

  .json-body pre {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* ===== ノード共通 ===== */
  .node {
    position: relative;
    user-select: none;
  }

  .node.selected > .node-inner {
    outline: 2px solid #4a9eff;
    outline-offset: 2px;
  }

  .node.drag-over > .node-inner {
    outline: 2px dashed #4a9eff;
    outline-offset: 2px;
  }

  /* ===== グループノード ===== */
  .group > .node-inner {
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #fafafa;
    min-width: 120px;
    min-height: 60px;
  }

  .group-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-bottom: 1px solid #e0e0e0;
    background: #f0f0f0;
    border-radius: 6px 6px 0 0;
    cursor: grab;
  }
  .group-header:active { cursor: grabbing; }

  .grab-bar {
    display: flex;
    flex-direction: column;
    gap: 2px;
    opacity: 0.4;
    flex-shrink: 0;
  }
  .grab-bar span {
    display: block;
    width: 12px;
    height: 2px;
    background: #999;
    border-radius: 1px;
  }

  .group-name {
    font-size: 13px;
    font-weight: 600;
    color: #555;
    border: none;
    background: none;
    outline: none;
    flex: 1;
    min-width: 60px;
  }
  .group-name:focus { border-bottom: 1px solid #4a9eff; }

  .direction-btn {
    font-size: 13px;
    padding: 2px 6px;
    border: 1px solid #ccc;
    border-radius: 3px;
    background: #fff;
    cursor: pointer;
    color: #777;
    flex-shrink: 0;
  }
  .direction-btn:hover { background: #e8e8e8; }

  .group-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }
  .group-actions button {
    font-size: 13px;
    padding: 2px 6px;
    border: 1px solid #ccc;
    border-radius: 3px;
    background: #fff;
    cursor: pointer;
    color: #777;
  }
  .group-actions button:hover { background: #e8e8e8; }

  .group-children {
    padding: 10px;
    display: flex;
    gap: 10px;
  }
  .group-children.vertical { flex-direction: column; }
  .group-children.horizontal { flex-direction: row; flex-wrap: wrap; }
  .group-children.horizontal > .node { flex: 1; min-width: 0; }

  .drop-zone {
    min-height: 40px;
    min-width: 40px;
    border: 2px dashed #ddd;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #bbb;
    font-size: 13px;
  }
  .drop-zone:empty::after { content: 'ドラッグで追加'; }

  /* ===== エンティティノード ===== */
  .entity > .node-inner {
    border: 1px solid #bbb;
    border-radius: 6px;
    background: #fff;
    min-width: 140px;
  }

  .entity-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-bottom: 1px solid #e8e8e8;
    cursor: grab;
  }
  .entity-header:active { cursor: grabbing; }

  .entity-name {
    font-size: 13px;
    font-weight: 600;
    color: #333;
    border: none;
    background: none;
    outline: none;
    flex: 1;
    min-width: 60px;
  }
  .entity-name:focus { border-bottom: 1px solid #4a9eff; }

  .entity-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }
  .entity-actions button {
    font-size: 13px;
    padding: 2px 6px;
    border: 1px solid #ccc;
    border-radius: 3px;
    background: #fff;
    cursor: pointer;
    color: #777;
  }
  .entity-actions button:hover { background: #e8e8e8; }

  .attributes {
    padding: 8px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    min-height: 32px;
  }

  .attr-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    background: #eee;
    border: 1px solid #ddd;
    border-radius: 12px;
    font-size: 13px;
    color: #555;
    cursor: default;
  }

  .attr-tag .attr-text {
    border: none;
    background: none;
    outline: none;
    font-size: 13px;
    color: #555;
    width: 30px; /* JS で動的に設定 */
    min-width: 20px;
  }
  .attr-tag .attr-text:focus { color: #333; }

  .attr-tag .attr-remove {
    cursor: pointer;
    color: #aaa;
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
  }
  .attr-tag .attr-remove:hover { color: #e44; }

  .attr-add {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border: 1px dashed #ccc;
    border-radius: 12px;
    font-size: 14px;
    color: #aaa;
    cursor: pointer;
    background: none;
  }
  .attr-add:hover { border-color: #999; color: #666; }

  /* ===== Auto Save ステータス ===== */
  .save-status {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .save-status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ccc;
  }
  .save-status .dot.connected { background: #4caf50; }
  .save-status .dot.saving { background: #ff9800; }
  .save-status .dot.error { background: #f44336; }

  /* ===== ファイルドロップオーバーレイ ===== */
  .file-drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(74, 158, 255, 0.08);
    border: 3px dashed #4a9eff;
    z-index: 9999;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .file-drop-overlay.active { display: flex; }
  .file-drop-overlay .drop-msg {
    padding: 16px 32px;
    background: #fff;
    border-radius: 8px;
    font-size: 15px;
    color: #4a9eff;
    font-weight: 600;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }

  /* ===== ユーティリティ ===== */
  .hidden { display: none !important; }

  /* ドラッグ中のゴースト */
  .dragging { opacity: 0.4; }
</style>
</head>
<body>
<div class="app">
  <div class="canvas-pane">
    <div class="toolbar">
      <button onclick="addGroup()">+ グループ</button>
      <button onclick="addEntity()">+ エンティティ</button>
      <button onclick="doUndo()" title="⌘Z">↩ Undo</button>
      <button onclick="doRedo()" title="⌘⇧Z">↪ Redo</button>
    </div>
    <div class="canvas" id="canvas"></div>
  </div>
  <div class="json-pane" id="jsonPane">
    <div class="json-header">
      <span class="save-status" id="saveStatus"><span class="dot" id="saveDot"></span><span id="saveLabel">未接続 — JSONファイルをドロップ</span></span>
      <div class="json-header-spacer"></div>
      <button class="json-header-btn" id="btnConnect" onclick="connectFile()">Connect</button>
    </div>
    <div class="json-body">
      <pre id="jsonOutput"></pre>
    </div>
  </div>
</div>
<div class="file-drop-overlay" id="fileDropOverlay"><span class="drop-msg">JSONファイルをドロップして接続</span></div>

<script>
// ===== データ =====
const CM_DATA = null;
const CM_FILENAME = null;

let model = CM_DATA ? structuredClone(CM_DATA) : {
  name: 'Conceptual Model',
  root: { name: 'ルート', direction: 'vertical', children: [] }
};

// ===== Undo / Redo =====
const undoStack = [];
const redoStack = [];
const MAX_UNDO = 50;

function pushUndo() {
  undoStack.push(JSON.stringify(model));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack.length = 0;
}

function doUndo() {
  if (!undoStack.length) return;
  redoStack.push(JSON.stringify(model));
  model = JSON.parse(undoStack.pop());
  selectedPath = null;
  render();
}

function doRedo() {
  if (!redoStack.length) return;
  undoStack.push(JSON.stringify(model));
  model = JSON.parse(redoStack.pop());
  selectedPath = null;
  render();
}

// ===== 選択 =====
let selectedPath = null; // 配列: ルートからのchildren index

function getNodeByPath(path) {
  let node = model.root;
  for (const idx of path) {
    if (!node.children) return null;
    node = node.children[idx];
    if (!node) return null;
  }
  return node;
}

function getParentByPath(path) {
  if (path.length === 0) return null;
  return getNodeByPath(path.slice(0, -1));
}

// ===== 文字幅計測 =====
const _measureCanvas = document.createElement('canvas');
const _measureCtx = _measureCanvas.getContext('2d');

function measureTextWidth(text, font) {
  _measureCtx.font = font || '13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  return Math.ceil(_measureCtx.measureText(text).width);
}

function fitInputWidth(input) {
  const width = measureTextWidth(input.value || ' ') + 8; // 余白分
  input.style.width = Math.max(width, 20) + 'px';
}

// ===== Auto Save（File System Access API） =====
let fileHandle = null;
let autoSaveTimer = null;
let isSaving = false;
const AUTO_SAVE_DELAY = 500; // ms

function updateSaveStatus(state, label) {
  const dot = document.getElementById('saveDot');
  const lbl = document.getElementById('saveLabel');
  dot.className = 'dot ' + state;
  lbl.textContent = label;
}

async function connectFile() {
  if (!('showDirectoryPicker' in window)) {
    alert('このブラウザはFile System Access APIに対応していません。JSONファイルをドロップして接続してください。');
    return;
  }
  const filename = CM_FILENAME || 'conceptual-model.json';
  try {
    // フォルダ選択 → そこから対象JSONファイルを取得（なければ作成）
    // id を指定して、2回目以降は前回選んだフォルダからスタート
    const dirHandle = await window.showDirectoryPicker({ id: 'cm-editor', mode: 'readwrite' });
    fileHandle = await dirHandle.getFileHandle(filename, { create: true });
    updateSaveStatus('connected', fileHandle.name + ' (自動保存)');
    document.getElementById('btnConnect').textContent = 'Reconnect';
    // 接続直後に一度保存
    await writeToFile();
  } catch (e) {
    if (e.name !== 'AbortError') {
      console.error(e);
      updateSaveStatus('error', 'エラー');
    }
  }
}

async function writeToFile() {
  if (!fileHandle || isSaving) return;
  isSaving = true;
  updateSaveStatus('saving', '保存中...');
  try {
    const json = JSON.stringify(model, null, 2) + '\n';
    const writable = await fileHandle.createWritable();
    await writable.write(json);
    await writable.close();
    updateSaveStatus('connected', fileHandle.name + ' (自動保存)');
  } catch (e) {
    console.error(e);
    updateSaveStatus('error', '保存失敗');
    // 権限が失われた場合はfileHandleをリセット
    if (e.name === 'NotAllowedError') {
      fileHandle = null;
      updateSaveStatus('', '未接続（権限切れ）');
      document.getElementById('btnConnect').textContent = 'Connect';
    }
  } finally {
    isSaving = false;
  }
}

function scheduleAutoSave() {
  if (!fileHandle) return;
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => writeToFile(), AUTO_SAVE_DELAY);
}

// ===== JSON パネル =====
function updateJsonPanel() {
  document.getElementById('jsonOutput').textContent = JSON.stringify(model, null, 2);
  scheduleAutoSave();
}

// ===== ノード追加 =====
function addGroup() {
  pushUndo();
  const target = selectedPath ? getNodeByPath(selectedPath) : model.root;
  const parent = (target && target.children) ? target : model.root;
  parent.children.push({ name: '新規グループ', direction: 'vertical', children: [] });
  render();
}

function addEntity() {
  pushUndo();
  const target = selectedPath ? getNodeByPath(selectedPath) : model.root;
  const parent = (target && target.children) ? target : model.root;
  parent.children.push({ name: '新規エンティティ', type: 'entity', attributes: [] });
  render();
}

// ===== ドラッグ&ドロップ =====
let dragPath = null;

function onDragStart(e, path) {
  dragPath = path;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', '');
  requestAnimationFrame(() => {
    const el = getNodeElement(path);
    if (el) el.classList.add('dragging');
  });
}

function onDragEnd(e, path) {
  const el = getNodeElement(path);
  if (el) el.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  dragPath = null;
}

function onDragOver(e, targetPath) {
  if (!dragPath) return;
  // 自分自身の子孫へのドロップを禁止
  if (isDescendant(dragPath, targetPath)) return;
  // 同一ノードへのドロップを禁止
  if (pathEquals(dragPath, targetPath)) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function onDragEnter(e, targetPath) {
  if (!dragPath || isDescendant(dragPath, targetPath) || pathEquals(dragPath, targetPath)) return;
  e.preventDefault();
  const el = getNodeElement(targetPath);
  if (el) el.classList.add('drag-over');
}

function onDragLeave(e, targetPath) {
  const el = getNodeElement(targetPath);
  if (el) el.classList.remove('drag-over');
}

function onDrop(e, targetPath) {
  e.preventDefault();
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  if (!dragPath || isDescendant(dragPath, targetPath) || pathEquals(dragPath, targetPath)) return;

  const targetNode = getNodeByPath(targetPath);
  // グループへのドロップ: 子に追加
  if (targetNode && targetNode.children) {
    pushUndo();
    const srcParent = dragPath.length === 0 ? model : getParentByPath(dragPath);
    const srcIdx = dragPath[dragPath.length - 1];

    if (srcParent === model) return; // ルートは移動不可
    const parentChildren = srcParent.children || srcParent.root?.children;
    if (!parentChildren) return;

    // 元の位置から削除
    const [removed] = parentChildren.splice(srcIdx, 1);
    // ターゲットの子に追加
    targetNode.children.push(removed);
    dragPath = null;
    selectedPath = null;
    render();
    return;
  }

  // 同一親内での並べ替え
  const srcParent = getParentByPath(dragPath);
  const tgtParent = getParentByPath(targetPath);
  if (!srcParent || !tgtParent) return;
  if (!pathEquals(dragPath.slice(0, -1), targetPath.slice(0, -1))) {
    // 異なる親間の移動
    pushUndo();
    const srcIdx = dragPath[dragPath.length - 1];
    const tgtIdx = targetPath[targetPath.length - 1];
    const [removed] = srcParent.children.splice(srcIdx, 1);
    // 挿入先のインデックス調整
    const adjustedIdx = (pathEquals(dragPath.slice(0, -1), targetPath.slice(0, -1)) && srcIdx < tgtIdx) ? tgtIdx - 1 : tgtIdx;
    tgtParent.children.splice(adjustedIdx, 0, removed);
    dragPath = null;
    selectedPath = null;
    render();
    return;
  }

  // 同一親内
  pushUndo();
  const srcIdx = dragPath[dragPath.length - 1];
  const tgtIdx = targetPath[targetPath.length - 1];
  const [removed] = srcParent.children.splice(srcIdx, 1);
  const adjustedIdx = srcIdx < tgtIdx ? tgtIdx - 1 : tgtIdx;
  srcParent.children.splice(adjustedIdx, 0, removed);
  dragPath = null;
  selectedPath = null;
  render();
}

function isDescendant(parentPath, childPath) {
  if (childPath.length <= parentPath.length) return false;
  for (let i = 0; i < parentPath.length; i++) {
    if (parentPath[i] !== childPath[i]) return false;
  }
  return true;
}

function pathEquals(a, b) {
  if (!a || !b) return false;
  if (a.length !== b.length) return false;
  return a.every((v, i) => v === b[i]);
}

function getNodeElement(path) {
  return document.querySelector(`[data-path="${path.join(',')}"]`);
}

// ===== コピー&ペースト =====
let clipboard = null;

// ===== 削除 =====
function deleteNode(path) {
  if (path.length === 0) return; // ルートは削除不可
  pushUndo();
  const parent = getParentByPath(path);
  const idx = path[path.length - 1];
  parent.children.splice(idx, 1);
  selectedPath = null;
  render();
}

// ===== レンダリング =====
function render() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  canvas.appendChild(renderNode(model.root, []));
  updateJsonPanel();
}

function renderNode(node, path) {
  if (node.type === 'entity') {
    return renderEntity(node, path);
  }
  return renderGroup(node, path);
}

function renderGroup(node, path) {
  const div = document.createElement('div');
  div.className = 'node group' + (pathEquals(selectedPath, path) ? ' selected' : '');
  div.dataset.path = path.join(',');
  div.setAttribute('draggable', path.length > 0 ? 'true' : 'false');

  if (path.length > 0) {
    div.addEventListener('dragstart', e => { e.stopPropagation(); onDragStart(e, path); });
    div.addEventListener('dragend', e => onDragEnd(e, path));
  }
  div.addEventListener('dragover', e => { e.stopPropagation(); onDragOver(e, path); });
  div.addEventListener('dragenter', e => { e.stopPropagation(); onDragEnter(e, path); });
  div.addEventListener('dragleave', e => { e.stopPropagation(); onDragLeave(e, path); });
  div.addEventListener('drop', e => { e.stopPropagation(); onDrop(e, path); });

  const inner = document.createElement('div');
  inner.className = 'node-inner';

  // ヘッダー
  const header = document.createElement('div');
  header.className = 'group-header';
  header.addEventListener('click', e => {
    e.stopPropagation();
    selectedPath = pathEquals(selectedPath, path) ? null : path;
    render();
  });

  if (path.length > 0) {
    const grab = document.createElement('div');
    grab.className = 'grab-bar';
    grab.innerHTML = '<span></span><span></span><span></span>';
    header.appendChild(grab);
  }

  const nameInput = document.createElement('input');
  nameInput.className = 'group-name';
  nameInput.value = node.name;
  nameInput.addEventListener('click', e => e.stopPropagation());
  nameInput.addEventListener('change', e => {
    pushUndo();
    node.name = e.target.value;
    updateJsonPanel();
  });
  header.appendChild(nameInput);

  const dirBtn = document.createElement('button');
  dirBtn.className = 'direction-btn';
  dirBtn.textContent = node.direction === 'vertical' ? '↕' : '↔';
  dirBtn.title = node.direction === 'vertical' ? 'vertical → horizontal' : 'horizontal → vertical';
  dirBtn.addEventListener('click', e => {
    e.stopPropagation();
    pushUndo();
    node.direction = node.direction === 'vertical' ? 'horizontal' : 'vertical';
    render();
  });
  header.appendChild(dirBtn);

  if (path.length > 0) {
    const actions = document.createElement('div');
    actions.className = 'group-actions';

    const delBtn = document.createElement('button');
    delBtn.textContent = '✕';
    delBtn.title = '削除';
    delBtn.addEventListener('click', e => {
      e.stopPropagation();
      deleteNode(path);
    });
    actions.appendChild(delBtn);
    header.appendChild(actions);
  }

  inner.appendChild(header);

  // 子要素
  const children = document.createElement('div');
  children.className = 'group-children ' + node.direction;

  if (node.children.length === 0) {
    const dropZone = document.createElement('div');
    dropZone.className = 'drop-zone';
    children.appendChild(dropZone);
  } else {
    node.children.forEach((child, i) => {
      children.appendChild(renderNode(child, [...path, i]));
    });
  }

  inner.appendChild(children);
  div.appendChild(inner);
  return div;
}

function renderEntity(node, path) {
  const div = document.createElement('div');
  div.className = 'node entity' + (pathEquals(selectedPath, path) ? ' selected' : '');
  div.dataset.path = path.join(',');
  div.setAttribute('draggable', 'true');

  div.addEventListener('dragstart', e => { e.stopPropagation(); onDragStart(e, path); });
  div.addEventListener('dragend', e => onDragEnd(e, path));
  div.addEventListener('dragover', e => { e.stopPropagation(); onDragOver(e, path); });
  div.addEventListener('dragenter', e => { e.stopPropagation(); onDragEnter(e, path); });
  div.addEventListener('dragleave', e => { e.stopPropagation(); onDragLeave(e, path); });
  div.addEventListener('drop', e => { e.stopPropagation(); onDrop(e, path); });

  const inner = document.createElement('div');
  inner.className = 'node-inner';

  // ヘッダー
  const header = document.createElement('div');
  header.className = 'entity-header';
  header.addEventListener('click', e => {
    e.stopPropagation();
    selectedPath = pathEquals(selectedPath, path) ? null : path;
    render();
  });

  const grab = document.createElement('div');
  grab.className = 'grab-bar';
  grab.innerHTML = '<span></span><span></span><span></span>';
  header.appendChild(grab);

  const nameInput = document.createElement('input');
  nameInput.className = 'entity-name';
  nameInput.value = node.name;
  nameInput.addEventListener('click', e => e.stopPropagation());
  nameInput.addEventListener('change', e => {
    pushUndo();
    node.name = e.target.value;
    updateJsonPanel();
  });
  header.appendChild(nameInput);

  const actions = document.createElement('div');
  actions.className = 'entity-actions';

  const delBtn = document.createElement('button');
  delBtn.textContent = '✕';
  delBtn.title = '削除';
  delBtn.addEventListener('click', e => {
    e.stopPropagation();
    deleteNode(path);
  });
  actions.appendChild(delBtn);
  header.appendChild(actions);

  inner.appendChild(header);

  // 属性タグ
  const attrs = document.createElement('div');
  attrs.className = 'attributes';

  node.attributes.forEach((attr, i) => {
    const tag = document.createElement('span');
    tag.className = 'attr-tag';

    const text = document.createElement('input');
    text.className = 'attr-text';
    text.value = attr;
    // 初期幅を計測して設定（レンダリング後にも再計測）
    requestAnimationFrame(() => fitInputWidth(text));
    text.addEventListener('click', e => e.stopPropagation());
    text.addEventListener('input', e => {
      fitInputWidth(text);
    });
    text.addEventListener('change', e => {
      pushUndo();
      node.attributes[i] = e.target.value;
      updateJsonPanel();
    });
    tag.appendChild(text);

    const remove = document.createElement('span');
    remove.className = 'attr-remove';
    remove.textContent = '×';
    remove.addEventListener('click', e => {
      e.stopPropagation();
      pushUndo();
      node.attributes.splice(i, 1);
      render();
    });
    tag.appendChild(remove);

    attrs.appendChild(tag);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'attr-add';
  addBtn.textContent = '+';
  addBtn.title = '属性を追加';
  addBtn.addEventListener('click', e => {
    e.stopPropagation();
    pushUndo();
    node.attributes.push('新規属性');
    render();
  });
  attrs.appendChild(addBtn);

  inner.appendChild(attrs);
  div.appendChild(inner);
  return div;
}

// ===== キーボードショートカット =====
document.addEventListener('keydown', e => {
  const isMeta = e.metaKey || e.ctrlKey;

  // ⌘Z: Undo
  if (isMeta && !e.shiftKey && e.key === 'z') {
    e.preventDefault();
    doUndo();
    return;
  }

  // ⌘⇧Z: Redo
  if (isMeta && e.shiftKey && e.key === 'z') {
    e.preventDefault();
    doRedo();
    return;
  }

  // ⌘C: コピー
  if (isMeta && e.key === 'c' && selectedPath && !isInputFocused()) {
    e.preventDefault();
    const node = getNodeByPath(selectedPath);
    if (node) clipboard = JSON.stringify(node);
    return;
  }

  // ⌘V: ペースト
  if (isMeta && e.key === 'v' && clipboard && !isInputFocused()) {
    e.preventDefault();
    pushUndo();
    const pasted = JSON.parse(clipboard);
    const target = selectedPath ? getNodeByPath(selectedPath) : model.root;
    const parent = (target && target.children) ? target : model.root;
    parent.children.push(pasted);
    render();
    return;
  }

  // Delete / Backspace: 削除
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedPath && !isInputFocused()) {
    e.preventDefault();
    deleteNode(selectedPath);
    return;
  }

  // ⌘S: 手動保存（接続済みならすぐ保存、未接続ならConnect）
  if (isMeta && e.key === 's') {
    e.preventDefault();
    if (fileHandle) { writeToFile(); } else { connectFile(); }
    return;
  }
});

function isInputFocused() {
  const el = document.activeElement;
  return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable);
}

// ===== キャンバスクリックで選択解除 =====
document.getElementById('canvas').addEventListener('click', () => {
  selectedPath = null;
  render();
});

// ===== ファイルドラッグ&ドロップで接続 =====
let fileDragCounter = 0;
const overlay = document.getElementById('fileDropOverlay');

document.addEventListener('dragenter', e => {
  // 外部ファイルのドラッグのみ反応（内部ノードドラッグは無視）
  if (!e.dataTransfer.types.includes('Files')) return;
  fileDragCounter++;
  overlay.classList.add('active');
});

document.addEventListener('dragleave', e => {
  if (!e.dataTransfer.types.includes('Files')) return;
  fileDragCounter--;
  if (fileDragCounter <= 0) {
    fileDragCounter = 0;
    overlay.classList.remove('active');
  }
});

document.addEventListener('dragover', e => {
  if (e.dataTransfer.types.includes('Files')) e.preventDefault();
});

document.addEventListener('drop', async e => {
  fileDragCounter = 0;
  overlay.classList.remove('active');
  if (!e.dataTransfer.types.includes('Files')) return;
  e.preventDefault();

  // DataTransferItem から FileSystemFileHandle を取得（Chrome/Edge）
  const items = [...e.dataTransfer.items];
  for (const item of items) {
    if (item.kind !== 'file') continue;
    if (typeof item.getAsFileSystemHandle === 'function') {
      const handle = await item.getAsFileSystemHandle();
      if (handle.kind === 'file' && handle.name.endsWith('.json')) {
        fileHandle = handle;
        updateSaveStatus('connected', handle.name + ' (自動保存)');
        document.getElementById('btnConnect').textContent = 'Reconnect';
        await writeToFile();
        return;
      }
    }
  }
  // getAsFileSystemHandle 非対応の場合
  updateSaveStatus('error', 'ドロップ接続非対応 — Connect Fileを使用');
});

// ===== 初期レンダリング =====
render();
</script>
