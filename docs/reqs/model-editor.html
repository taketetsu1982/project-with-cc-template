<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Editor</title>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" as="style"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"/>
<link rel="stylesheet" href="./lib/editor-base.css"/>
<style>
  :root{--md-sys-color-on-secondary:#FFFFFF;--md-sys-color-secondary-container:#F1F3F4;--md-sys-color-tertiary:#7D5260;--md-sys-color-surface-dim:#E8EAED}
</style>
</head>
<body>
<div class="file-drop-overlay" id="cm-drop-overlay"><span class="drop-msg">Drop JSON file to connect</span></div>
<div class="ed-toast" id="cm-toast"></div>
<div class="ed-toolbar" id="cm-toolbar">
  <div style="flex:1"></div>
  <span class="ed-edited" id="cm-edited">Edited</span>
  <button class="ed-connect-btn" id="cm-connect-btn" onclick="handleConnect()">
    <span class="ed-dot" id="cm-dot"></span>
    <span id="cm-label">Connect</span>
    <span class="ed-hint" id="cm-hint">(Drop a JSON file)</span>
  </button>
  <label class="ed-auto-switch" id="cm-auto-btn" onclick="toggleAuto()" title="Auto save">Auto <span class="ed-switch-track"><span class="ed-switch-thumb"></span></span></label>
</div>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="./lib/shared.js"></script>
<script src="./lib/model-logic.js"></script>

<script>
let passthrough={};
let fileHandle=null,autoSaveEnabled=false,saveTimer=null,isSaving=false,modelRef=null;

function getFullJson(){
  if(!modelRef)return null;
  return{...passthrough,entities:modelRef.entities,actors:modelRef.actors};
}

function updateStatus(s,l,h){const dot=document.getElementById('cm-dot');dot.className='ed-dot '+((s&&autoSaveEnabled)?s:(s==='error'?s:''));document.getElementById('cm-label').textContent=l||'';document.getElementById('cm-hint').textContent=h||'';}
function showToast(m){const t=document.getElementById('cm-toast');t.textContent=m;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),2000);}
function markModified(){document.getElementById('cm-edited').style.display='inline';if(autoSaveEnabled&&fileHandle)scheduleAutoSave();}
function scheduleAutoSave(){if(saveTimer)clearTimeout(saveTimer);if(!fileHandle||!autoSaveEnabled)return;saveTimer=setTimeout(()=>writeFile(),500);}
async function writeFile(){if(!fileHandle||isSaving)return;const full=getFullJson();if(!full)return;isSaving=true;updateStatus('saving',fileHandle.name,'');try{const w=await fileHandle.createWritable();await w.write(JSON.stringify(full,null,2)+'\n');await w.close();updateStatus('connected',fileHandle.name);document.getElementById('cm-edited').style.display='none';}catch(e){console.error(e);updateStatus('error','Save failed');if(e.name==='NotAllowedError')disconnectFile();}finally{isSaving=false;}}
function disconnectFile(){fileHandle=null;autoSaveEnabled=false;passthrough={};if(saveTimer)clearTimeout(saveTimer);document.getElementById('cm-auto-btn').style.display='none';document.getElementById('cm-edited').style.display='none';updateStatus('','Connect','(Drop a JSON file)');}
function onFileConnected(h){fileHandle=h;if(!autoSaveEnabled){autoSaveEnabled=true;document.getElementById('cm-auto-btn').classList.add('active');}document.getElementById('cm-auto-btn').style.display='flex';updateStatus('connected',h.name);}

function splitData(data){
  const{entities,actors,...rest}=data;
  passthrough=rest;
  const ents=entities||[];
  let migrated=false;
  ents.forEach(e=>{(e.relations||[]).forEach(r=>{if(r.type==='belongs-to'){r.type='has-many';migrated=true;}});});
  if(migrated)setTimeout(()=>showToast('belongs-toをhas-manyに自動変換しました'),300);
  return{entities:ents,actors:actors||[]};
}

async function handleConnect(){if(fileHandle){await writeFile();showToast('保存しました');return;}if(!('showOpenFilePicker' in window)){showToast('JSONファイルをドロップしてください');return;}try{const[h]=await window.showOpenFilePicker({id:'cm-editor',types:[{description:'JSON',accept:{'application/json':['.json']}}]});const f=await h.getFile();const t=await f.text();let d;try{d=JSON.parse(t);}catch{updateStatus('error','Invalid JSON');return;}onFileConnected(h);if(window.__cmLoadData)window.__cmLoadData(d);}catch(e){if(e.name!=='AbortError'){console.error(e);updateStatus('error','Error');}}}
function toggleAuto(){autoSaveEnabled=!autoSaveEnabled;document.getElementById('cm-auto-btn').classList.toggle('active',autoSaveEnabled);showToast('自動保存 '+(autoSaveEnabled?'ON':'OFF'));if(fileHandle){document.getElementById('cm-dot').className='ed-dot '+(autoSaveEnabled?'connected':'');}if(autoSaveEnabled&&fileHandle)scheduleAutoSave();}
let dragC=0;const ov=document.getElementById('cm-drop-overlay');
document.addEventListener('dragenter',e=>{if(e.dataTransfer.types.includes('Files')){dragC++;ov.classList.add('active');}});
document.addEventListener('dragleave',e=>{if(e.dataTransfer.types.includes('Files')){dragC--;if(dragC<=0){dragC=0;ov.classList.remove('active');}}});
document.addEventListener('dragover',e=>{if(e.dataTransfer.types.includes('Files'))e.preventDefault();});
document.addEventListener('drop',async e=>{dragC=0;ov.classList.remove('active');if(!e.dataTransfer.types.includes('Files'))return;e.preventDefault();for(const i of[...e.dataTransfer.items]){if(i.kind!=='file'||typeof i.getAsFileSystemHandle!=='function')continue;const h=await i.getAsFileSystemHandle();if(h.kind==='file'&&h.name.endsWith('.json')){const f=await h.getFile();const t=await f.text();let d;try{d=JSON.parse(t);}catch{updateStatus('error','Invalid JSON');return;}onFileConnected(h);if(window.__cmLoadData)window.__cmLoadData(d);return;}}updateStatus('error','Drop not supported');});
document.addEventListener('keydown',e=>{
  const mod=e.metaKey||e.ctrlKey;
  const inField=e.target.closest('input,textarea,select,[contenteditable]');
  if(mod&&e.key==='s'){e.preventDefault();if(fileHandle)writeFile().then(()=>showToast('保存しました'));return;}
  if(inField)return;
  if(mod&&e.key==='z'&&!e.shiftKey){e.preventDefault();window.__cmUndo?.();}
  if(mod&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();window.__cmRedo?.();}
  if(mod&&e.key==='c'){if(window.__cmCopy?.()){e.preventDefault();}}
  if(mod&&e.key==='v'){if(window.__cmPaste?.()){e.preventDefault();}}
  if(mod&&e.key==='x'){if(window.__cmCut?.()){e.preventDefault();}}
  if(e.key==='Delete'||e.key==='Backspace'){if(window.__cmDelete?.()){e.preventDefault();}}
});
</script>

<script type="text/babel">
const{useState,useRef,useCallback,useEffect}=React;
// M3 トークン参照用
const M3={
  primary:"var(--md-sys-color-primary)",onPrimary:"var(--md-sys-color-on-primary)",primaryContainer:"var(--md-sys-color-primary-container)",onPrimaryContainer:"var(--md-sys-color-on-primary-container)",
  surface:"var(--md-sys-color-surface)",surfaceDim:"var(--md-sys-color-surface-dim)",surfaceContLow:"var(--md-sys-color-surface-container-low)",surfaceCont:"var(--md-sys-color-surface-container)",surfaceContHigh:"var(--md-sys-color-surface-container-high)",surfaceContHighest:"var(--md-sys-color-surface-container-highest)",
  onSurface:"var(--md-sys-color-on-surface)",onSurfaceVar:"var(--md-sys-color-on-surface-variant)",
  outline:"var(--md-sys-color-outline)",outlineVar:"var(--md-sys-color-outline-variant)",
  error:"var(--md-sys-color-error)",errorContainer:"var(--md-sys-color-error-container)",onErrorContainer:"var(--md-sys-color-on-error-container)",
  shapeXs:"var(--md-sys-shape-xs)",shapeSm:"var(--md-sys-shape-sm)",shapeMd:"var(--md-sys-shape-md)",shapeLg:"var(--md-sys-shape-lg)",shapeFull:"var(--md-sys-shape-full)",
  elev1:"var(--md-sys-elevation-1)",elev2:"var(--md-sys-elevation-2)",
};
// lib から取得
const{CRUD_OPS,CRUD_COLOR,CRUD_BG,ENT_PALETTE,ZOOM_MIN,ZOOM_MAX,MAX_HISTORY,uid,uniqueName,edgePt,calcCenterPan,labelWidth}=window.__editorLib;
const{ensurePositions:_ensurePositions,CIRCLED,circled}=window.__editorLib;
const entPalette=(ents,id)=>window.__editorLib.entPalette(ents,id);
const entColor=(ents,id)=>window.__editorLib.entColor(ents,id);
const REL_TYPES=["has-many","has-one","many-to-many"];
// ノードサイズ
const EW=200,EH=72;
// Actorカード
const CRUD_W=28,CRUD_GAP=4,CRUD_ROW_H=26,ACTOR_CARD_H=EH+CRUD_ROW_H;
const CRUD_LABELS={C:"Create",R:"Read",U:"Update",D:"Delete"};
// 自己参照カーブ
const SELF_REF_X=6,SELF_REF_Y=14,SELF_REF_CP=38;
// グリッドレイアウト
const GRID_COLS=3,GRID_GAP_X=360,GRID_GAP_Y=240,GRID_PAD_X=80,GRID_PAD_Y=80;
const EMPTY={entities:[],actors:[]};
function ensurePositions(data){return _ensurePositions(data,{cols:GRID_COLS,gapX:GRID_GAP_X,gapY:GRID_GAP_Y,padX:GRID_PAD_X,padY:GRID_PAD_Y});}

// M3 コンポーネント
function Input({style,...p}){return<input{...p}style={{border:`1px solid ${M3.outlineVar}`,borderRadius:M3.shapeSm,background:M3.surface,color:M3.onSurface,fontSize:14,fontWeight:400,lineHeight:"20px",padding:"8px 16px",outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"inherit",...style}}onFocus={e=>{e.target.style.borderColor="#1A73E8";e.target.style.boxShadow="0 0 0 3px rgba(26,115,232,.12)";}}onBlur={e=>{e.target.style.borderColor="";e.target.style.boxShadow="none";}}/>;}
function Sel({style,children,...p}){return<select{...p}style={{border:`1px solid ${M3.outlineVar}`,borderRadius:M3.shapeSm,background:M3.surface,color:M3.onSurface,fontSize:14,fontWeight:400,lineHeight:"20px",padding:"8px 16px",outline:"none",fontFamily:"inherit",...style}}>{children}</select>;}
function Btn({children,onClick,accent,small,danger,ghost}){
  const bg=danger?M3.errorContainer:accent?"#1A73E8":ghost?"transparent":M3.surfaceCont;
  const fg=danger?M3.onErrorContainer:accent?M3.onPrimary:ghost?"#1A73E8":M3.onSurface;
  const bd=ghost?`1px solid ${M3.outlineVar}`:"none";
  return<button onClick={onClick}style={{background:bg,border:bd,color:fg,borderRadius:M3.shapeFull,padding:small?"8px 16px":"8px 24px",fontSize:14,fontWeight:500,lineHeight:"20px",letterSpacing:"0.1px",cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",transition:"box-shadow .15s, background .15s"}}onMouseEnter={e=>{e.target.style.boxShadow="var(--md-sys-elevation-1)";}}onMouseLeave={e=>{e.target.style.boxShadow="none";}}>{children}</button>;
}
const SLabel=({children})=><div style={{fontSize:12,fontWeight:500,lineHeight:"16px",letterSpacing:"0.5px",color:M3.onSurfaceVar,textTransform:"uppercase",marginBottom:8}}>{children}</div>;

// データロード時にインクリメントされるカウンター
let loadGeneration=0;
function useInitialPan(items,iw,ih){
  const svgRef=useRef();
  const[pan,setPan]=useState({x:0,y:0});
  const lastGen=useRef(-1);
  useEffect(()=>{
    if(lastGen.current===loadGeneration||!items||items.length===0||!svgRef.current)return;
    // レイアウト確定後に計算
    requestAnimationFrame(()=>{
      if(!svgRef.current)return;
      const r=svgRef.current.getBoundingClientRect();
      if(!r.width||!r.height)return;
      const c=calcCenterPan(items,iw,ih);
      setPan({x:c.cx-r.width/2,y:c.cy-r.height/2+40});
      lastGen.current=loadGeneration;
    });
  },[items,iw,ih]);
  return{svgRef,pan,setPan};
}

function EntityView({model,setModel,setModelSilent,selId,setSelId,selRelId,setSelRelId}){
  const[drag,setDrag]=useState(null),[conn,setConn]=useState(null),[connDrag,setConnDrag]=useState(null),[relDrag,setRelDrag]=useState(null),[editLabel,setEditLabel]=useState(false);
  const[multiSel,setMultiSel]=useState(new Set());
  const{svgRef,pan,setPan}=useInitialPan(model.entities,EW,EH);
  const[panning,setPanning]=useState(false);
  const[zoom,setZoom]=useState(1);
  const dOff=useRef({x:0,y:0}),panStart=useRef({x:0,y:0,px:0,py:0}),multiOffsets=useRef({});
  const ents=model.entities,selEnt=ents.find(e=>e.id===selId);
  const selRelOwner=selRelId?ents.find(e=>e.id===selRelId.entId):null;
  const selRel=selRelOwner?selRelOwner.relations.find(r=>r.id===selRelId.relId):null;
  useEffect(()=>{if(selRelId&&!selRel){setSelRelId(null);setEditLabel(false);}},[selRelId,selRel]);
  useEffect(()=>{const onKey=e=>{if(e.key==='Escape'){setMultiSel(new Set());multiOffsets.current={};setConnDrag(null);}};window.addEventListener('keydown',onKey);return()=>window.removeEventListener('keydown',onKey);},[]);
  const onBoxMD=(e,id)=>{e.stopPropagation();if(conn!==null){if(conn===""){setConn(id);const r2=svgRef.current.getBoundingClientRect();setConnDrag({mx:(e.clientX-r2.left)/zoom+pan.x,my:(e.clientY-r2.top)/zoom+pan.y});return;}if(conn!==id){const nr={id:uid(),targetId:id,type:"has-many",label:""};setModel(m=>({...m,entities:m.entities.map(en=>en.id===conn?{...en,relations:[...en.relations,nr]}:en)}));setConn(null);}setConnDrag(null);return;}const r=svgRef.current.getBoundingClientRect();const mx=(e.clientX-r.left)/zoom+pan.x,my=(e.clientY-r.top)/zoom+pan.y;setSelRelId(null);setEditLabel(false);if(e.shiftKey){window.getSelection()?.removeAllRanges();const next=new Set(multiSel);if(next.has(id))next.delete(id);else next.add(id);if(selId&&!next.has(selId))next.add(selId);setMultiSel(next);setSelId(null);const off={};next.forEach(nid=>{const en=ents.find(e=>e.id===nid);if(en)off[nid]={x:mx-en.x,y:my-en.y};});multiOffsets.current=off;setDrag(id);return;}if(multiSel.size>0&&multiSel.has(id)){const off={};multiSel.forEach(nid=>{const en=ents.find(e=>e.id===nid);if(en)off[nid]={x:mx-en.x,y:my-en.y};});multiOffsets.current=off;setDrag(id);return;}setMultiSel(new Set());multiOffsets.current={};setSelId(id);const en=ents.find(e=>e.id===id);dOff.current={x:mx-en.x,y:my-en.y};setDrag(id);};
  const onRelClick=(e,entId,relId)=>{e.stopPropagation();if(conn!==null)return;setMultiSel(new Set());multiOffsets.current={};const isSel=selRelId&&selRelId.entId===entId&&selRelId.relId===relId;setSelRelId(isSel?null:{entId,relId});setSelId(null);setEditLabel(false);};
  const onLabelClick=(e,entId,relId)=>{e.stopPropagation();if(conn!==null)return;setMultiSel(new Set());multiOffsets.current={};const isSel=selRelId&&selRelId.entId===entId&&selRelId.relId===relId;if(isSel){setEditLabel(true);}else{setSelRelId({entId,relId});setSelId(null);setEditLabel(false);}};
  const onHandleMD=(e,entId,relId,end)=>{e.preventDefault();e.stopPropagation();const r=svgRef.current.getBoundingClientRect();setRelDrag({entId,relId,end,mx:(e.clientX-r.left)/zoom+pan.x,my:(e.clientY-r.top)/zoom+pan.y});setSelRelId(null);setEditLabel(false);};
  const onBgMD=e=>{if(conn!==null)return;setPanning(true);panStart.current={x:e.clientX,y:e.clientY,px:pan.x,py:pan.y};};
  const onMM=useCallback(e=>{if(connDrag){if(conn===null){setConnDrag(null);return;}const r=svgRef.current.getBoundingClientRect();setConnDrag({mx:(e.clientX-r.left)/zoom+pan.x,my:(e.clientY-r.top)/zoom+pan.y});return;}if(relDrag){const r=svgRef.current.getBoundingClientRect();setRelDrag(d=>({...d,mx:(e.clientX-r.left)/zoom+pan.x,my:(e.clientY-r.top)/zoom+pan.y}));return;}if(drag){const r=svgRef.current.getBoundingClientRect();const mx=(e.clientX-r.left)/zoom+pan.x,my=(e.clientY-r.top)/zoom+pan.y;if(multiSel.size>0){const off=multiOffsets.current;setModelSilent(m=>({...m,entities:m.entities.map(en=>off[en.id]!==undefined?{...en,x:mx-off[en.id].x,y:my-off[en.id].y}:en)}));}else{setModelSilent(m=>({...m,entities:m.entities.map(en=>en.id===drag?{...en,x:mx-dOff.current.x,y:my-dOff.current.y}:en)}));}return;}if(panning){setPan({x:panStart.current.px-(e.clientX-panStart.current.x)/zoom,y:panStart.current.py-(e.clientY-panStart.current.y)/zoom});}},[connDrag,conn,relDrag,drag,panning,pan,zoom,setModelSilent,multiSel]);
  const onUp=()=>{if(connDrag){const hit=ents.find(en=>connDrag.mx>=en.x&&connDrag.mx<=en.x+EW&&connDrag.my>=en.y&&connDrag.my<=en.y+EH);if(hit&&conn&&hit.id!==conn){const nr={id:uid(),targetId:hit.id,type:"has-many",label:""};setModel(m=>({...m,entities:m.entities.map(en=>en.id===conn?{...en,relations:[...en.relations,nr]}:en)}));setConn(null);}else if(!hit){setConn("");}setConnDrag(null);return;}if(relDrag){const hit=ents.find(en=>relDrag.mx>=en.x&&relDrag.mx<=en.x+EW&&relDrag.my>=en.y&&relDrag.my<=en.y+EH);if(hit){if(relDrag.end==="target"){updRelField(relDrag.entId,relDrag.relId,"targetId",hit.id);}else{const rel=ents.find(e=>e.id===relDrag.entId)?.relations.find(r=>r.id===relDrag.relId);if(rel&&hit.id!==relDrag.entId&&hit.id!==rel.targetId){setModel(m=>({...m,entities:m.entities.map(e=>{if(e.id===relDrag.entId)return{...e,relations:e.relations.filter(r=>r.id!==relDrag.relId)};if(e.id===hit.id)return{...e,relations:[...e.relations,{...rel,id:uid()}]};return e;})}));setSelRelId(null);}}}setRelDrag(null);return;}if(drag)setModel(m=>m);setDrag(null);setPanning(false);};
  const onWheel=useCallback(e=>{e.preventDefault();if(e.ctrlKey||e.metaKey){const r=svgRef.current.getBoundingClientRect();const mx=(e.clientX-r.left),my=(e.clientY-r.top);const d=e.deltaY>0?0.92:1.08;setZoom(z=>{const nz=Math.min(ZOOM_MAX,Math.max(ZOOM_MIN,z*d));const wx=mx/z+pan.x,wy=my/z+pan.y;setPan({x:wx-mx/nz,y:wy-my/nz});return nz;});}else{setPan(p=>({x:p.x+e.deltaX/zoom,y:p.y+e.deltaY/zoom}));}},[zoom,pan]);
  const upd=u=>setModel(m=>({...m,entities:m.entities.map(e=>e.id===u.id?u:e)}));
  const updRelField=(entId,relId,k,v)=>setModel(m=>({...m,entities:m.entities.map(e=>e.id===entId?{...e,relations:e.relations.map(r=>r.id===relId?{...r,[k]:v}:r)}:e)}));
  const addEnt=()=>{const id=uid();setModel(m=>{const names=m.entities.map(e=>e.name);return{...m,entities:[...m.entities,{id,name:uniqueName("NewEntity",names),x:120/zoom+pan.x,y:120/zoom+pan.y,relations:[]}]};});setSelId(id);};
  const connOn=conn!==null,connHasSrc=conn!==null&&conn!=="";
  return(
    <div style={{display:"flex",height:"100%",position:"relative"}}>
      <div style={{flex:1,position:"relative",overflow:"hidden"}}>
        <svg ref={svgRef} width="100%" height="100%" style={{cursor:connDrag?"grabbing":relDrag?"grabbing":drag?"grabbing":panning?"grabbing":connOn?"crosshair":"grab",display:"block",userSelect:connDrag||relDrag||drag||panning?"none":"auto"}} onMouseMove={onMM} onMouseUp={onUp} onMouseLeave={onUp} onWheel={onWheel} onClick={e=>{if(e.target===e.currentTarget||e.target.getAttribute('data-bg')){if(!connOn){setSelId(null);setSelRelId(null);setEditLabel(false);setMultiSel(new Set());multiOffsets.current={};}}}}>
          <defs>
            <pattern id="dotpat" width={24/zoom} height={24/zoom} patternUnits="userSpaceOnUse" x={(-pan.x*zoom)%(24)} y={(-pan.y*zoom)%(24)}><circle cx={1/zoom} cy={1/zoom} r={1/zoom} fill="#E0E0E0"/></pattern>
            {/* has-many: crow's foot（三叉） */}
            <marker id="m-hm" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto"><line x1="11" y1="6" x2="3" y2="1" stroke="#9AA0A6" strokeWidth="1.5"/><line x1="11" y1="6" x2="3" y2="6" stroke="#9AA0A6" strokeWidth="1.5"/><line x1="11" y1="6" x2="3" y2="11" stroke="#9AA0A6" strokeWidth="1.5"/></marker>
            <marker id="m-hm-hi" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto"><line x1="11" y1="6" x2="3" y2="1" stroke="#1A73E8" strokeWidth="1.5"/><line x1="11" y1="6" x2="3" y2="6" stroke="#1A73E8" strokeWidth="1.5"/><line x1="11" y1="6" x2="3" y2="11" stroke="#1A73E8" strokeWidth="1.5"/></marker>
            {/* has-one: バー（|） */}
            <marker id="m-ho" markerWidth="6" markerHeight="12" refX="5" refY="6" orient="auto"><line x1="5" y1="1" x2="5" y2="11" stroke="#9AA0A6" strokeWidth="2"/></marker>
            <marker id="m-ho-hi" markerWidth="6" markerHeight="12" refX="5" refY="6" orient="auto"><line x1="5" y1="1" x2="5" y2="11" stroke="#1A73E8" strokeWidth="2"/></marker>
            {/* many-to-many: ダイヤモンド（◆） */}
            <marker id="m-mm" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><polygon points="1 5,5 1,9 5,5 9" fill="#9AA0A6"/></marker>
            <marker id="m-mm-hi" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><polygon points="1 5,5 1,9 5,5 9" fill="#1A73E8"/></marker>
            <marker id="m-mm-s" markerWidth="10" markerHeight="10" refX="1" refY="5" orient="auto"><polygon points="1 5,5 1,9 5,5 9" fill="#9AA0A6"/></marker>
            <marker id="m-mm-s-hi" markerWidth="10" markerHeight="10" refX="1" refY="5" orient="auto"><polygon points="1 5,5 1,9 5,5 9" fill="#1A73E8"/></marker>
          </defs>
          <rect width="100%" height="100%" fill="url(#dotpat)" data-bg="1" onMouseDown={onBgMD}/>

function OrphanEntityWarning({model}){
  const[open,setOpen]=useState(false);
  const warnings=[];
  const allTouchedIds=new Set(model.actors.flatMap(a=>(a.touches||[]).filter(t=>(t.crud||[]).length>0).map(t=>t.entityId)));
  const orphans=model.entities.filter(e=>!allTouchedIds.has(e.id));
  if(orphans.length>0)warnings.push({msg:`「${orphans.map(e=>e.name).join("」「")}」はどのActorにもアクセス権がありません`});
  model.entities.forEach(e=>{if(e.relations)e.relations.forEach(r=>{if(!model.entities.find(t=>t.id===r.targetId))warnings.push({msg:`「${e.name}」のリレーション先「${r.targetId}」が存在しません`});});});
  if(warnings.length===0)return null;
  return<div style={{position:"absolute",bottom:16,left:16,zIndex:20}}>
    {!open?<button onClick={()=>setOpen(true)} style={{background:"#FEF7E0",border:"1px solid #FDD663",borderRadius:"var(--md-sys-shape-full)",padding:"6px 14px",boxShadow:"var(--md-sys-elevation-1)",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontSize:13,fontWeight:500,color:"#E37400",fontFamily:"inherit"}}><span>⚠</span>{warnings.length} warnings</button>
    :<div style={{background:"white",border:"1px solid #FDD663",borderRadius:"var(--md-sys-shape-sm)",boxShadow:"var(--md-sys-elevation-2)",maxWidth:480,maxHeight:280,overflowY:"auto"}}>
      <div style={{padding:"8px 12px",borderBottom:"1px solid #FDD663",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#FEF7E0",position:"sticky",top:0}}><span style={{fontSize:13,fontWeight:500,color:"#E37400"}}>⚠ {warnings.length} warnings</span><button onClick={()=>setOpen(false)} style={{background:"none",border:"none",cursor:"pointer",color:"#9AA0A6",padding:0}}><span className="msi" style={{fontSize:18}}>close</span></button></div>
      {warnings.map((w,i)=><div key={i} style={{padding:"6px 12px",borderBottom:"1px solid #F5F5F5",fontSize:12,color:"#5F6368",lineHeight:"16px"}}>{w.msg}</div>)}
    </div>}
  </div>;
}

  const onWheel=useCallback(e=>{e.preventDefault();if(e.ctrlKey||e.metaKey){const r=svgRef.current.getBoundingClientRect();const mx=(e.clientX-r.left),my=(e.clientY-r.top);const d=e.deltaY>0?0.92:1.08;setZoom(z=>{const nz=Math.min(ZOOM_MAX,Math.max(ZOOM_MIN,z*d));const wx=mx/z+pan.x,wy=my/z+pan.y;setPan({x:wx-mx/nz,y:wy-my/nz});return nz;});}else{setPan(p=>({x:p.x+e.deltaX/zoom,y:p.y+e.deltaY/zoom}));}},[zoom,pan]);
  const addTouch=eid=>{if(!actor)return;updActor({...actor,touches:[...actor.touches,{entityId:eid,crud:[{op:"R",scope:"all"}]}]});setSelEntId(eid);};
  const removeTouch=eid=>{if(!actor)return;updActor({...actor,touches:actor.touches.filter(t=>t.entityId!==eid)});setSelEntId(null);};

  if(!actor)return(<div style={{display:"flex",height:"100%",flexDirection:"column"}}><div style={{background:M3.surface,display:"flex",alignItems:"center",flexShrink:0,minHeight:56,paddingLeft:16,boxShadow:"var(--md-sys-elevation-1)",position:"relative",zIndex:1}}><div style={{marginLeft:"auto",display:"flex",alignItems:"center",paddingRight:16,gap:8}}><Btn small ghost onClick={()=>setShowEdit(true)}>Edit</Btn></div></div><div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:M3.outline,fontSize:14}}>No actors yet</div>{showEdit&&<ActorEditModal actors={model.actors} onSave={handleEditSave} onClose={()=>setShowEdit(false)}/>}</div>);
  const updateTouchCrud=(eid,fn)=>updActor({...actor,touches:actor.touches.map(t=>t.entityId===eid?{...t,crud:fn(t.crud)}:t)});
  const toggleOp=(op)=>{if(!selEnt)return;const on=touch&&touch.crud.some(c=>c.op===op);updateTouchCrud(selEnt.id,crud=>on?crud.filter(c=>c.op!==op):[...crud,{op,scope:"all"}]);};
  const setScope=(op,sc)=>{if(!selEnt)return;updateTouchCrud(selEnt.id,crud=>crud.map(c=>c.op===op?{...c,scope:sc}:c));};

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",position:"relative"}}>
      <div style={{background:M3.surface,display:"flex",alignItems:"stretch",flexShrink:0,paddingLeft:16,minHeight:56,boxShadow:"var(--md-sys-elevation-1)",position:"relative",zIndex:1}}>
        {model.actors.map(a=>{const isAct=actorId===a.id;return<button key={a.id} onClick={()=>{setActorId(a.id);setSelEntId(null);setMultiSel(new Set());multiOffsets.current={};}} style={{padding:"0 24px",border:"none",background:"transparent",cursor:"pointer",color:isAct?"#1A73E8":"#9AA0A6",fontSize:14,fontWeight:isAct?500:400,lineHeight:"20px",borderBottom:`3px solid ${isAct?"#1A73E8":"transparent"}`,borderTop:"3px solid transparent",fontFamily:"inherit",whiteSpace:"nowrap",letterSpacing:"0.1px"}}>{a.name}</button>;})}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",paddingRight:16,gap:8}}>

            <defs><pattern id="dotpat2" width={24/zoom} height={24/zoom} patternUnits="userSpaceOnUse" x={(-pan.x*zoom)%24} y={(-pan.y*zoom)%24}><circle cx={1/zoom} cy={1/zoom} r={1/zoom} fill="#E0E0E0"/></pattern>
            <marker id="m2-hm" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto"><line x1="11" y1="6" x2="3" y2="1" stroke="#9AA0A6" strokeWidth="1.5"/><line x1="11" y1="6" x2="3" y2="6" stroke="#9AA0A6" strokeWidth="1.5"/><line x1="11" y1="6" x2="3" y2="11" stroke="#9AA0A6" strokeWidth="1.5"/></marker>
            <marker id="m2-ho" markerWidth="6" markerHeight="12" refX="5" refY="6" orient="auto"><line x1="5" y1="1" x2="5" y2="11" stroke="#9AA0A6" strokeWidth="2"/></marker>
            <marker id="m2-mm" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><polygon points="1 5,5 1,9 5,5 9" fill="#9AA0A6"/></marker>
            <marker id="m2-mm-s" markerWidth="10" markerHeight="10" refX="1" refY="5" orient="auto"><polygon points="1 5,5 1,9 5,5 9" fill="#9AA0A6"/></marker>
            </defs>
            <rect width="100%" height="100%" fill="url(#dotpat2)" data-bg="1" onMouseDown={onBgMD}/>
            <g transform={`scale(${zoom}) translate(${-pan.x},${-pan.y})`}>
            {/* 1. ノード（最背面） */}
            {ents.map(ent=>{const t=actor.touches.find(tt=>tt.entityId===ent.id),touched=!!t&&t.crud.length>0,p=entPalette(ents,ent.id),isSel=selEntId===ent.id||multiSel.has(ent.id),crudW=CRUD_W,crudGap=CRUD_GAP,totalCrudW=crudW*4+crudGap*3,crudX=(EW-totalCrudW)/2,cardH=ACTOR_CARD_H;return(<g key={ent.id} transform={`translate(${ent.x},${ent.y})`} onMouseDown={e=>onBoxMD(e,ent.id)} style={{cursor:"pointer"}}><rect x={1} y={2} width={EW} height={cardH} rx={14} fill="rgba(0,0,0,0.04)"/><rect width={EW} height={cardH} rx={14} fill={touched?p.bg:"#F5F5F5"} stroke={isSel?p.fg:"transparent"} strokeWidth={isSel?2.5:0} opacity={touched?1:0.6}/><foreignObject x={0} y={0} width={EW} height={EH}><div style={{width:EW,height:EH,display:"flex",alignItems:"center",justifyContent:"center",padding:"8px 16px",boxSizing:"border-box",fontSize:16,fontWeight:touched?600:400,color:touched?p.fg:"#C4C7C5",textAlign:"center",wordBreak:"break-word",lineHeight:"20px",overflow:"hidden"}}>{ent.name}</div></foreignObject>{CRUD_OPS.map((op,oi)=>{const on=touched&&t&&t.crud.some(c=>c.op===op);return<g key={op} transform={`translate(${crudX+oi*(crudW+crudGap)},${EH+4})`}><rect width={crudW} height={18} rx={9} fill={on?CRUD_BG[op]:"#F0F0F0"}/><text x={crudW/2} y={13} fontSize={12} fontWeight="600" fill={on?CRUD_COLOR[op]:"#DADCE0"} textAnchor="middle">{op}</text></g>;})}</g>);})}
            {/* 2. リレーション線 */}
            {(()=>{const AH=ACTOR_CARD_H;return ents.flatMap(ent=>ent.relations.map((rel,ri)=>{const tgt=ents.find(e=>e.id===rel.targetId);if(!tgt||tgt.id===ent.id)return null;const rtype=rel.type||"has-many";const endMk=rtype==="has-many"?"url(#m2-hm)":rtype==="has-one"?"url(#m2-ho)":"url(#m2-mm)";const startMk=rtype==="many-to-many"?"url(#m2-mm-s)":"";const fp=edgePt(ent.x,ent.y,EW,AH,tgt.x+EW/2,tgt.y+AH/2),tp=edgePt(tgt.x,tgt.y,EW,AH,ent.x+EW/2,ent.y+AH/2);return<line key={`al-${ent.id}-${ri}`} x1={fp.x} y1={fp.y} x2={tp.x} y2={tp.y} stroke="#9AA0A6" strokeWidth="1.5" markerEnd={endMk} markerStart={startMk}/>;}));})()}
            {/* 3. リレーションラベル（最前面） */}
            {(()=>{const AH=ACTOR_CARD_H;return ents.flatMap(ent=>ent.relations.map((rel,ri)=>{const tgt=ents.find(e=>e.id===rel.targetId);if(!tgt||tgt.id===ent.id||!rel.label)return null;const fp=edgePt(ent.x,ent.y,EW,AH,tgt.x+EW/2,tgt.y+AH/2),tp=edgePt(tgt.x,tgt.y,EW,AH,ent.x+EW/2,ent.y+AH/2),mx=(fp.x+tp.x)/2,my=(fp.y+tp.y)/2;const lw=labelWidth(rel.label);return<g key={`alb-${ent.id}-${ri}`}><rect x={mx-lw/2} y={my-9} width={lw} height={17} rx={8} fill="white" stroke="#9AA0A6" strokeWidth="0.5" opacity="0.96"/><text x={mx} y={my+4} fontSize={11} fill="#9AA0A6" textAnchor="middle">{rel.label}</text></g>;}));})()}
            </g>
          </svg>
          <div style={{position:"absolute",bottom:16,right:16,display:"flex",alignItems:"center",gap:4,background:"white",borderRadius:"var(--md-sys-shape-full)",padding:"4px 8px",boxShadow:"var(--md-sys-elevation-1)"}}>
            <button onClick={()=>{const r=svgRef.current?.getBoundingClientRect();if(!r)return;const cx=r.width/2,cy=r.height/2;setZoom(z=>{const nz=Math.max(ZOOM_MIN,z*0.8);const wx=cx/z+pan.x,wy=cy/z+pan.y;setPan({x:wx-cx/nz,y:wy-cy/nz});return nz;});}} style={{width:28,height:28,border:"none",background:"transparent",cursor:"pointer",fontSize:16,color:"#5F6368",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}} onMouseEnter={e=>{e.target.style.background="#F5F5F5";}} onMouseLeave={e=>{e.target.style.background="transparent";}}>−</button>
            <button onClick={()=>{const r=svgRef.current?.getBoundingClientRect();if(!r)return;const cx=r.width/2,cy=r.height/2;setZoom(z=>{const wx=cx/z+pan.x,wy=cy/z+pan.y;setPan({x:wx-cx,y:wy-cy});return 1;});}} style={{minWidth:48,height:28,border:"none",background:"transparent",cursor:"pointer",fontSize:12,fontWeight:500,color:"#5F6368",borderRadius:14,fontFamily:"inherit"}} onMouseEnter={e=>{e.target.style.background="#F5F5F5";}} onMouseLeave={e=>{e.target.style.background="transparent";}}>{Math.round(zoom*100)}%</button>
            <button onClick={()=>{const r=svgRef.current?.getBoundingClientRect();if(!r)return;const cx=r.width/2,cy=r.height/2;setZoom(z=>{const nz=Math.min(ZOOM_MAX,z*1.25);const wx=cx/z+pan.x,wy=cy/z+pan.y;setPan({x:wx-cx/nz,y:wy-cy/nz});return nz;});}} style={{width:28,height:28,border:"none",background:"transparent",cursor:"pointer",fontSize:16,color:"#5F6368",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}} onMouseEnter={e=>{e.target.style.background="#F5F5F5";}} onMouseLeave={e=>{e.target.style.background="transparent";}}>+</button>
          </div>
          {/* フローティングパネル: ノード右横に表示 */}
          {selEnt&&multiSel.size===0&&(()=>{const sx=(selEnt.x+EW+12-pan.x)*zoom,sy=(selEnt.y-pan.y)*zoom;return<div style={{position:"absolute",left:sx,top:sy,background:"white",borderRadius:12,boxShadow:"var(--md-sys-elevation-2)",padding:12,zIndex:2,width:260,maxHeight:"80vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()} onMouseDown={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}><span style={{fontSize:13,fontWeight:600,color:M3.onSurface}}>{selEnt.name}</span><button onClick={()=>setSelEntId(null)} style={{background:"none",border:"none",cursor:"pointer",color:M3.onSurfaceVar,padding:0,lineHeight:1}}><span className="msi" style={{fontSize:18}}>close</span></button></div>
            {touch?(<>{CRUD_OPS.map(op=>{const entry=touch.crud.find(c=>c.op===op);const on=!!entry;const scope=entry?.scope||"all";return<div key={op} style={{marginBottom:8,padding:"8px 10px",background:on?CRUD_BG[op]+"80":M3.surfaceCont,borderRadius:8,transition:"background .15s"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <button onClick={()=>toggleOp(op)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit"}}>
                  <div style={{width:20,height:20,borderRadius:5,border:on?"none":"2px solid #DADCE0",background:on?CRUD_COLOR[op]:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{on&&<span style={{color:"white",fontSize:10,fontWeight:700}}>✓</span>}</div>
                  <span style={{fontSize:13,fontWeight:600,color:on?CRUD_COLOR[op]:"#DADCE0"}}>{CRUD_LABELS[op]}</span>
                </button>
                {on&&(()=>{const isOther=scope!=="all"&&scope!=="own";return<div style={{marginLeft:"auto",display:"flex",gap:4,alignItems:"center"}}>{["all","own"].map(sc=>(<button key={sc} onClick={e=>{setScope(op,sc);e.currentTarget.parentNode.querySelector('input')?.blur();}} style={{padding:"2px 8px",fontSize:11,fontWeight:500,borderRadius:12,cursor:"pointer",border:scope===sc?"none":"1px solid "+M3.outlineVar,background:scope===sc?"#D3E3FD":"white",color:scope===sc?"#041E49":"#9AA0A6",lineHeight:"18px"}}>{sc}</button>))}<input value={isOther?scope:""} placeholder="other" onChange={e=>{setScope(op,e.target.value||"all");}} style={{width:56,padding:"2px 6px",fontSize:11,fontWeight:isOther?500:400,borderRadius:12,cursor:"text",border:isOther?"none":"1px solid "+M3.outlineVar,background:isOther?"#D3E3FD":"white",color:isOther?"#041E49":"#9AA0A6",outline:"none",fontFamily:"inherit",lineHeight:"18px"}} onBlur={e=>{if(!e.target.value){const cur=touch.crud.find(c=>c.op===op);if(cur&&cur.scope!=="all"&&cur.scope!=="own")setScope(op,"all");}}}/></div>;})()}
              </div>
            </div>;})}
            <div style={{borderTop:"1px solid "+M3.outlineVar,paddingTop:8,marginTop:4,display:"flex",justifyContent:"flex-end"}}><button onClick={()=>removeTouch(selEnt.id)} style={{fontSize:12,fontWeight:500,color:M3.error,background:"none",border:"none",cursor:"pointer",padding:"4px 8px",borderRadius:8}} onMouseEnter={e=>{e.target.style.background=M3.errorContainer;}} onMouseLeave={e=>{e.target.style.background="none";}}>Remove access</button></div>
            </>):(<div style={{textAlign:"center",padding:"8px 0"}}><div style={{fontSize:13,color:M3.onSurfaceVar,marginBottom:12,lineHeight:"18px"}}>{actor.name} has no access<br/>to {selEnt.name}</div><Btn small accent onClick={()=>addTouch(selEnt.id)}>+ Grant access</Btn></div>)}

const TABS=[{id:"entity",label:"Entity"},{id:"actor",label:"Actor"}];

function App(){
  const[model,setModelRaw]=useState(EMPTY),[tab,setTab]=useState("entity");
  const[entSelId,setEntSelId]=useState(null);
  const[selRelId,setSelRelId]=useState(null);
  const histRef=useRef({stack:[EMPTY],idx:0});
  const clipRef=useRef(null);

  // setModel: 履歴に積む（通常操作用）
  const setModel=useCallback(updater=>{
    setModelRaw(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      const h=histRef.current;
      h.stack=h.stack.slice(0,h.idx+1);
      h.stack.push(JSON.parse(JSON.stringify(next)));
      if(h.stack.length>MAX_HISTORY){h.stack.shift();}else{h.idx++;}
      return next;
    });
  },[]);
  // setModelSilent: 履歴に積まない（ドラッグ中の移動用）
  const setModelSilent=useCallback(updater=>{
    setModelRaw(prev=>typeof updater==='function'?updater(prev):updater);
  },[]);

  // Undo
  const undo=useCallback(()=>{
    const h=histRef.current;
    if(h.idx<=0)return;
    h.idx--;
    setModelRaw(JSON.parse(JSON.stringify(h.stack[h.idx])));
    showToast('Undo');
  },[]);

  // Redo
  const redo=useCallback(()=>{
    const h=histRef.current;
    if(h.idx>=h.stack.length-1)return;
    h.idx++;
    setModelRaw(JSON.parse(JSON.stringify(h.stack[h.idx])));
    showToast('Redo');
  },[]);

  // Copy: エンティティ選択時のみ動作
  const handleCopy=useCallback(()=>{
    if(tab!=='entity'||!entSelId)return false;
    const ent=histRef.current.stack[histRef.current.idx]?.entities?.find(e=>e.id===entSelId);
    if(!ent)return false;
    clipRef.current={type:'entity',data:JSON.parse(JSON.stringify(ent))};
    showToast('Copied: '+ent.name);
    return true;
  },[tab,entSelId]);

  // Paste
  const handlePaste=useCallback(()=>{
    if(!clipRef.current||clipRef.current.type!=='entity')return false;
    const src=clipRef.current.data;
    const newId=uid();
    const newName=uniqueName(src.name,histRef.current.stack[histRef.current.idx]?.entities?.map(e=>e.name)||[]);
    setModel(m=>{const names=m.entities.map(e=>e.name);const newEnt={...JSON.parse(JSON.stringify(src)),id:newId,name:uniqueName(src.name,names),x:(src.x||80)+40,y:(src.y||80)+40,relations:src.relations.map(r=>({...r,id:uid()}))};return{...m,entities:[...m.entities,newEnt]};});
    setEntSelId(newId);
    showToast('Pasted: '+newName);
    return true;
  },[setModel]);

  // Cut
  const handleCut=useCallback(()=>{
    if(tab!=='entity'||!entSelId)return false;
    const ent=histRef.current.stack[histRef.current.idx]?.entities?.find(e=>e.id===entSelId);
    if(!ent)return false;
    clipRef.current={type:'entity',data:JSON.parse(JSON.stringify(ent))};
    setModel(m=>({...m,entities:m.entities.filter(e=>e.id!==entSelId)}));
    setEntSelId(null);
    showToast('Cut: '+ent.name);
    return true;
  },[tab,entSelId,setModel]);

  // Delete: エンティティまたはリレーション選択時
  const handleDelete=useCallback(()=>{
    if(tab!=='entity')return false;
    if(selRelId){
      const owner=model.entities.find(e=>e.id===selRelId.entId);
      const rel=owner&&owner.relations.find(r=>r.id===selRelId.relId);
      if(!rel)return false;
      setModel(m=>({...m,entities:m.entities.map(e=>e.id===selRelId.entId?{...e,relations:e.relations.filter(r=>r.id!==selRelId.relId)}:e)}));
      setSelRelId(null);
      showToast('Deleted relation');
      return true;
    }
    if(!entSelId)return false;
    const ent=model.entities.find(e=>e.id===entSelId);
    if(!ent)return false;
    setModel(m=>({...m,entities:m.entities.filter(e=>e.id!==entSelId)}));
    setEntSelId(null);
    showToast('Deleted: '+ent.name);
    return true;
  },[tab,entSelId,selRelId,model,setModel]);

  // グローバル関数を公開
  useEffect(()=>{
    window.__cmUndo=undo;
    window.__cmRedo=redo;
    window.__cmCopy=handleCopy;
    window.__cmPaste=handlePaste;
    window.__cmCut=handleCut;
    window.__cmDelete=handleDelete;
    return()=>{window.__cmUndo=window.__cmRedo=window.__cmCopy=window.__cmPaste=window.__cmCut=window.__cmDelete=null;};
  },[undo,redo,handleCopy,handlePaste,handleCut,handleDelete]);

  const initialLoad=useRef(true);
  useEffect(()=>{modelRef=model;if(initialLoad.current){initialLoad.current=false;}else{markModified();}},[model]);
  useEffect(()=>{
    window.__cmLoadData=d=>{
      const cmData=splitData(d);
      const loaded=ensurePositions(cmData);
      loadGeneration++;
      setModelRaw(loaded);
      histRef.current={stack:[JSON.parse(JSON.stringify(loaded))],idx:0};
      setTab("entity");
      setEntSelId(null);
      setSelRelId(null);
    };
    return()=>{window.__cmLoadData=null;};
  },[]);

  const counts={entity:model.entities.length,actor:model.actors.length};
  const barRef=useRef(null);
  useEffect(()=>{
    if(!barRef.current)return;
    const tb=document.getElementById('cm-toolbar');
    if(!tb)return;
    const right=barRef.current;
    ['cm-edited','cm-connect-btn','cm-auto-btn'].forEach(id=>{const el=document.getElementById(id);if(el)right.appendChild(el);});
  },[]);
  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:M3.surface,fontFamily:"'Google Sans','Roboto','Noto Sans JP',system-ui,sans-serif",fontSize:14}}>
      <div style={{height:56,background:"#FFFFFF",display:"flex",alignItems:"stretch",flexShrink:0,paddingLeft:16,boxShadow:"var(--md-sys-elevation-1)",position:"relative",zIndex:1}}>
        <div style={{display:"flex",alignItems:"center",marginRight:24,gap:8}}><div style={{width:14,height:14,borderRadius:M3.shapeXs,background:"#1A73E8"}}/><span style={{fontSize:22,fontWeight:400,color:M3.onSurface}}>Model Editor</span></div>
        {TABS.map(t=>{const isAct=tab===t.id,cnt=counts[t.id];return(<button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"0 16px",border:"none",background:"transparent",cursor:"pointer",color:isAct?"#1A73E8":"#9AA0A6",fontSize:14,fontWeight:500,lineHeight:"20px",letterSpacing:"0.1px",borderBottom:`3px solid ${isAct?"#1A73E8":"transparent"}`,borderTop:"3px solid transparent",fontFamily:"inherit",transition:"color .15s",position:"relative"}}>{t.label}{cnt>0&&<span style={{marginLeft:6,display:"inline-flex",alignItems:"center",justifyContent:"center",minWidth:20,height:20,padding:"0 6px",borderRadius:"var(--md-sys-shape-full)",background:isAct?"#D3E3FD":"#E8EAED",color:isAct?"#041E49":"#5F6368",fontSize:11,fontWeight:600,lineHeight:1}}>{cnt}</span>}</button>);})}
        <div ref={barRef} style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:12,paddingRight:16,fontSize:14,fontFamily:"inherit"}}/>
      </div>
      <div style={{flex:1,overflow:"hidden"}}>
        {tab==="entity"&&<EntityView model={model} setModel={setModel} setModelSilent={setModelSilent} selId={entSelId} setSelId={setEntSelId} selRelId={selRelId} setSelRelId={setSelRelId}/>}
        {tab==="actor"&&<ActorView model={model} setModel={setModel} setModelSilent={setModelSilent}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
