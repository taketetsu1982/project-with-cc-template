<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen Editor</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"/>
<style>
  .msi{font-family:'Material Symbols Rounded';font-weight:normal;font-style:normal;font-size:18px;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;word-wrap:normal;direction:ltr;-webkit-font-smoothing:antialiased}
  :root{
    --md-sys-color-primary:#0B57D0;
    --md-sys-color-on-primary:#FFFFFF;
    --md-sys-color-primary-container:#D3E3FD;
    --md-sys-color-on-primary-container:#041E49;
    --md-sys-color-secondary:#5F6368;
    --md-sys-color-error:#B3261E;
    --md-sys-color-error-container:#F9DEDC;
    --md-sys-color-on-error-container:#410E0B;
    --md-sys-color-surface:#FFFFFF;
    --md-sys-color-surface-container-lowest:#FFFFFF;
    --md-sys-color-surface-container-low:#FAFAFA;
    --md-sys-color-surface-container:#F5F5F5;
    --md-sys-color-surface-container-high:#F0F0F0;
    --md-sys-color-surface-container-highest:#E8EAED;
    --md-sys-color-on-surface:#1A1A1A;
    --md-sys-color-on-surface-variant:#5F6368;
    --md-sys-color-outline:#9AA0A6;
    --md-sys-color-outline-variant:#E0E0E0;
    --md-sys-color-inverse-surface:#303030;
    --md-sys-color-inverse-on-surface:#F2F2F2;
    --md-sys-elevation-1:0px 1px 3px rgba(0,0,0,.08),0px 1px 2px rgba(0,0,0,.06);
    --md-sys-elevation-2:0px 2px 6px rgba(0,0,0,.1),0px 1px 3px rgba(0,0,0,.06);
    --md-sys-shape-xs:6px;--md-sys-shape-sm:10px;--md-sys-shape-md:14px;--md-sys-shape-lg:18px;--md-sys-shape-xl:24px;--md-sys-shape-full:9999px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body,#root{height:100%;overflow:hidden;font-size:14px}
  body{font-family:'Google Sans','Roboto','Noto Sans JP',system-ui,sans-serif;color:var(--md-sys-color-on-surface);background:var(--md-sys-color-surface)}
  .file-drop-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(11,87,208,.08);border:3px dashed var(--md-sys-color-primary);align-items:center;justify-content:center}
  .file-drop-overlay.active{display:flex}
  .drop-msg{font-size:16px;font-weight:500;color:var(--md-sys-color-primary);background:var(--md-sys-color-surface-container-lowest);padding:20px 40px;border-radius:var(--md-sys-shape-lg);box-shadow:var(--md-sys-elevation-2)}
  #sc-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--md-sys-color-inverse-surface);color:var(--md-sys-color-inverse-on-surface);padding:10px 24px;border-radius:var(--md-sys-shape-xs);font-size:14px;opacity:0;transition:opacity .2s;z-index:10000;pointer-events:none;box-shadow:var(--md-sys-elevation-2)}
  #sc-toast.show{opacity:1}
  #sc-toolbar{display:none}
  .sc-connect-btn{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--md-sys-color-outline-variant);border-radius:var(--md-sys-shape-full);padding:6px 16px;font-size:14px;font-weight:500;line-height:20px;color:var(--md-sys-color-on-surface-variant);cursor:pointer;transition:background .15s}
  .sc-connect-btn:hover{background:var(--md-sys-color-surface-container)}
  .sc-dot{width:8px;height:8px;border-radius:50%;background:var(--md-sys-color-outline)}
  .sc-dot.connected{background:#1E8E3E}.sc-dot.saving{background:#E37400}.sc-dot.error{background:var(--md-sys-color-error)}
  .sc-hint{font-weight:400;color:var(--md-sys-color-outline);font-size:12px}
  #sc-edited{display:none;font-size:12px;font-weight:500;color:#E37400}
  .sc-auto-switch{display:none;align-items:center;gap:6px;font-size:14px;font-weight:500;color:var(--md-sys-color-on-surface-variant);cursor:pointer;user-select:none}
  .sc-auto-switch .sc-switch-track{position:relative;width:32px;height:18px;background:var(--md-sys-color-outline);border-radius:var(--md-sys-shape-full);transition:background .2s}
  .sc-auto-switch.active .sc-switch-track{background:#0B57D0}
  .sc-auto-switch .sc-switch-thumb{position:absolute;top:3px;left:3px;width:12px;height:12px;background:var(--md-sys-color-surface-container-lowest);border-radius:50%;transition:left .2s}
  .sc-auto-switch.active .sc-switch-thumb{left:17px}
</style>
</head>
<body>
<div class="file-drop-overlay" id="sc-drop-overlay"><span class="drop-msg">Drop product-model.json to connect</span></div>
<div id="sc-toast"></div>
<div id="sc-toolbar">
  <div style="flex:1"></div>
  <span id="sc-edited">Edited</span>
  <button class="sc-connect-btn" id="sc-connect-btn" onclick="handleConnect()">
    <span class="sc-dot" id="sc-dot"></span>
    <span id="sc-label">Connect</span>
    <span class="sc-hint" id="sc-hint">(Drop a JSON file)</span>
  </button>
  <label class="sc-auto-switch" id="sc-auto-btn" onclick="toggleAuto()" title="Auto save">Auto <span class="sc-switch-track"><span class="sc-switch-thumb"></span></span></label>
</div>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
let passthrough={};
let CONCEPT={entities:[],actors:[],composites:[]};
let fileHandle=null,autoSaveEnabled=false,saveTimer=null,isSaving=false,screensRef=null;

function getFullJson(){
  if(!screensRef)return null;
  return{...passthrough,screens:screensRef.screens,transitions:screensRef.transitions};
}
function splitData(data){
  const{screens,transitions,...rest}=data;
  passthrough=rest;
  CONCEPT={entities:rest.entities||[],actors:rest.actors||[],composites:rest.composites||[]};
  return{screens:screens||[],transitions:transitions||[]};
}

function updateStatus(s,l,h){const dot=document.getElementById('sc-dot');dot.className='sc-dot '+((s&&autoSaveEnabled)?s:(s==='error'?s:''));document.getElementById('sc-label').textContent=l||'';document.getElementById('sc-hint').textContent=h||'';}
function showToast(m){const t=document.getElementById('sc-toast');t.textContent=m;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),2000);}
function markModified(){document.getElementById('sc-edited').style.display='inline';if(autoSaveEnabled&&fileHandle)scheduleAutoSave();}
function scheduleAutoSave(){if(saveTimer)clearTimeout(saveTimer);if(!fileHandle||!autoSaveEnabled)return;saveTimer=setTimeout(()=>writeFile(),500);}
async function writeFile(){if(!fileHandle||isSaving)return;const full=getFullJson();if(!full)return;isSaving=true;updateStatus('saving',fileHandle.name,'');try{const w=await fileHandle.createWritable();await w.write(JSON.stringify(full,null,2)+'\n');await w.close();updateStatus('connected',fileHandle.name);document.getElementById('sc-edited').style.display='none';}catch(e){console.error(e);updateStatus('error','Save failed');if(e.name==='NotAllowedError')disconnectFile();}finally{isSaving=false;}}
function disconnectFile(){fileHandle=null;autoSaveEnabled=false;passthrough={};CONCEPT={entities:[],actors:[],composites:[]};if(saveTimer)clearTimeout(saveTimer);document.getElementById('sc-auto-btn').style.display='none';document.getElementById('sc-edited').style.display='none';updateStatus('','Connect','(Drop a JSON file)');}
function onFileConnected(h){fileHandle=h;updateStatus('connected',h.name);document.getElementById('sc-auto-btn').style.display='flex';if(!autoSaveEnabled){autoSaveEnabled=true;document.getElementById('sc-auto-btn').classList.add('active');}}
async function handleConnect(){if(fileHandle){await writeFile();showToast('保存しました');return;}if(!('showOpenFilePicker' in window)){showToast('JSONファイルをドロップしてください');return;}try{const[h]=await window.showOpenFilePicker({id:'sc-editor',types:[{description:'JSON',accept:{'application/json':['.json']}}]});const f=await h.getFile();const t=await f.text();let d;try{d=JSON.parse(t);}catch{updateStatus('error','Invalid JSON');return;}onFileConnected(h);if(window.__scLoadData)window.__scLoadData(d);}catch(e){if(e.name!=='AbortError'){console.error(e);updateStatus('error','Error');}}}
function toggleAuto(){autoSaveEnabled=!autoSaveEnabled;document.getElementById('sc-auto-btn').classList.toggle('active',autoSaveEnabled);showToast('自動保存 '+(autoSaveEnabled?'ON':'OFF'));if(fileHandle){document.getElementById('sc-dot').className='sc-dot '+(autoSaveEnabled?'connected':'');}if(autoSaveEnabled&&fileHandle)scheduleAutoSave();}
let dragC=0;const ov=document.getElementById('sc-drop-overlay');
document.addEventListener('dragenter',e=>{if(e.dataTransfer.types.includes('Files')){dragC++;ov.classList.add('active');}});
document.addEventListener('dragleave',e=>{if(e.dataTransfer.types.includes('Files')){dragC--;if(dragC<=0){dragC=0;ov.classList.remove('active');}}});
document.addEventListener('dragover',e=>{if(e.dataTransfer.types.includes('Files'))e.preventDefault();});
document.addEventListener('drop',async e=>{dragC=0;ov.classList.remove('active');if(!e.dataTransfer.types.includes('Files'))return;e.preventDefault();for(const i of[...e.dataTransfer.items]){if(i.kind!=='file'||typeof i.getAsFileSystemHandle!=='function')continue;const h=await i.getAsFileSystemHandle();if(h.kind==='file'&&h.name.endsWith('.json')){const f=await h.getFile();const t=await f.text();let d;try{d=JSON.parse(t);}catch{updateStatus('error','Invalid JSON');return;}onFileConnected(h);if(window.__scLoadData)window.__scLoadData(d);return;}}updateStatus('error','Drop not supported');});
document.addEventListener('keydown',e=>{
  const mod=e.metaKey||e.ctrlKey;
  const inField=e.target.closest('input,textarea,select,[contenteditable]');
  if(mod&&e.key==='s'){e.preventDefault();if(fileHandle)writeFile().then(()=>showToast('保存しました'));return;}
  if(inField)return;
  if(mod&&e.key==='z'&&!e.shiftKey){e.preventDefault();window.__scUndo?.();}
  if(mod&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();window.__scRedo?.();}
  if(e.key==='Delete'||e.key==='Backspace'){if(window.__scDelete?.()){e.preventDefault();}}
});
</script>

<script type="text/babel">
const{useState,useRef,useCallback,useEffect}=React;
const M3={
  primary:"var(--md-sys-color-primary)",onPrimary:"var(--md-sys-color-on-primary)",primaryContainer:"var(--md-sys-color-primary-container)",onPrimaryContainer:"var(--md-sys-color-on-primary-container)",
  surface:"var(--md-sys-color-surface)",surfaceContLow:"var(--md-sys-color-surface-container-low)",surfaceCont:"var(--md-sys-color-surface-container)",surfaceContHigh:"var(--md-sys-color-surface-container-high)",
  onSurface:"var(--md-sys-color-on-surface)",onSurfaceVar:"var(--md-sys-color-on-surface-variant)",
  outline:"var(--md-sys-color-outline)",outlineVar:"var(--md-sys-color-outline-variant)",
  error:"var(--md-sys-color-error)",errorContainer:"var(--md-sys-color-error-container)",onErrorContainer:"var(--md-sys-color-on-error-container)",
  shapeSm:"var(--md-sys-shape-sm)",shapeMd:"var(--md-sys-shape-md)",shapeLg:"var(--md-sys-shape-lg)",shapeFull:"var(--md-sys-shape-full)",
};
const CRUD_OPS=["C","R","U","D"],CRUD_COLOR={C:"#1E8E3E",R:"#1A73E8",U:"#E37400",D:"#D93025"},CRUD_BG={C:"#E6F4EA",R:"#E8F0FE",U:"#FEF7E0",D:"#FCE8E6"},VARIANTS=["collection","single"];
const AREAS=["top","left","right","main","bottom"];
const AREA_LABELS={top:"Top",left:"Left",right:"Right",bottom:"Bottom",main:"Main"};
const ENT_PALETTE=[
  {bg:"#AECBFA",fg:"#174EA6"},{bg:"#FDD663",fg:"#7A6200"},{bg:"#A8DAB5",fg:"#137333"},{bg:"#F6AEA9",fg:"#A50E0E"},
  {bg:"#D7AEFB",fg:"#7627BB"},{bg:"#FDCFE8",fg:"#9C166B"},{bg:"#A1E4F2",fg:"#0D652D"},{bg:"#FBC8A4",fg:"#8B4513"},
];
const entPalette=id=>ENT_PALETTE[Math.max(0,CONCEPT.entities.findIndex(e=>e.id===id))%ENT_PALETTE.length];
const entColor=id=>entPalette(id).fg;
const entName=id=>CONCEPT.entities.find(e=>e.id===id)?.name||id;
// スクリーンカードサイズ
const SW=190,SH=76;
// カード内部
const SC_HEADER_H=36,SC_OBJ_START_Y=40,SC_OBJ_ROW_H=22,SC_OBJ_PAD_X=8;
// ラベル計算
const LABEL_CHAR_W=7,LABEL_MIN_W=24,LABEL_PAD=16;
const labelWidth=text=>Math.max((text||"").length*LABEL_CHAR_W,LABEL_MIN_W)+LABEL_PAD;
// グリッドレイアウト
const SC_GRID_COLS=3,SC_GRID_GAP_X=280,SC_GRID_GAP_Y=220,SC_GRID_PAD_X=60,SC_GRID_PAD_Y=60;
const SC_MIN_SPAN_FACTOR=160,SC_MIN_SPAN_MIN=200;
const uid=()=>Math.random().toString(36).slice(2,8);
function uniqueName(base,names){if(!names.includes(base))return base;const m=base.match(/^(.+?)(\d+)$/);const stem=m?m[1]:base;let n=m?parseInt(m[2],10)+1:2;while(names.includes(stem+n))n++;return stem+n;}
function edgePt(x,y,w,h,tx,ty){const cx=x+w/2,cy=y+h/2,dx=tx-cx,dy=ty-cy;if(Math.abs(dx)*h>Math.abs(dy)*w)return dx>0?{x:x+w,y:cy}:{x,y:cy};return dy>0?{x:cx,y:y+h}:{x:cx,y};}
const EMPTY={screens:[],transitions:[]};
const ZOOM_MIN=0.25,ZOOM_MAX=3,MAX_HISTORY=80;
function ensureScreenPositions(data){
  if(!data||!data.screens||!CONCEPT.actors)return data;
  const cols=SC_GRID_COLS,gapX=SC_GRID_GAP_X,gapY=SC_GRID_GAP_Y,padX=SC_GRID_PAD_X,padY=SC_GRID_PAD_Y;
  // Actorごとにスクリーンを自動配置
  CONCEPT.actors.forEach(actor=>{
    const actorScreens=data.screens.filter(s=>s.actorId===actor.id);
    // すべてのスクリーンが狭い範囲に密集しているか判定
    if(actorScreens.length<2)return;
    const xs=actorScreens.map(s=>s.x),ys=actorScreens.map(s=>s.y);
    const rangeX=Math.max(...xs)-Math.min(...xs),rangeY=Math.max(...ys)-Math.min(...ys);
    const minSpan=Math.max((actorScreens.length-1)*SC_MIN_SPAN_FACTOR,SC_MIN_SPAN_MIN);
    if(rangeX+rangeY>=minSpan)return;
    // 再配置
    actorScreens.forEach((scr,i)=>{scr.x=padX+(i%cols)*gapX;scr.y=padY+Math.floor(i/cols)*gapY;});
  });
  return data;
}

function calcCenterPan(items,w,h){
  if(!items||items.length===0)return{cx:0,cy:0};
  const xs=items.map(i=>i.x||0),ys=items.map(i=>i.y||0);
  const minX=Math.min(...xs),maxX=Math.max(...xs)+w,minY=Math.min(...ys),maxY=Math.max(...ys)+h;
  return{cx:(minX+maxX)/2,cy:(minY+maxY)/2};
}
let loadGeneration=0;
function useInitialPan(items,iw,ih){
  const svgRef=useRef();
  const[pan,setPan]=useState({x:0,y:0});
  const lastGen=useRef(-1);
  useEffect(()=>{
    if(lastGen.current===loadGeneration||!items||items.length===0||!svgRef.current)return;
    requestAnimationFrame(()=>{
      if(!svgRef.current)return;
      const r=svgRef.current.getBoundingClientRect();
      if(!r.width||!r.height)return;
      const c=calcCenterPan(items,iw,ih);
      setPan({x:c.cx-r.width/2,y:c.cy-r.height/2+40});
      lastGen.current=loadGeneration;
    });
  },[items,iw,ih]);
  return{svgRef,pan,setPan};
}

function Input({style,...p}){return<input{...p}style={{border:`1px solid ${M3.outlineVar}`,borderRadius:M3.shapeSm,background:M3.surface,color:M3.onSurface,fontSize:14,padding:"8px 16px",outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"inherit",...style}}onFocus={e=>{e.target.style.borderColor="#1A73E8";e.target.style.boxShadow="0 0 0 3px rgba(26,115,232,.12)";}}onBlur={e=>{e.target.style.borderColor="";e.target.style.boxShadow="none";}}/>;}
function Sel({style,children,...p}){return<select{...p}style={{border:`1px solid ${M3.outlineVar}`,borderRadius:M3.shapeSm,background:M3.surface,color:M3.onSurface,fontSize:14,padding:"8px 16px",outline:"none",fontFamily:"inherit",...style}}>{children}</select>;}
function Btn({children,onClick,accent,small,danger,ghost}){
  const bg=danger?M3.errorContainer:accent?"#1A73E8":ghost?"transparent":M3.surfaceCont;
  const fg=danger?M3.onErrorContainer:accent?M3.onPrimary:ghost?"#1A73E8":M3.onSurface;
  const bd=ghost?`1px solid ${M3.outlineVar}`:"none";
  return<button onClick={onClick}style={{background:bg,border:bd,color:fg,borderRadius:M3.shapeFull,padding:small?"8px 16px":"8px 24px",fontSize:14,fontWeight:500,lineHeight:"20px",letterSpacing:"0.1px",cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",transition:"box-shadow .15s"}}onMouseEnter={e=>{e.target.style.boxShadow="var(--md-sys-elevation-1)";}}onMouseLeave={e=>{e.target.style.boxShadow="none";}}>{children}</button>;
}
const SLabel=({children})=><div style={{fontSize:12,fontWeight:500,letterSpacing:"0.5px",color:M3.onSurfaceVar,textTransform:"uppercase",marginBottom:8}}>{children}</div>;

function MapView({screens,setScreens,setScreensSilent,onSelectScreen}){
  const[actorId,setActorId]=useState(CONCEPT.actors[0]?.id||null),[selNavId,setSelNavId]=useState(null),[selScrId,setSelScrId]=useState(null),[drag,setDrag]=useState(null),[conn,setConn]=useState(null);
  const{svgRef,pan,setPan}=useInitialPan(screens.screens,SW,SH);
  const[panning,setPanning]=useState(false),[zoom,setZoom]=useState(1);
  const dOff=useRef({x:0,y:0}),panStart=useRef({x:0,y:0,px:0,py:0});
  const visScr=screens.screens.filter(s=>s.actorId===actorId);
  const visNav=screens.transitions.filter(n=>visScr.find(s=>s.id===n.from)&&visScr.find(s=>s.id===n.to));
  const selNav=visNav.find(n=>n.id===selNavId);
  const updNav=u=>setScreens(m=>({...m,transitions:m.transitions.map(n=>n.id===u.id?u:n)}));
  const delNav=id=>{setSelNavId(null);setScreens(m=>({...m,transitions:m.transitions.filter(n=>n.id!==id)}));};
  const addScreen=()=>{const id=uid();const names=screens.screens.map(s=>s.name);setScreens(m=>({...m,screens:[...m.screens,{id,name:uniqueName("New Screen",names),actorId,x:120/zoom+pan.x,y:120/zoom+pan.y,prompt:"",objects:[]}]}));};
  const connOn=conn!==null,connHasSrc=conn!==null&&conn!=="";
  const onBgMD=e=>{if(connOn)return;setPanning(true);panStart.current={x:e.clientX,y:e.clientY,px:pan.x,py:pan.y};};
  const onBoxMD=(e,id)=>{e.stopPropagation();if(connOn){if(conn===""){setConn(id);return;}if(conn!==id){setScreens(m=>({...m,transitions:[...m.transitions,{id:uid(),from:conn,to:id,trigger:"Tap"}]}));setConn(null);}return;}setSelNavId(null);setSelScrId(id);const r=svgRef.current.getBoundingClientRect();const sc=visScr.find(s=>s.id===id);dOff.current={x:(e.clientX-r.left)/zoom+pan.x-sc.x,y:(e.clientY-r.top)/zoom+pan.y-sc.y};setDrag(id);};
  const onMM=useCallback(e=>{if(drag){const r=svgRef.current.getBoundingClientRect();setScreensSilent(m=>({...m,screens:m.screens.map(s=>s.id===drag?{...s,x:(e.clientX-r.left)/zoom+pan.x-dOff.current.x,y:(e.clientY-r.top)/zoom+pan.y-dOff.current.y}:s)}));return;}if(panning){setPan({x:panStart.current.px-(e.clientX-panStart.current.x)/zoom,y:panStart.current.py-(e.clientY-panStart.current.y)/zoom});}},[drag,panning,pan,zoom,setScreensSilent]);
  const onUp=()=>{if(drag)setScreens(m=>m);setDrag(null);setPanning(false);};
  const onWheel=useCallback(e=>{e.preventDefault();if(e.ctrlKey||e.metaKey){const r=svgRef.current.getBoundingClientRect();const mx=(e.clientX-r.left),my=(e.clientY-r.top);const d=e.deltaY>0?0.92:1.08;setZoom(z=>{const nz=Math.min(ZOOM_MAX,Math.max(ZOOM_MIN,z*d));const wx=mx/z+pan.x,wy=my/z+pan.y;setPan({x:wx-mx/nz,y:wy-my/nz});return nz;});}else{setPan(p=>({x:p.x+e.deltaX/zoom,y:p.y+e.deltaY/zoom}));}},[zoom,pan]);

  useEffect(()=>{if(CONCEPT.actors.length>0&&!CONCEPT.actors.find(a=>a.id===actorId))setActorId(CONCEPT.actors[0].id);},[screens]);

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",position:"relative"}}>
      <div style={{background:M3.surface,borderBottom:`1px solid ${M3.outlineVar}`,display:"flex",alignItems:"stretch",flexShrink:0,paddingLeft:16,minHeight:48}}>
        {CONCEPT.actors.map(a=>{const isAct=actorId===a.id,cnt=screens.screens.filter(s=>s.actorId===a.id).length;return<button key={a.id} onClick={()=>{setActorId(a.id);setSelNavId(null);setSelScrId(null);setConn(null);}} style={{padding:"0 24px",border:"none",background:"transparent",cursor:"pointer",color:isAct?"#1A73E8":"#9AA0A6",fontSize:14,fontWeight:isAct?500:400,borderBottom:`3px solid ${isAct?"#1A73E8":"transparent"}`,borderTop:"3px solid transparent",fontFamily:"inherit",whiteSpace:"nowrap"}}>{a.name}{cnt>0&&<span style={{marginLeft:6,display:"inline-flex",alignItems:"center",justifyContent:"center",minWidth:20,height:20,padding:"0 6px",borderRadius:"var(--md-sys-shape-full)",background:isAct?"#D3E3FD":"#E8EAED",color:isAct?"#041E49":"#5F6368",fontSize:11,fontWeight:600,lineHeight:1}}>{cnt}</span>}</button>;})}

        {selObj&&(<div style={{width:400,borderLeft:`1px solid ${M3.outlineVar}`,background:M3.surfaceContLow,display:"flex",flexDirection:"column",flexShrink:0}}><div style={{padding:"16px 16px",borderBottom:`1px solid ${M3.outlineVar}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:M3.surface}}><span style={{fontSize:12,fontWeight:500,color:M3.onSurfaceVar,textTransform:"uppercase",letterSpacing:"0.5px"}}>Object</span><button onClick={()=>setSelObjId(null)} style={{background:"none",border:"none",cursor:"pointer",color:M3.onSurfaceVar}}><span className="msi" style={{fontSize:20}}>close</span></button></div><div style={{flex:1,overflowY:"auto",padding:16}}>
          {(()=>{const actor=CONCEPT.actors.find(a=>a.id===scr.actorId);const allowedEnts=CONCEPT.entities.filter(e=>actor?.touches.some(t=>t.entityId===e.id&&t.crud.length>0));return<div style={{marginBottom:16}}><SLabel>Entity</SLabel><Sel value={selObj.entityId} onChange={e=>updObj({...selObj,entityId:e.target.value})} style={{width:"100%"}}>{!allowedEnts.find(e=>e.id===selObj.entityId)&&<option value={selObj.entityId} disabled>{entName(selObj.entityId)} ⚠</option>}{allowedEnts.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}</Sel></div>;})()}
          <div style={{marginBottom:16}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><SLabel>CRUD</SLabel><span style={{fontSize:11,color:"#9AA0A6"}}>guarded by Actor</span></div>{(()=>{const actorTouch=CONCEPT.actors.find(a=>a.id===scr.actorId)?.touches.find(t=>t.entityId===selObj.entityId);const allowed=actorTouch?.crud||[];return(<div style={{display:"flex",gap:8}}>{CRUD_OPS.map(op=>{const on=selObj.crud.includes(op),permitted=allowed.some(c=>c.op===op);return(<button key={op} onClick={()=>permitted&&toggleCrud(selObj,op)} title={!permitted?"Not permitted by Actor":""} style={{flex:1,padding:"8px 0",fontSize:14,fontWeight:700,borderRadius:M3.shapeSm,cursor:permitted?"pointer":"not-allowed",border:"none",background:!permitted?"#FAFAFA":on?CRUD_BG[op]:M3.surfaceContHigh,color:!permitted?"#DADCE0":on?CRUD_COLOR[op]:"#DADCE0",position:"relative"}}>{op}{!permitted&&<span style={{position:"absolute",top:2,right:2,color:"#DADCE0"}}><span className="msi" style={{fontSize:10}}>block</span></span>}</button>);})}</div>);})()}</div>
          <div style={{marginBottom:16}}><SLabel>Variant</SLabel><div style={{display:"flex",gap:8}}>{VARIANTS.map(v=>(<button key={v} onClick={()=>updObj({...selObj,variant:v})} style={{flex:1,padding:"8px 0",fontSize:14,fontWeight:500,borderRadius:M3.shapeFull,cursor:"pointer",border:selObj.variant===v?"none":`1px solid ${M3.outline}`,background:selObj.variant===v?"#D3E3FD":M3.surface,color:selObj.variant===v?"#041E49":"#9AA0A6"}}>{v}</button>))}</div></div>
          <div style={{marginBottom:16}}><SLabel>Area</SLabel><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{AREAS.map(a=>(<button key={a} onClick={()=>updObj({...selObj,area:a})} style={{padding:"8px 16px",fontSize:13,fontWeight:500,borderRadius:M3.shapeFull,cursor:"pointer",border:(selObj.area||"main")===a?"none":`1px solid ${M3.outlineVar}`,background:(selObj.area||"main")===a?"#D3E3FD":"white",color:(selObj.area||"main")===a?"#041E49":"#9AA0A6"}}>{AREA_LABELS[a]}</button>))}</div></div>
          <div style={{marginBottom:16}}><SLabel>Object Prompt</SLabel><textarea value={selObj.prompt||""} onChange={e=>updObj({...selObj,prompt:e.target.value})} placeholder="このObjectの実装についての補足" style={{width:"100%",boxSizing:"border-box",border:`1px solid ${M3.outlineVar}`,borderRadius:M3.shapeSm,background:"white",fontFamily:"inherit",fontSize:14,color:selObj.prompt?"#1A1A1A":"#C4C7C5",lineHeight:1.6,padding:"8px 16px",resize:"vertical",minHeight:80,outline:"none"}} onFocus={e=>{e.target.style.borderColor="#1A73E8";e.target.style.boxShadow="0 0 0 3px rgba(26,115,232,.12)";e.target.style.color="#1A1A1A";}} onBlur={e=>{e.target.style.borderColor="";e.target.style.boxShadow="none";if(!e.target.value)e.target.style.color="#C4C7C5";}}/></div>
        </div><div style={{borderTop:`1px solid ${M3.outlineVar}`,padding:16,display:"flex",justifyContent:"flex-end"}}><Btn danger onClick={e=>{e.stopPropagation();delObj(selObj.id);}}>Delete object</Btn></div></div>)}
      </div>
    </div>
  );
}

function CollWF({obj,color}){return(<div>{obj.crud.includes("C")&&(<div style={{marginBottom:8,display:"flex",justifyContent:"flex-end"}}><div style={{display:"inline-flex",alignItems:"center",gap:4,padding:"8px 16px",background:CRUD_BG.C,borderRadius:M3.shapeFull,fontSize:13,color:CRUD_COLOR.C,fontWeight:500}}><span className="msi" style={{fontSize:16}}>add</span> New</div></div>)}<table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["Name","Status","Date"].map(h=>(<th key={h} style={{padding:"8px 8px",fontSize:11,color:"#5F6368",textAlign:"left",fontWeight:500,background:"#FAFAFA",borderBottom:`1px solid ${M3.outlineVar}`}}>{h}</th>))}{(obj.crud.includes("U")||obj.crud.includes("D"))&&<th style={{background:"#FAFAFA",borderBottom:`1px solid ${M3.outlineVar}`,width:72}}/>}</tr></thead><tbody>{PH_ROWS.map((ws,ri)=>(<tr key={ri} style={{borderBottom:"1px solid #FAFAFA"}}>{ws.map((w,ci)=>(<td key={ci} style={{padding:"8px 8px"}}><div style={{height:10,background:"#E0E0E0",borderRadius:5,width:`${w}%`}}/></td>))}{(obj.crud.includes("U")||obj.crud.includes("D"))&&(<td style={{padding:"8px 8px"}}><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>{obj.crud.includes("U")&&<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:28,height:28,borderRadius:"50%",background:CRUD_BG.U}}><span className="msi" style={{fontSize:16,color:CRUD_COLOR.U}}>edit</span></span>}{obj.crud.includes("D")&&<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:28,height:28,borderRadius:"50%",background:CRUD_BG.D}}><span className="msi" style={{fontSize:16,color:CRUD_COLOR.D}}>delete</span></span>}</div></td>)}</tr>))}</tbody></table></div>);}

function SingleWF({obj,color}){const actions=[];if(obj.crud.includes("C"))actions.push({icon:"add",label:"New",bg:CRUD_BG.C,fg:CRUD_COLOR.C});if(obj.crud.includes("U"))actions.push({icon:"edit",label:"Edit",bg:CRUD_BG.U,fg:CRUD_COLOR.U});if(obj.crud.includes("D"))actions.push({icon:"delete",label:"Delete",bg:CRUD_BG.D,fg:CRUD_COLOR.D});return(<div>{actions.length>0&&(<div style={{display:"flex",justifyContent:"flex-end",gap:8,marginBottom:16}}>{actions.map(a=>(<div key={a.label} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"8px 16px",background:a.bg,borderRadius:M3.shapeFull,fontSize:13,color:a.fg,fontWeight:500}}><span className="msi" style={{fontSize:16}}>{a.icon}</span> {a.label}</div>))}</div>)}{["Name","Status","Date"].map((f,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:16,marginBottom:16,height:20}}><div style={{width:64,fontSize:12,lineHeight:"20px",color:"#9AA0A6",textAlign:"right",flexShrink:0}}>{f}</div><div style={{flex:1,display:"flex",alignItems:"center"}}><div style={{height:12,background:"#E8EAED",borderRadius:4,width:`${[72,88,56][i%3]}%`}}/></div></div>))}</div>);}

const TABS=[{id:"map",label:"Map"},{id:"detail",label:"Screen"}];

function App(){
  const[screens,setScreensRaw]=useState(EMPTY),[view,setView]=useState("map"),[scrId,setScrId]=useState(null);
  const histRef=useRef({stack:[EMPTY],idx:0});

  const setScreens=useCallback(updater=>{
    setScreensRaw(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      const h=histRef.current;
      h.stack=h.stack.slice(0,h.idx+1);
      h.stack.push(JSON.parse(JSON.stringify(next)));
      if(h.stack.length>MAX_HISTORY){h.stack.shift();}else{h.idx++;}
      return next;
    });
  },[]);
  const setScreensSilent=useCallback(updater=>{
    setScreensRaw(prev=>typeof updater==='function'?updater(prev):updater);
  },[]);

  const undo=useCallback(()=>{const h=histRef.current;if(h.idx<=0)return;h.idx--;setScreensRaw(JSON.parse(JSON.stringify(h.stack[h.idx])));showToast('Undo');},[]);
  const redo=useCallback(()=>{const h=histRef.current;if(h.idx>=h.stack.length-1)return;h.idx++;setScreensRaw(JSON.parse(JSON.stringify(h.stack[h.idx])));showToast('Redo');},[]);
  const handleDelete=useCallback(()=>{
    // TODO: Screen選択時の削除
    return false;
  },[]);

  useEffect(()=>{
    window.__scUndo=undo;window.__scRedo=redo;window.__scDelete=handleDelete;
    return()=>{window.__scUndo=window.__scRedo=window.__scDelete=null;};
  },[undo,redo,handleDelete]);

  const initialLoad=useRef(true);
  useEffect(()=>{screensRef=screens;if(initialLoad.current){initialLoad.current=false;}else{markModified();}},[screens]);
  useEffect(()=>{
    window.__scLoadData=d=>{
      const scData=ensureScreenPositions(splitData(d));
      loadGeneration++;
      setScreensRaw(scData);
      histRef.current={stack:[JSON.parse(JSON.stringify(scData))],idx:0};
      setView("map");setScrId(null);
    };
    return()=>{window.__scLoadData=null;};
  },[]);

  const barRef=useRef(null);
  useEffect(()=>{
    if(!barRef.current)return;
    ['sc-edited','sc-connect-btn','sc-auto-btn'].forEach(id=>{const el=document.getElementById(id);if(el)barRef.current.appendChild(el);});
  },[]);

  const counts={screens:screens.screens.length,transitions:screens.transitions.length};
  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:M3.surface,fontFamily:"'Google Sans','Roboto','Noto Sans JP',system-ui,sans-serif",fontSize:14}}>
      <div style={{height:48,background:"#FFFFFF",borderBottom:"1px solid #DADCE0",display:"flex",alignItems:"stretch",flexShrink:0,paddingLeft:16}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:14,height:14,borderRadius:"var(--md-sys-shape-xs)",background:"#1A73E8"}}/><span style={{fontSize:16,fontWeight:500,lineHeight:"24px",color:M3.onSurface}}>Screen Editor</span></div>
        <div ref={barRef} style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:16,paddingRight:16,fontSize:14,fontFamily:"inherit"}}/>
      </div>
      <div style={{flex:1,overflow:"hidden"}}>
        {view==="map"&&<MapView screens={screens} setScreens={setScreens} setScreensSilent={setScreensSilent} onSelectScreen={id=>{setScrId(id);setView("detail");}}/>}
        {view==="detail"&&scrId&&<ScreenDetailView screenId={scrId} screens={screens} setScreens={setScreens} onBack={()=>{setView("map");setScrId(null);}}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
