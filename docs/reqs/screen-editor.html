<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screens Editor</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body,#root{height:100%;overflow:hidden}
  .file-drop-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(79,70,229,.08);border:3px dashed #4f46e5;align-items:center;justify-content:center}
  .file-drop-overlay.active{display:flex}
  .drop-msg{font:600 18px system-ui;color:#4f46e5;background:white;padding:18px 36px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
  #sc-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#18181b;color:white;padding:8px 20px;border-radius:8px;font:12px system-ui;opacity:0;transition:opacity .2s;z-index:10000;pointer-events:none}
  #sc-toast.show{opacity:1}
  #sc-toolbar{height:36px;background:#fff;border-bottom:1px solid #e4e4e7;display:flex;align-items:center;padding:0 12px;gap:8;flex-shrink:0;font:12px system-ui}
  .sc-tb-btn{background:#f4f4f5;border:1px solid #e4e4e7;border-radius:5px;padding:3px 10px;font:600 11px system-ui;color:#3f3f46;cursor:pointer}
  .sc-tb-btn:hover{background:#e4e4e7}
  .sc-connect-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid #e4e4e7;border-radius:5px;padding:3px 10px;font:600 11px system-ui;color:#3f3f46;cursor:pointer}
  .sc-connect-btn:hover{background:#f4f4f5}
  .sc-dot{width:7px;height:7px;border-radius:50%;background:#d4d4d8}
  .sc-dot.connected{background:#4caf50}.sc-dot.saving{background:#ff9800}.sc-dot.error{background:#f44336}
  .sc-hint{font-weight:400;color:#a1a1aa;font-size:10px}
  #sc-edited{display:none;font-size:10px;color:#d97706;font-weight:600}
  .sc-auto-switch{display:none;align-items:center;gap:5px;font-size:11px;color:#71717a;cursor:pointer;user-select:none}
  .sc-auto-switch .sc-switch-track{position:relative;width:30px;height:16px;background:#d4d4d8;border-radius:999px;transition:background .2s}
  .sc-auto-switch.active .sc-switch-track{background:#4f46e5}
  .sc-auto-switch .sc-switch-thumb{position:absolute;top:2px;left:2px;width:12px;height:12px;background:#fff;border-radius:50%;transition:left .2s}
  .sc-auto-switch.active .sc-switch-thumb{left:16px}
</style>
</head>
<body>
<div class="file-drop-overlay" id="sc-drop-overlay"><span class="drop-msg">Drop conceptual-model.json to connect</span></div>
<div id="sc-toast"></div>
<div id="sc-toolbar">
  <label class="sc-auto-switch" id="sc-auto-btn" onclick="toggleAuto()" title="Auto save">Auto <span class="sc-switch-track"><span class="sc-switch-thumb"></span></span></label>
  <button class="sc-connect-btn" id="sc-connect-btn" onclick="handleConnect()">
    <span class="sc-dot" id="sc-dot"></span>
    <span id="sc-label">Connect</span>
    <span class="sc-hint" id="sc-hint">(Drop conceptual-model.json)</span>
  </button>
  <span id="sc-edited">Edited</span>
  <button class="sc-tb-btn" id="sc-saveas-btn" style="display:none" onclick="handleSaveAs()">Save to...</button>
</div>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
// パススルー: Screensエディタが編集しないフィールド（entities, actors, composites等）
let passthrough={};
// CMデータ参照（同じJSONから読み取る）
let CONCEPT={entities:[],actors:[],composites:[]};
let fileHandle=null,autoSaveEnabled=false,saveTimer=null,isSaving=false,screensRef=null;

function getFullJson(){
  if(!screensRef)return null;
  return{...passthrough,screens:screensRef.screens,navigation:screensRef.navigation};
}

function splitData(data){
  const{screens,navigation,...rest}=data;
  passthrough=rest;
  // CMデータを更新
  CONCEPT={entities:rest.entities||[],actors:rest.actors||[],composites:rest.composites||[]};
  return{screens:screens||[],navigation:navigation||[]};
}

function updateStatus(s,l,h){document.getElementById('sc-dot').className='sc-dot '+(s||'');document.getElementById('sc-label').textContent=l||'';document.getElementById('sc-hint').textContent=h||'';}
function showToast(m){const t=document.getElementById('sc-toast');t.textContent=m;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),2000);}
function markModified(){document.getElementById('sc-edited').style.display='inline';if(autoSaveEnabled&&fileHandle)scheduleAutoSave();}
function scheduleAutoSave(){if(saveTimer)clearTimeout(saveTimer);if(!fileHandle||!autoSaveEnabled)return;saveTimer=setTimeout(()=>writeFile(),500);}
async function writeFile(){if(!fileHandle||isSaving)return;const full=getFullJson();if(!full)return;isSaving=true;updateStatus('saving',fileHandle.name,'');try{const w=await fileHandle.createWritable();await w.write(JSON.stringify(full,null,2)+'\n');await w.close();updateStatus('connected',fileHandle.name);document.getElementById('sc-edited').style.display='none';}catch(e){console.error(e);updateStatus('error','Save failed');if(e.name==='NotAllowedError')disconnectFile();}finally{isSaving=false;}}
function disconnectFile(){fileHandle=null;autoSaveEnabled=false;passthrough={};CONCEPT={entities:[],actors:[],composites:[]};if(saveTimer)clearTimeout(saveTimer);document.getElementById('sc-saveas-btn').style.display='none';document.getElementById('sc-auto-btn').style.display='none';document.getElementById('sc-edited').style.display='none';updateStatus('','Connect','(Drop conceptual-model.json)');}
function onFileConnected(h){fileHandle=h;updateStatus('connected',h.name);document.getElementById('sc-saveas-btn').style.display='';document.getElementById('sc-auto-btn').style.display='flex';}
async function handleConnect(){if(fileHandle){await writeFile();showToast('保存しました');return;}if(!('showOpenFilePicker' in window)){showToast('JSONファイルをドロップしてください');return;}try{const[h]=await window.showOpenFilePicker({id:'sc-editor',types:[{description:'JSON',accept:{'application/json':['.json']}}]});const f=await h.getFile();const t=await f.text();let d;try{d=JSON.parse(t);}catch{updateStatus('error','Invalid JSON');return;}onFileConnected(h);if(window.__scLoadData)window.__scLoadData(d);}catch(e){if(e.name!=='AbortError'){console.error(e);updateStatus('error','Error');}}}
async function handleSaveAs(){const full=getFullJson();if(!full)return;try{const h=await window.showSaveFilePicker({id:'sc-editor',suggestedName:fileHandle?fileHandle.name:'conceptual-model.json',types:[{description:'JSON',accept:{'application/json':['.json']}}]});onFileConnected(h);await writeFile();showToast('保存しました: '+h.name);}catch(e){if(e.name!=='AbortError'){console.error(e);updateStatus('error','Error');}}}
function toggleAuto(){autoSaveEnabled=!autoSaveEnabled;document.getElementById('sc-auto-btn').classList.toggle('active',autoSaveEnabled);showToast('自動保存 '+(autoSaveEnabled?'ON':'OFF'));if(autoSaveEnabled&&fileHandle)scheduleAutoSave();}
let dragC=0;const ov=document.getElementById('sc-drop-overlay');
document.addEventListener('dragenter',e=>{if(e.dataTransfer.types.includes('Files')){dragC++;ov.classList.add('active');}});
document.addEventListener('dragleave',e=>{if(e.dataTransfer.types.includes('Files')){dragC--;if(dragC<=0){dragC=0;ov.classList.remove('active');}}});
document.addEventListener('dragover',e=>{if(e.dataTransfer.types.includes('Files'))e.preventDefault();});
document.addEventListener('drop',async e=>{dragC=0;ov.classList.remove('active');if(!e.dataTransfer.types.includes('Files'))return;e.preventDefault();for(const i of[...e.dataTransfer.items]){if(i.kind!=='file'||typeof i.getAsFileSystemHandle!=='function')continue;const h=await i.getAsFileSystemHandle();if(h.kind==='file'&&h.name.endsWith('.json')){const f=await h.getFile();const t=await f.text();let d;try{d=JSON.parse(t);}catch{updateStatus('error','Invalid JSON');return;}onFileConnected(h);if(window.__scLoadData)window.__scLoadData(d);return;}}updateStatus('error','Drop not supported');});
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();if(fileHandle)writeFile().then(()=>showToast('保存しました'));}});
</script>

<script type="text/babel">
const{useState,useRef,useCallback,useEffect}=React;
const CRUD_OPS=["C","R","U","D"],CRUD_COLOR={C:"#16a34a",R:"#2563eb",U:"#d97706",D:"#dc2626"},CRUD_BG={C:"#f0fdf4",R:"#eff6ff",U:"#fffbeb",D:"#fef2f2"},VARIANTS=["collection","single"],ENT_COLORS=["#4f46e5","#7c3aed","#db2777","#b45309","#047857","#0369a1","#c2410c","#0891b2"],SW=180,SH=72;
const uid=()=>Math.random().toString(36).slice(2,8);
const entColor=id=>ENT_COLORS[Math.max(0,CONCEPT.entities.findIndex(e=>e.id===id))%ENT_COLORS.length];
const entName=id=>CONCEPT.entities.find(e=>e.id===id)?.name||id;
function edgePt(x,y,w,h,tx,ty){const cx=x+w/2,cy=y+h/2,dx=tx-cx,dy=ty-cy;if(Math.abs(dx)*h>Math.abs(dy)*w)return dx>0?{x:x+w,y:cy}:{x,y:cy};return dy>0?{x:cx,y:y+h}:{x:cx,y};}
const EMPTY={screens:[],navigation:[]};

function Input({style,...p}){return<input{...p}style={{border:"1px solid #e4e4e7",borderRadius:5,background:"#fff",color:"#18181b",fontSize:12,padding:"5px 9px",outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"inherit",...style}}onFocus={e=>{e.target.style.borderColor="#4f46e5";e.target.style.boxShadow="0 0 0 3px #e0e7ff"}}onBlur={e=>{e.target.style.borderColor="#e4e4e7";e.target.style.boxShadow="none"}}/>;}
function Sel({style,children,...p}){return<select{...p}style={{border:"1px solid #e4e4e7",borderRadius:5,background:"#fff",color:"#52525b",fontSize:12,padding:"5px 8px",outline:"none",fontFamily:"inherit",...style}}>{children}</select>;}
function Btn({children,onClick,accent,small,danger,ghost}){return<button onClick={onClick}style={{background:danger?"#fef2f2":accent?"#4f46e5":ghost?"transparent":"#f4f4f5",border:`1px solid ${danger?"#fca5a5":accent?"#4f46e5":ghost?"#e4e4e7":"#e4e4e7"}`,color:danger?"#dc2626":accent?"#fff":ghost?"#71717a":"#3f3f46",borderRadius:6,padding:small?"3px 9px":"6px 14px",fontSize:small?11:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",lineHeight:1.4}}>{children}</button>;}
const SLabel=({children})=><div style={{fontSize:10,fontWeight:700,color:"#a1a1aa",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>{children}</div>;

function MapView({screens,setScreens,onSelectScreen}){
  const[actorId,setActorId]=useState(CONCEPT.actors[0]?.id||null),[selNavId,setSelNavId]=useState(null),[drag,setDrag]=useState(null),[conn,setConn]=useState(null);
  const svgRef=useRef(),dOff=useRef({x:0,y:0});
  const visScr=screens.screens.filter(s=>s.actorId===actorId);
  const visNav=screens.navigation.filter(n=>visScr.find(s=>s.id===n.from)&&visScr.find(s=>s.id===n.to));
  const selNav=visNav.find(n=>n.id===selNavId);
  const updNav=u=>setScreens(m=>({...m,navigation:m.navigation.map(n=>n.id===u.id?u:n)}));
  const delNav=id=>{setSelNavId(null);setScreens(m=>({...m,navigation:m.navigation.filter(n=>n.id!==id)}));};
  const addScreen=()=>{const id=uid();setScreens(m=>({...m,screens:[...m.screens,{id,name:"New Screen",actorId,x:120,y:120,prompt:"",objects:[]}]}));};
  const connOn=conn!==null,connHasSrc=conn!==null&&conn!=="";
  const onBoxMD=(e,id)=>{e.stopPropagation();if(connOn){if(conn===""){setConn(id);return;}if(conn!==id){setScreens(m=>({...m,navigation:[...m.navigation,{id:uid(),from:conn,to:id,trigger:"Tap"}]}));setConn(null);}return;}setSelNavId(null);const r=svgRef.current.getBoundingClientRect();const sc=visScr.find(s=>s.id===id);dOff.current={x:e.clientX-r.left-sc.x,y:e.clientY-r.top-sc.y};setDrag(id);};
  const onMM=useCallback(e=>{if(!drag)return;const r=svgRef.current.getBoundingClientRect();setScreens(m=>({...m,screens:m.screens.map(s=>s.id===drag?{...s,x:Math.max(0,e.clientX-r.left-dOff.current.x),y:Math.max(0,e.clientY-r.top-dOff.current.y)}:s)}));},[drag]);

  // actorが変わったらリセット
  useEffect(()=>{if(CONCEPT.actors.length>0&&!CONCEPT.actors.find(a=>a.id===actorId))setActorId(CONCEPT.actors[0].id);},[screens]);

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{background:"white",borderBottom:"1px solid #e4e4e7",display:"flex",alignItems:"stretch",flexShrink:0,paddingLeft:12,minHeight:42}}>
        {CONCEPT.actors.map(a=>(<button key={a.id} onClick={()=>{setActorId(a.id);setSelNavId(null);setConn(null);}} style={{padding:"0 16px",border:"none",background:"transparent",cursor:"pointer",color:actorId===a.id?"#18181b":"#a1a1aa",fontSize:12,fontWeight:actorId===a.id?700:400,borderBottom:`2px solid ${actorId===a.id?"#4f46e5":"transparent"}`,borderTop:"2px solid transparent",fontFamily:"inherit",whiteSpace:"nowrap"}}>{a.name}</button>))}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",paddingRight:12,gap:6}}>
          <Btn small ghost onClick={addScreen}>+ Screen</Btn>
          <Btn small ghost={!connOn} accent={connOn} onClick={()=>setConn(connOn?null:"")}>{connOn?(connHasSrc?"→ select target":"← select source"):"↗ Connect"}</Btn>
          {connOn&&<Btn small ghost onClick={()=>setConn(null)}>✕</Btn>}
        </div>
      </div>
      <div style={{flex:1,position:"relative",overflow:"hidden"}}>
        <svg ref={svgRef} width="100%" height="100%" style={{cursor:drag?"grabbing":connOn?"crosshair":"default",display:"block"}} onMouseMove={onMM} onMouseUp={()=>setDrag(null)} onMouseLeave={()=>setDrag(null)} onClick={e=>{if(e.target===e.currentTarget||e.target.getAttribute('data-bg')){if(!connOn)setSelNavId(null);}}}>
          <defs><pattern id="sdots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#e4e4e7"/></pattern><marker id="sarr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#94a3b8"/></marker><marker id="sarr-hi" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4f46e5"/></marker></defs>
          <rect width="100%" height="100%" fill="url(#sdots)" data-bg="1"/>
          {visNav.map(nav=>{const src=visScr.find(s=>s.id===nav.from),tgt=visScr.find(s=>s.id===nav.to);if(!src||!tgt)return null;const fp=edgePt(src.x,src.y,SW,SH,tgt.x+SW/2,tgt.y+SH/2),tp=edgePt(tgt.x,tgt.y,SW,SH,src.x+SW/2,src.y+SH/2),mx=(fp.x+tp.x)/2,my=(fp.y+tp.y)/2,isSel=selNavId===nav.id,col=isSel?"#4f46e5":"#94a3b8";return(<g key={nav.id} onClick={e=>{e.stopPropagation();setSelNavId(isSel?null:nav.id);}}><line x1={fp.x} y1={fp.y} x2={tp.x} y2={tp.y} stroke="transparent" strokeWidth={12} style={{cursor:"pointer"}}/><line x1={fp.x} y1={fp.y} x2={tp.x} y2={tp.y} stroke={col} strokeWidth={isSel?2:1.5} strokeDasharray={isSel?"none":"5 3"} markerEnd={isSel?"url(#sarr-hi)":"url(#sarr)"} style={{cursor:"pointer"}}/><rect x={mx-24} y={my-9} width={48} height={17} rx={4} fill={isSel?"#4f46e5":"white"} stroke={col} strokeWidth="0.5" style={{cursor:"pointer"}}/><text x={mx} y={my+4} fontSize={9} fill={isSel?"white":"#71717a"} textAnchor="middle" style={{pointerEvents:"none"}}>{nav.trigger}</text></g>);})}
          {visScr.map(scr=>{const isConn=conn===scr.id,cardH=SH+Math.max(0,scr.objects.length)*20;return(<g key={scr.id} transform={`translate(${scr.x},${scr.y})`} onMouseDown={e=>onBoxMD(e,scr.id)} style={{cursor:connOn?"pointer":"grab"}}><rect x={2} y={3} width={SW} height={cardH} rx={8} fill="rgba(0,0,0,0.05)"/><rect width={SW} height={cardH} rx={8} fill="white" stroke={isConn?"#f59e0b":"#e4e4e7"} strokeWidth={isConn?2:1}/><rect width={SW} height={32} rx={8} fill="#f8fafc"/><rect y={24} width={SW} height={8} fill="#f8fafc"/><line x1={0} y1={32} x2={SW} y2={32} stroke="#e4e4e7" strokeWidth="1"/><text x={10} y={21} fontSize={11} fontWeight="700" fill="#18181b" fontFamily="inherit">{scr.name}</text>{scr.objects.map((obj,oi)=>{const c=entColor(obj.entityId);return(<g key={obj.id} transform={`translate(0,${36+oi*20})`}><rect x={8} width={SW-16} height={16} rx={3} fill={c+"0e"}/><circle cx={16} cy={8} r={3} fill={c}/><text x={24} y={12} fontSize={9} fontWeight="600" fill={c} fontFamily="inherit">{entName(obj.entityId)}</text><text x={SW-10} y={12} fontSize={9} fill="#a1a1aa" textAnchor="end" fontFamily="inherit">{obj.variant==="collection"?"list":"form"}</text></g>);})}<g onClick={e=>{e.stopPropagation();onSelectScreen(scr.id);}} style={{cursor:"pointer"}}><rect x={SW-28} y={4} width={22} height={22} rx={4} fill="transparent"/><text x={SW-17} y={18} fontSize={13} fill="#d4d4d8" textAnchor="middle" style={{userSelect:"none"}}>↗</text></g></g>);})}
        </svg>
        {selNav&&(<div style={{position:"absolute",bottom:20,left:"50%",transform:"translateX(-50%)",background:"white",border:"1px solid #e4e4e7",borderRadius:8,padding:"10px 14px",boxShadow:"0 4px 16px rgba(0,0,0,.1)",display:"flex",alignItems:"center",gap:10,zIndex:10}}><span style={{fontSize:11,color:"#a1a1aa"}}>{visScr.find(s=>s.id===selNav.from)?.name}</span><span style={{color:"#4f46e5",fontWeight:700}}>→</span><span style={{fontSize:11,color:"#a1a1aa"}}>{visScr.find(s=>s.id===selNav.to)?.name}</span><Input value={selNav.trigger} onChange={e=>updNav({...selNav,trigger:e.target.value})} style={{width:100,fontSize:11}} placeholder="trigger"/><Btn small danger onClick={()=>delNav(selNav.id)}>Delete</Btn></div>)}
      </div>
    </div>
  );
}

const PH_ROWS=[[72,55,80],[64,80,58],[80,62,70]];

function WireframeView({screenId,screens,setScreens,onBack}){
  const[selObjId,setSelObjId]=useState(null);
  const scr=screens.screens.find(s=>s.id===screenId);if(!scr)return null;
  const updScr=patch=>setScreens(m=>({...m,screens:m.screens.map(s=>s.id===screenId?{...s,...patch}:s)}));
  const updObj=obj=>updScr({objects:scr.objects.map(o=>o.id===obj.id?obj:o)});
  const delObj=id=>{updScr({objects:scr.objects.filter(o=>o.id!==id)});setSelObjId(null);};
  const addObj=()=>{const ent=CONCEPT.entities[0];if(!ent)return;const obj={id:uid(),entityId:ent.id,variant:"collection",crud:["R"]};updScr({objects:[...scr.objects,obj]});setSelObjId(obj.id);};
  const toggleCrud=(obj,op)=>{const crud=obj.crud.includes(op)?obj.crud.filter(c=>c!==op):[...obj.crud,op];updObj({...obj,crud});};
  const selObj=scr.objects.find(o=>o.id===selObjId);
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{background:"white",borderBottom:"1px solid #e4e4e7",display:"flex",alignItems:"center",padding:"0 16px",height:46,flexShrink:0,gap:12}}>
        <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",color:"#a1a1aa",fontSize:13,fontFamily:"inherit",display:"flex",alignItems:"center",gap:4,padding:0}}>← Map</button>
        <div style={{width:1,height:20,background:"#e4e4e7"}}/>
        <Input value={scr.name} onChange={e=>updScr({name:e.target.value})} style={{fontSize:14,fontWeight:700,border:"none",background:"transparent",padding:0,boxShadow:"none",width:"auto"}}/>
        <span style={{fontSize:11,color:"#d4d4d8"}}>{CONCEPT.actors.find(a=>a.id===scr.actorId)?.name}</span>
        <div style={{marginLeft:"auto"}}><Btn small ghost onClick={addObj}>+ Object</Btn></div>
      </div>
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        <div style={{flex:1,overflowY:"auto",background:"#f8fafc",padding:32}}>
          <div style={{marginBottom:24}}><div style={{fontSize:10,fontWeight:700,color:"#a1a1aa",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>Prompt</div><textarea value={scr.prompt||""} onChange={e=>updScr({prompt:e.target.value})} placeholder="このScreenの実装についてCCへの補足を書く" style={{width:"100%",boxSizing:"border-box",border:"1px solid #e4e4e7",borderRadius:8,background:"white",fontFamily:"inherit",fontSize:12,color:"#3f3f46",lineHeight:1.6,padding:"10px 12px",resize:"vertical",minHeight:72,outline:"none"}} onFocus={e=>{e.target.style.borderColor="#4f46e5";e.target.style.boxShadow="0 0 0 3px #e0e7ff"}} onBlur={e=>{e.target.style.borderColor="#e4e4e7";e.target.style.boxShadow="none"}}/></div>
          {scr.objects.length===0&&(<div style={{border:"2px dashed #e4e4e7",borderRadius:12,padding:40,textAlign:"center",color:"#d4d4d8",fontSize:13}}>No objects — click + Object to add</div>)}
          {scr.objects.map(obj=>{const c=entColor(obj.entityId),isSel=selObjId===obj.id;return(<div key={obj.id} onClick={()=>setSelObjId(isSel?null:obj.id)} style={{marginBottom:20,background:"white",borderRadius:10,border:`2px solid ${isSel?c:"#e4e4e7"}`,boxShadow:isSel?`0 0 0 3px ${c}18`:"0 1px 4px rgba(0,0,0,.05)",cursor:"pointer",overflow:"hidden"}}><div style={{padding:"9px 14px",borderBottom:"1px solid #f4f4f5",display:"flex",alignItems:"center",gap:8}}><div style={{width:7,height:7,borderRadius:"50%",background:c}}/><span style={{fontSize:12,fontWeight:700,color:"#18181b"}}>{entName(obj.entityId)}</span><span style={{fontSize:10,color:"#a1a1aa",background:"#f4f4f5",padding:"1px 6px",borderRadius:3}}>{obj.variant}</span><div style={{marginLeft:"auto",display:"flex",gap:3}}>{CRUD_OPS.map(op=>(<span key={op} style={{fontSize:9,fontWeight:800,padding:"2px 5px",borderRadius:3,background:obj.crud.includes(op)?CRUD_BG[op]:"#f4f4f5",color:obj.crud.includes(op)?CRUD_COLOR[op]:"#d4d4d8"}}>{op}</span>))}</div></div><div style={{padding:"12px 14px"}}>{obj.variant==="collection"?<CollWF obj={obj} color={c}/>:<SingleWF obj={obj} color={c}/>}</div></div>);})}
        </div>
        {selObj&&(<div style={{width:260,borderLeft:"1px solid #e4e4e7",background:"#fafafa",display:"flex",flexDirection:"column",flexShrink:0}}><div style={{padding:"11px 16px",borderBottom:"1px solid #e4e4e7",display:"flex",alignItems:"center",justifyContent:"space-between",background:"white"}}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:7,height:7,borderRadius:"50%",background:entColor(selObj.entityId)}}/><span style={{fontSize:11,fontWeight:700,color:"#71717a",letterSpacing:"0.08em",textTransform:"uppercase"}}>Object</span></div><button onClick={()=>setSelObjId(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#d4d4d8",lineHeight:1,padding:"0 2px"}}>×</button></div><div style={{flex:1,overflowY:"auto",padding:16}}><div style={{marginBottom:16}}><SLabel>Entity</SLabel><Sel value={selObj.entityId} onChange={e=>updObj({...selObj,entityId:e.target.value})} style={{width:"100%"}}>{CONCEPT.entities.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}</Sel></div><div style={{marginBottom:16}}><SLabel>Variant</SLabel><div style={{display:"flex",gap:6}}>{VARIANTS.map(v=>(<button key={v} onClick={()=>updObj({...selObj,variant:v})} style={{flex:1,padding:"7px 0",fontSize:11,fontWeight:600,borderRadius:6,cursor:"pointer",border:`1px solid ${selObj.variant===v?"#4f46e5":"#e4e4e7"}`,background:selObj.variant===v?"#eef2ff":"white",color:selObj.variant===v?"#4338ca":"#71717a"}}>{v}</button>))}</div></div><div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><SLabel>CRUD</SLabel><span style={{fontSize:9,color:"#a1a1aa",letterSpacing:"0.04em"}}>guarded by Actor</span></div>{(()=>{const actorTouch=CONCEPT.actors.find(a=>a.id===scr.actorId)?.touches.find(t=>t.entityId===selObj.entityId);const allowed=actorTouch?.crud||[];return(<div style={{display:"flex",gap:6}}>{CRUD_OPS.map(op=>{const on=selObj.crud.includes(op),permitted=allowed.includes(op);return(<button key={op} onClick={()=>permitted&&toggleCrud(selObj,op)} title={!permitted?"Not permitted by Actor":""} style={{flex:1,padding:"10px 0",fontSize:13,fontWeight:800,borderRadius:6,cursor:permitted?"pointer":"not-allowed",border:`1px solid ${!permitted?"#f4f4f5":"transparent"}`,background:!permitted?"#fafafa":on?CRUD_BG[op]:"#f4f4f5",color:!permitted?"#e4e4e7":on?CRUD_COLOR[op]:"#d4d4d8",position:"relative"}}>{op}{!permitted&&<span style={{position:"absolute",top:3,right:3,fontSize:7,color:"#e4e4e7"}}>✕</span>}</button>);})}</div>);})()}</div></div><div style={{borderTop:"1px solid #f4f4f5",padding:16}}><Btn danger onClick={e=>{e.stopPropagation();delObj(selObj.id);}}>Delete object</Btn></div></div>)}
      </div>
    </div>
  );
}

function CollWF({obj,color}){return(<div>{obj.crud.includes("C")&&(<div style={{marginBottom:10,display:"flex",justifyContent:"flex-end"}}><div style={{display:"inline-flex",alignItems:"center",gap:4,padding:"5px 12px",background:color,borderRadius:6,fontSize:11,color:"white",fontWeight:600}}>+ New</div></div>)}<table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["Name","Status","Date"].map(h=>(<th key={h} style={{padding:"6px 8px",fontSize:10,color:"#64748b",textAlign:"left",fontWeight:600,background:"#f8fafc",borderBottom:"1px solid #e4e4e7"}}>{h}</th>))}{(obj.crud.includes("U")||obj.crud.includes("D"))&&<th style={{background:"#f8fafc",borderBottom:"1px solid #e4e4e7",width:60}}/>}</tr></thead><tbody>{PH_ROWS.map((ws,ri)=>(<tr key={ri} style={{borderBottom:"1px solid #fafafa"}}>{ws.map((w,ci)=>(<td key={ci} style={{padding:"8px 8px"}}><div style={{height:9,background:"#e4e4e7",borderRadius:3,width:`${w}%`}}/></td>))}{(obj.crud.includes("U")||obj.crud.includes("D"))&&(<td style={{padding:"8px 8px"}}><div style={{display:"flex",gap:3,justifyContent:"flex-end"}}>{obj.crud.includes("U")&&<div style={{width:26,height:18,background:CRUD_BG.U,borderRadius:3}}/>}{obj.crud.includes("D")&&<div style={{width:26,height:18,background:CRUD_BG.D,borderRadius:3}}/>}</div></td>)}</tr>))}</tbody></table></div>);}

function SingleWF({obj,color}){return(<div>{["Field A","Field B","Field C"].map((f,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{width:60,fontSize:10,color:"#94a3b8",textAlign:"right",flexShrink:0}}>{f}</div><div style={{flex:1,height:28,background:"#f8fafc",border:"1px solid #e4e4e7",borderRadius:5}}/></div>))}{obj.crud.includes("U")&&(<div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:14}}><div style={{padding:"6px 14px",background:"#f4f4f5",borderRadius:6,fontSize:11,color:"#71717a"}}>Cancel</div><div style={{padding:"6px 14px",background:color,borderRadius:6,fontSize:11,color:"white",fontWeight:600}}>Save</div></div>)}</div>);}

function JsonModal({screens,onClose}){const json=JSON.stringify(getFullJson(),null,2),[copied,setCopied]=useState(false);return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}} onClick={onClose}><div style={{background:"white",borderRadius:12,boxShadow:"0 24px 64px rgba(0,0,0,.18)",width:620,maxHeight:"78vh",display:"flex",flexDirection:"column",overflow:"hidden"}} onClick={e=>e.stopPropagation()}><div style={{padding:"13px 18px",borderBottom:"1px solid #f4f4f5",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,fontWeight:700,color:"#a1a1aa",letterSpacing:"0.1em",textTransform:"uppercase"}}>Full JSON</span><div style={{display:"flex",gap:8}}><Btn small onClick={()=>{navigator.clipboard?.writeText(json);setCopied(true);setTimeout(()=>setCopied(false),1500);}}>{copied?"✓ Copied":"Copy"}</Btn><button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#a1a1aa",lineHeight:1}}>×</button></div></div><textarea readOnly value={json} style={{flex:1,fontFamily:"'JetBrains Mono','Fira Code',monospace",fontSize:11,lineHeight:1.6,background:"#fafafa",border:"none",color:"#52525b",padding:18,resize:"none",outline:"none",overflowY:"auto"}}/></div></div>);}

function App(){
  const[screens,setScreens]=useState(EMPTY),[view,setView]=useState("map"),[scrId,setScrId]=useState(null),[showJson,setShowJson]=useState(false);
  useEffect(()=>{screensRef=screens;markModified();},[screens]);
  useEffect(()=>{
    window.__scLoadData=d=>{
      const scData=splitData(d);
      setScreens(scData);
      setView("map");setScrId(null);
    };
    return()=>{window.__scLoadData=null;};
  },[]);
  const stats=`${screens.screens.length}S · ${screens.navigation.length}N · ${CONCEPT.entities.length}E`;
  return(
    <div style={{height:"calc(100vh - 36px)",display:"flex",flexDirection:"column",background:"#fafafa",fontFamily:"'DM Sans','Outfit',system-ui,sans-serif"}}>
      <div style={{height:46,background:"white",borderBottom:"1px solid #e4e4e7",display:"flex",alignItems:"center",flexShrink:0,paddingLeft:18,paddingRight:18,gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:14,height:14,borderRadius:3,background:"#4f46e5"}}/><span style={{fontSize:12,fontWeight:700,color:"#18181b",letterSpacing:"0.02em"}}>screens</span></div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:14}}><span style={{fontSize:11,color:"#d4d4d8",letterSpacing:"0.06em"}}>{stats}</span><button onClick={()=>setShowJson(v=>!v)} style={{fontSize:11,padding:"4px 11px",borderRadius:5,cursor:"pointer",border:`1px solid ${showJson?"#4f46e5":"#e4e4e7"}`,background:showJson?"#eef2ff":"transparent",color:showJson?"#4338ca":"#a1a1aa",fontFamily:"inherit"}}>{"{ }"}</button></div>
      </div>
      <div style={{flex:1,overflow:"hidden"}}>
        {view==="map"&&<MapView screens={screens} setScreens={setScreens} onSelectScreen={id=>{setScrId(id);setView("wireframe");}}/>}
        {view==="wireframe"&&scrId&&<WireframeView screenId={scrId} screens={screens} setScreens={setScreens} onBack={()=>{setView("map");setScrId(null);}}/>}
      </div>
      {showJson&&<JsonModal screens={screens} onClose={()=>setShowJson(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
